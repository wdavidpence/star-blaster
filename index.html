<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Star Blaster</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
  canvas { display: block; }
  #hud { position: absolute; top: 10px; left: 0; right: 0; z-index: 10; pointer-events: none; padding: 0 20px; display: flex; justify-content: space-between; font-family: 'Courier New', monospace; }
  #hud div { color: #0ff; text-shadow: 0 0 8px #0ff; font-size: 16px; line-height: 1.4; }
  #overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); }
  #overlay h1 { color: #0ff; font-family: 'Courier New', monospace; text-shadow: 0 0 20px #0ff; margin-bottom: 10px; font-size: 32px; }
  #overlay p { color: #aaa; font-family: 'Courier New', monospace; margin-bottom: 8px; font-size: 14px; }
  #overlay button { background: transparent; border: 2px solid #0ff; color: #0ff; padding: 15px 40px; font-family: 'Courier New', monospace; font-size: 18px; cursor: pointer; margin-top: 20px; text-shadow: 0 0 10px #0ff; box-shadow: 0 0 15px rgba(0,255,255,0.3); }
  #overlay button:hover { background: rgba(0,255,255,0.15); }
  #overlay .score-display { color: #ff0; font-size: 24px; margin-top: 10px; text-shadow: 0 0 15px #ff0; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>

<div id="hud">
  <div><span id="scoreText">SCORE: 0</span></div>
  <div><span id="waveText">WAVE 1</span></div>
  <div><span id="livesText">♥ ♥ ♥</span></div>
</div>

<div id="overlay" style="display:flex;">
  <h1>STAR BLASTER</h1>
  <p>Tap left / right to move</p>
  <p>Tap center to shoot</p>
  <button id="startBtn">START GAME</button>
</div>

<script>
const W = () => window.innerWidth;
const H = () => window.innerHeight;

class MainScene extends Phaser.Scene {
  constructor() { super('MainScene'); }

  createTextures() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });

    // Player ship - triangle with engine glow
    g.fillStyle(0x00ffc8, 1);
    g.beginPath();
    g.moveTo(24, 0);
    g.lineTo(0, 56);
    g.lineTo(24, 44);
    g.lineTo(48, 56);
    g.closePath();
    g.fillPath();
    this.generateTexture('ship', 48, 56);

    // Engine glow
    g.fillStyle(0x00aaff, 1);
    g.beginPath();
    g.moveTo(12, 56);
    g.lineTo(24, 72 + Math.random() * 8);
    g.lineTo(36, 56);
    g.closePath();
    g.fillPath();
    this.generateTexture('engine', 48, 72);

    // Enemy type A - red diamond
    g.clear();
    g.fillStyle(0xff3344, 1);
    g.beginPath();
    g.moveTo(24, 0);
    g.lineTo(48, 24);
    g.lineTo(24, 48);
    g.lineTo(0, 24);
    g.closePath();
    g.fillPath();
    this.generateTexture('enemyA', 48, 48);

    // Enemy type B - purple hexagon
    g.clear();
    g.fillStyle(0xcc33ff, 1);
    g.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI / 3) * i - Math.PI / 2;
      const x = 24 + 24 * Math.cos(angle);
      const y = 24 + 24 * Math.sin(angle);
      if (i === 0) g.moveTo(x, y); else g.lineTo(x, y);
    }
    g.closePath();
    g.fillPath();
    this.generateTexture('enemyB', 48, 48);

    // Enemy type C - big boss
    g.clear();
    g.fillStyle(0xff6600, 1);
    g.beginPath();
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI / 4) * i - Math.PI / 2;
      const r = i % 2 === 0 ? 36 : 24;
      const x = 36 + r * Math.cos(angle);
      const y = 36 + r * Math.sin(angle);
      if (i === 0) g.moveTo(x, y); else g.lineTo(x, y);
    }
    g.closePath();
    g.fillPath();
    this.generateTexture('enemyC', 72, 72);

    // Bullet - cyan line
    g.clear();
    g.fillStyle(0x00ffff, 1);
    g.fillRect(3, 0, 6, 24);
    this.generateTexture('bullet', 6, 24);

    // Enemy bullet - red line
    g.clear();
    g.fillStyle(0xff4444, 1);
    g.fillRect(3, 0, 6, 18);
    this.generateTexture('enemyBullet', 6, 18);

    // Powerup - green circle with ring
    g.clear();
    g.lineStyle(2, 0x00ff00, 1);
    g.fillStyle(0x00ff00, 1);
    g.fillCircle(16, 16, 14);
    this.generateTexture('powerup', 32, 32);

    // Explosion particles
    g.clear();
    g.fillStyle(0xffaa00, 1);
    g.beginPath();
    g.arc(8, 8, 8, 0, Math.PI * 2);
    g.fillPath();
    this.generateTexture('explosion', 16, 16);

    // Star particle
    g.clear();
    g.fillStyle(0xffffff, 1);
    g.beginPath();
    g.arc(3, 3, 3, 0, Math.PI * 2);
    g.fillPath();
    this.generateTexture('star', 6, 6);

    // Shield visual
    g.clear();
    g.lineStyle(3, 0x00ff88, 1);
    g.fillStyle(0x00ff88, 0.2);
    g.fillCircle(24, 24, 36);
    this.generateTexture('shield', 48, 48);

    g.destroy();
  }

  create() {
    this.score = 0;
    this.lives = 3;
    this.wave = 1;
    this.waveTimer = 0;
    this.enemySpawnRate = 1200;
    this.gameOver = false;
    this.shieldActive = false;
    this.shieldTimer = 0;
    this.speedBoost = false;
    this.speedTimer = 0;

    // Background starfield
    this.stars = [];
    for (let i = 0; i < 80; i++) {
      const star = this.add.sprite(
        Phaser.Math.Between(0, W()),
        Phaser.Math.Between(0, H()),
        'star'
      );
      star.setAlpha(Phaser.Math.FloatBetween(0.3, 1));
      star.setDepth(1);
      star.twinkleSpeed = Phaser.Math.FloatBetween(0.5, 2);
      this.stars.push(star);
    }

    // Groups
    this.bullets = this.physics.add.group({ defaultKey: 'bullet', maxSize: 30 });
    this.enemies = this.physics.add.group({ defaultKey: 'enemyA', maxSize: 50 });
    this.enemyBullets = this.physics.add.group({ defaultKey: 'enemyBullet', maxSize: 40 });

    // Player ship
    this.ship = this.physics.add.sprite(W() / 2, H() - 100, 'ship');
    this.ship.setCollideWorldBounds(true);
    this.ship.setDepth(5);
    this.ship.setDragY(-50);
    this.ship.setBounce(0.3);

    // Engine glow behind ship
    this.engine = this.add.sprite(this.ship.x, this.ship.y + 28, 'engine');
    this.engine.setDepth(4);

    // Touch input zones
    this.touchLeft = false;
    this.touchRight = false;
    this.touchShoot = false;

    const third = W() / 3;
    this.input.on('pointerdown', (p) => {
      if (this.gameOver) return;
      const x = p.x * (W() / this.scale.width);
      const y = p.y * (H() / this.scale.height);
      const sw = W();
      if (x < sw / 3) this.touchLeft = true;
      else if (x > sw * 2 / 3) this.touchRight = true;
      else this.touchShoot = true;
    });

    this.input.on('pointerup', () => {
      this.touchLeft = false;
      this.touchRight = false;
      this.touchShoot = false;
    });

    // Collisions
    this.physics.add.overlap(this.bullets, this.enemies, this.hitEnemy, null, this);
    this.physics.add.overlap(this.ship, this.enemies, this.hitShip, null, this);
    this.physics.add.overlap(this.ship, this.enemyBullets, this.hitShip, null, this);
    this.physics.add.overlap(this.ship, this.powerups, this.collectPowerup, null, this);

    // Powerup group (hidden until needed)
    this.powerups = this.physics.add.group({ defaultKey: 'powerup', maxSize: 5 });

    // HUD update interval
    this.time.addEvent({ delay: 100, repeat: -1, callback: () => {
      if (!this.gameOver) {
        document.getElementById('scoreText').textContent = `SCORE: ${this.score}`;
        document.getElementById('waveText').textContent = `WAVE ${this.wave}`;
        let hearts = '';
        for (let i = 0; i < this.lives; i++) hearts += '♥ ';
        document.getElementById('livesText').textContent = hearts || 'NO LIVES';
      }
    }});

    // Wave progression
    this.time.addEvent({ delay: 8000, repeat: -1, callback: () => {
      if (!this.gameOver) {
        this.wave++;
        this.enemySpawnRate = Math.max(400, this.enemySpawnRate - 150);
        document.getElementById('waveText').textContent = `WAVE ${this.wave}`;

        // Flash wave notification
        const waveText = this.add.text(W() / 2, H() / 2, `WAVE ${this.wave}`, {
          fontSize: '48px', fontFamily: 'Courier New', color: '#0ff'
        }).setOrigin(0.5).setDepth(15);
        waveText.setAlpha(1);
        this.tweens.add({ targets: waveText, alpha: 0, duration: 2000, ease: 'Linear' });
      }
    }});

    // Enemy spawning
    this.time.addEvent({ delay: this.enemySpawnRate, repeat: -1, callback: () => {
      if (!this.gameOver) this.spawnEnemy();
    }});

    // Enemy shooting timer (from wave 2+)
    this.time.addEvent({ delay: 3000, repeat: -1, callback: () => {
      if (!this.gameOver && this.wave >= 2) this.enemyShoot();
    }});
  }

  update() {
    if (this.gameOver) return;

    // Star parallax
    const t = this.time.now / 1000;
    this.stars.forEach(s => {
      s.y += s.twinkleSpeed * 1.5;
      if (s.y > H() + 10) { s.y = -10; s.x = Phaser.Math.Between(0, W()); }
      const flicker = Math.sin(t * s.twinkleSpeed * 3) * 0.3 + 0.7;
      s.setAlpha(flicker);
    });

    // Ship movement
    const speed = this.speedBoost ? 500 : 350;
    if (this.touchLeft) {
      this.ship.setVelocityX(-speed);
    } else if (this.touchRight) {
      this.ship.setVelocityX(speed);
    } else {
      this.ship.setVelocityX(0);
    }

    // Clamp ship position
    const margin = 30;
    if (this.ship.x < margin) this.ship.x = margin;
    if (this.ship.x > W() - margin) this.ship.x = W() - margin;

    // Update engine glow
    this.engine.x = this.ship.x;
    this.engine.y = this.ship.y + 28;

    // Shooting
    if (this.touchShoot && !this.shootCooldown) {
      this.shoot();
      this.shootCooldown = true;
      this.time.addEvent({ delay: 200, callback: () => { this.shootCooldown = false; }});
    }

    // Shield timer
    if (this.shieldActive) {
      this.shieldTimer -= 16;
      if (this.shieldTimer <= 0) {
        this.shieldActive = false;
        if (this.ship.getChildByIndex(0)) this.ship.removeChildAt(0);
      } else {
        // Pulse shield
        const pulse = Math.sin(this.time.now / 200) * 0.3 + 0.7;
        const shieldSprite = this.ship.getChildByIndex(0);
        if (shieldSprite) {
          shieldSprite.setAlpha(pulse);
          shieldSprite.setScale(1 + Math.sin(this.time.now / 300) * 0.1);
        }
      }
    }

    // Speed boost timer
    if (this.speedBoost) {
      this.speedTimer -= 16;
      if (this.speedTimer <= 0) this.speedBoost = false;
    }

    // Cleanup off-screen objects
    this.bullets.children.each(b => {
      if (b.y < -30 || b.x < -30 || b.x > W() + 30) b.destroy();
    });
    this.enemyBullets.children.each(b => {
      if (b.y > H() + 30 || b.y < -30 || b.x < -30 || b.x > W() + 30) b.destroy();
    });
    this.enemies.children.forEach(e => {
      if (e.y > H() + 60) e.destroy();
    });

    // Enemy movement & sway
    this.enemies.children.forEach(e => {
      if (!e.active) return;
      const t = this.time.now / 1000;
      e.x += Math.sin(t * 2 + e.getData('phase')) * (e.getData('speed') || 1);

      // Move enemies down slowly
      e.y += (e.getData('fallSpeed') || 0.5) * 16;

      if (e.y > H() + 80) {
        e.destroy();
      }
    });
  }

  shoot() {
    const bullet = this.bullets.get(this.ship.x, this.ship.y - 40);
    if (bullet) {
      bullet.setActive(true).setVisible(true);
      bullet.setVelocityY(-600);
      bullet.body.allowGravity = false;
    }
  }

  spawnEnemy() {
    const types = ['enemyA', 'enemyB'];
    let type = Phaser.Utils.Array.GetRandom(types);
    let hp = 1;

    // Boss in later waves
    if (this.wave >= 3 && Math.random() < 0.2) {
      type = 'enemyC';
      hp = 5;
    } else if (this.wave >= 2 && Math.random() < 0.3) {
      type = 'enemyB';
      hp = 2;
    }

    const enemy = this.enemies.get(Phaser.Math.Between(40, W() - 40), -50, type);
    if (enemy) {
      enemy.setActive(true).setVisible(true);
      enemy.setData('hp', hp);
      enemy.setData('phase', Math.random() * Math.PI * 2);
      enemy.setData('speed', Phaser.Math.FloatBetween(1, 3));
      enemy.setData('fallSpeed', Phaser.Math.FloatBetween(0.5, 1.5 + this.wave * 0.2));
    }
  }

  enemyShoot() {
    const aliveEnemies = this.enemies.children.filter(e => e.active);
    if (aliveEnemies.length === 0) return;

    // Pick a random enemy to shoot
    const shooter = Phaser.Utils.Array.GetRandom(aliveEnemies);
    if (!shooter) return;

    const bullet = this.enemyBullets.get(shooter.x, shooter.y + 24);
    if (bullet) {
      bullet.setActive(true).setVisible(true);
      bullet.setVelocityY(300 + this.wave * 30);
      bullet.body.allowGravity = false;
    }
  }

  hitEnemy(bullets, enemy) {
    bullets.destroy();

    const hp = enemy.getData('hp') - 1;
    enemy.setData('hp', hp);

    // Explosion effect
    this.createExplosion(enemy.x, enemy.y);

    if (hp <= 0) {
      enemy.destroy();
      this.score += enemy.textureKey === 'enemyC' ? 50 : enemy.textureKey === 'enemyB' ? 20 : 10;

      // Chance to drop powerup
      if (Math.random() < 0.15) {
        const pu = this.powerups.get(enemy.x, enemy.y);
        if (pu) {
          pu.setActive(true).setVisible(true);
          pu.setData('type', Math.random() < 0.5 ? 'shield' : 'speed');
          // Slow fall for powerup
          pu.body.setVelocityY(100);
          this.time.addEvent({ delay: 6000, callback: () => { if (pu.active) pu.destroy(); }});
        }
      }
    } else {
      // Flash enemy white on hit
      const origColor = enemy.tint;
      enemy.setTint(0xffffff);
      this.time.addEvent({ delay: 100, callback: () => { enemy.clearTint(); }});
    }
  }

  hitShip(ship, enemy) {
    if (this.shieldActive) return;

    enemy.destroy();
    this.createExplosion(ship.x, ship.y);
    this.lives--;

    // Screen shake
    this.cameras.main.shake(200, 0.01);

    if (this.lives <= 0) {
      this.gameOver = true;
      this.physics.pause();
      showGameOver(this.score);
    }
  }

  collectPowerup(ship, pu) {
    pu.destroy();
    const type = pu.getData('type');

    if (type === 'shield') {
      this.shieldActive = true;
      this.shieldTimer = 8000; // 8 seconds
      const shieldSprite = this.add.sprite(ship.x, ship.y, 'shield');
      shieldSprite.setOrigin(0.5);
      shieldSprite.setDepth(6);
      shieldSprite.setAlpha(0.7);
      ship.addChild(shieldSprite);

      this.time.addEvent({ delay: 8000, callback: () => {
        if (shieldSprite.parentContainer === ship) {
          ship.removeChildAt(0);
          shieldSprite.destroy();
        }
      }});
    } else if (type === 'speed') {
      this.speedBoost = true;
      this.speedTimer = 6000; // 6 seconds

      const text = this.add.text(ship.x, ship.y - 40, '+SPEED', {
        fontSize: '18px', fontFamily: 'Courier New', color: '#0f0'
      }).setOrigin(0.5).setDepth(7);
      this.tweens.add({ targets: text, y: ship.y - 80, alpha: 0, duration: 2000, ease: 'Linear',
        callback: () => text.destroy() });
    }

    // Flash green on collect
    this.cameras.main.flash(150, 0, 255, 0);
  }

  createExplosion(x, y) {
    for (let i = 0; i < 8; i++) {
      const particle = this.add.sprite(x, y, 'explosion');
      particle.setDepth(3);
      particle.setAlpha(1);
      const angle = (Math.PI * 2 / 8) * i;
      const speed = Phaser.Math.FloatBetween(100, 300);
      particle.body.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
      this.tweens.add({
        targets: particle, alpha: 0, scale: 2.5, duration: 400, ease: 'Linear',
        callback: () => particle.destroy()
      });
    }
  }
}

// --- Game Config & Init ---
const config = {
  type: Phaser.AUTO,
  width: W(),
  height: H(),
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    minWidth: 320,
    minHeight: 480
  },
  physics: { default: 'arcade', arcade: { gravityY: 0 } },
  scene: MainScene,
  backgroundColor: '#0a0a1a'
};

let game;

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  if (game) game.destroy(true);
  game = new Phaser.Game(config);
}

function showGameOver(score) {
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h1>GAME OVER</h1>
    <div class="score-display">SCORE: ${score}</div>
    <p>Wave reached: ${game ? game.scene.scenes[0].wave : '?'}</p>
    <button id="restartBtn">PLAY AGAIN</button>
  `;
  document.getElementById('restartBtn').addEventListener('click', () => {
    overlay.style.display = 'none';
    if (game) game.destroy(true);
    game = new Phaser.Game(config);
  });
}

document.getElementById('startBtn').addEventListener('click', startGame);
</script>
</body>
</html>
