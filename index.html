<!-- CHANGELOG
v5.0: Complete rewrite — removed Phaser, pure DOM/CSS rendering for full mobile compatibility
     - Title screen button works on iOS (no Phaser canvas blocking)
     - Sprite rendering via CSS transforms + divs
     - Same game logic (entities, collisions, spawning) retained
-->>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Star Blaster</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;overflow:hidden;touch-action:none;font-family:Arial,sans-serif;}
#gc{width:100vw;height:100vh;position:relative;overflow:hidden;}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,5,30,.95);z-index:100;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#overlay .inner{text-align:center;pointer-events:none;}
#overlay h1{font-size:clamp(36px,10vw,56px);color:#0f4;font-shadow:0 0 12px #0f4;text-shadow:0 0 16px #0f4,0 4px 8px #000;margin-bottom:12px;}
#overlay .sub{font-size:clamp(14px,3.5vw,20px);color:#0ff;margin-bottom:16px;}
#overlay .ctrls{font-size:clamp(12px,3vw,16px);color:#ccc;margin-bottom:24px;line-height:1.5;}
#overlay .tap{font-size:clamp(30px,8vw,48px);color:#0f8;animation:pulse 1.2s ease-in-out infinite;}
#overlay .high{font-size:clamp(16px,4vw,22px);color:#ff0;margin-top:16px;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.sprite{position:absolute;will-change:transform,opacity;}
.player{width:40px;height:52px;background:linear-gradient(180deg,#3445 0%,#234 100%);border-radius:4px;clip-path:polygon(50% 0%,100% 20%,85% 80%,50% 100%,15% 80%,0% 20%);}
.player::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:12px;height:8px;background:radial-gradient(ellipse,#f60,transparent);border-radius:50%;}
.enemy{width:36px;height:36px;border-radius:50%;}
.enemy.fighter{background:radial-gradient(ellipse at center,#f33 0%,#c00 100%);}
.enemy.bomber{width:48px;height:36px;background:radial-gradient(ellipse at center,#fa0 0%,#d80 100%);border-radius:4px;}
.enemy.scout{width:28px;height:28px;background:radial-gradient(ellipse at center,#f0f 0%,#80f 100%);}
.enemy.armored{width:48px;height:48px;background:linear-gradient(135deg,#666 0%,#444 100%);border:2px solid #888;}
.enemy.boss{width:96px;height:52px;background:linear-gradient(180deg,#800 0%,#600 100%);border:3px solid #a00;}
.enemy.boss::before,.enemy.boss::after{content:'';position:absolute;top:10px;width:20px;height:20px;background:#f00;border-radius:50%;box-shadow:0 0 8px #f44;}
.enemy.boss::before{left:10px;}.enemy.boss::after{right:10px;}
.bullet{width:8px;height:16px;background:radial-gradient(ellipse at center,#0f8 0%,#0c6 100%);border-radius:50%;box-shadow:0 0 6px #0f8;}
.enemyBullet{width:8px;height:16px;background:radial-gradient(ellipse at center,#f33 0%,#c00 100%);border-radius:50%;box-shadow:0 0 6px #f33;}
.bomb{width:12px;height:12px;background:radial-gradient(ellipse at center,#ff0 0%,#f80 100%);border-radius:50%;box-shadow:0 0 8px #ff0;}
.powerup{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.powerup.weapon{background:radial-gradient(ellipse at center,#0f0 0%,#0c0 100%);box-shadow:0 0 8px #0f0;}
.powerup.life{background:radial-gradient(ellipse at center,#f0f 0%,#c0c 100%);box-shadow:0 0 8px #f0f;}
.powerup.shield{background:radial-gradient(ellipse at center,#08f 0%,#06c 100%);box-shadow:0 0 8px #08f;}
.powerup.fuel{width:20px;height:20px;background:radial-gradient(ellipse at center,#0ff 0%,#0cc 100%);box-shadow:0 0 8px #0ff;}
.particle{position:absolute;border-radius:50%;pointer-events:none;}
#hud{position:absolute;top:0;left:0;right:0;padding:10px;z-index:50;color:#fff;font-family:monospace;pointer-events:none;}
#hud .score{color:#0f8;font-size:18px;}#hud .high{color:#ff0;font-size:14px;}
#hud .fuel-bar{width:120px;height:16px;background:#333;border-radius:8px;margin-top:4px;overflow:hidden;}
#hud .fuel-fill{height:100%;background:linear-gradient(90deg,#f00,#ff0,#0f0);transition:width .3s;}
#hud .lives{position:absolute;right:10px;top:10px;color:#f00;font-size:20px;}
#hud .distance{position:absolute;right:10px;top:40px;color:#fff;font-size:14px;}
#hud .combo{position:absolute;top:60px;left:50%;transform:translateX(-50%);color:#ff0;font-size:24px;font-weight:bold;text-shadow:0 0 8px #ff0;}
#hud .wave{position:absolute;top:10px;left:50%;transform:translateX(-50%);color:#fff;font-size:16px;text-shadow:0 0 6px #fff;}
#mobile-controls{position:absolute;bottom:0;left:0;right:0;height:50%;z-index:40;}
#mobile-controls .left{position:absolute;left:0;top:0;width:50%;height:50%;background:rgba(0,0,255,.1);}
#mobile-controls .right{position:absolute;right:0;top:0;width:50%;height:50%;background:rgba(255,0,0,.1);}
#mobile-controls .bottom{position:absolute;left:0;bottom:0;width:100%;height:50%;background:rgba(255,255,0,.1);}
#gameover{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:90;display:none;align-items:center;justify-content:center;}
#gameover .content{text-align:center;color:#fff;}
#gameover h2{font-size:48px;color:#f00;text-shadow:0 0 12px #f00;margin-bottom:16px;}
#gameover .score-text{font-size:24px;color:#0f8;margin-bottom:12px;}
#gameover .high-text{font-size:20px;color:#ff0;margin-bottom:16px;}
#gameover .restart{font-size:24px;color:#0f8;cursor:pointer;animation:pulse 1.5s ease-in-out infinite;}
</style>
</head>
<body>
<div id="gc">
  <div id="overlay" onclick="startGame()">
    <div class="inner">
      <h1>STAR BLASTER</h1>
      <div class="sub">Xevious-Style Arcade Shooter</div>
      <div class="ctrls">← → to move | Tap top: shoot<br>Tap bottom: bomb | Collect FUEL!</div>
      <div class="tap">TAP TO START</div>
      <div class="high">HIGH SCORE: <span id="start-high">0</span></div>
    </div>
  </div>
  <div id="gameover" onclick="startGame()">
    <div class="content">
      <h2>GAME OVER</h2>
      <div class="score-text">SCORE: <span id="final-score">0</span></div>
      <div class="high-text">HIGH SCORE: <span id="final-high">0</span></div>
      <div class="restart">TAP TO RESTART</div>
    </div>
  </div>
  <div id="hud" style="display:none;">
    <div class="score">SCORE: <span id="h-score">0</span></div>
    <div class="high">HIGH: <span id="h-high">0</span></div>
    <div class="fuel-bar"><div id="h-fuel" class="fuel-fill" style="width:100%"></div></div>
    <div class="lives">♥ <span id="h-lives">3</span></div>
    <div class="distance">DIST: <span id="h-dist">0000</span></div>
    <div class="combo" id="h-combo"></div>
    <div class="wave" id="h-wave"></div>
  </div>
  <div id="mobile-controls">
    <div class="left" ontouchstart="tl=true" ontouchend="tl=false"></div>
    <div class="right" ontouchstart="tr=true" ontouchend="tr=false"></div>
    <div class="bottom" ontouchstart="tb=true" ontouchend="tb=false"></div>
  </div>
  <div id="sprites"></div>
</div>

<script>
// ================== STATE ==================
let active=false,paused=false,score=0,highScore=parseInt(localStorage.getItem('starBlasterHS')||'0');
let fuel=100,lives=3,dist=0,weaponLevel=1,shieldActive=false,shieldTimer=0;
let comboCount=0,comboTimer=0,difficulty=1,waveNum=0,lastWaveTime=0,waveAnnounceTimer=0;
let bossActive=false,invincibleUntil=0,shakeTime=0,flashTime=0;
let lastShoot=0,lastBomb=0,lastBoss=0,lastFuel=0,lastEnemy=0,lastPw=0;
let tl=false,tr=false,tshoot=false,tb=false,keys={};
let W=()=>window.innerWidth,H=()=>window.innerHeight;

// Entity storage
let entities=[],bullets=[],particles=[],pwrUps=[],fuelPick=[];

// ================== AUDIO ==================
const Audio={ctx:null,mGain:null,noise:null,
  init(){if(this.ctx)return;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.mGain=this.ctx.createGain();this.mGain.gain.value=.7;this.mGain.connect(this.ctx.destination);const n=this.ctx.sampleRate*.5;this.noise=this.ctx.createBuffer(1,n,this.ctx.sampleRate);for(let i=0;i<n;i++)this.noise.getChannelData(0)[i]=Math.random()*2-1}catch(e){}},
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()},
  noise(d,f,v){if(!this.ctx)return;const s=this.ctx.createBufferSource();s.buffer=this.noise;const g=this.ctx.createGain(),fl=this.ctx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=f||800;s.connect(fl);fl.connect(g);g.connect(this.mGain);g.gain.setValueAtTime(v||.4,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+(d||.2));s.start();s.stop(this.ctx.currentTime+(d||.2))},
  shoot(){this.noise(.08,2e3,.3)},bomb(){this.noise(.35,3e2,.5)},explode(){this.noise(.4,6e2,.6)},big(){this.noise(.6,4e2,.8)},hit(){this.noise(.12,220,.35)},pickup(){this.noise(.15,1.2e3,.25)},powerup(){this.noise(.2,1.4e3,.25)},wave(){if(!this.ctx)return;for(let i=0;i<4;i++){const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.mGain);o.type='triangle';const t=this.ctx.currentTime+i*.12;o.frequency.setValueAtTime(330+i*110,t);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25)}}};

// ================== RENDERING ==================
const sprites=document.getElementById('sprites');
function mkEl(c){const d=document.createElement('div');d.className=c;sprites.appendChild(d);return d;}
function pos(e,x,y){e.style.transform=`translate(${Math.round(x-e.w/2)}px,${Math.round(y-e.h/2)}px)`;}
function rm(e){e.el.remove();return e;}

// ================== SPAWNING ==================
function spawnBullet(x,y,type){const e={x,y,vx:0,vy:type==='bomb'?3:-8,w:e.width||8,h:e.height||16,type,el:mkEl(type)};bullets.push(e);return e;}
function spawnEnemy(x,y,type){
  const types={fighter:{hp:1,spd:3.4,pts:70,ch:.003},bomber:{hp:2,spd:1.7,pts:170,ch:.007},scout:{hp:1,spd:5.2,pts:90,ch:.002},armored:{hp:5,spd:1.2,pts:250,ch:.005},boss:{hp:14,spd:.6,pts:1400,ch:.014}};
  const d=types[type]||types.fighter;
  let beh='normal',ang=0,phase=0,vx=(Math.random()-.5)*1.8;
  if(type==='fighter'){beh=['zigzag','strafe','charge'][Math.floor(Math.random()*3)];phase=Math.random()*10;}
  else if(type==='bomber'){beh=['retreat','circle'][Math.floor(Math.random()*2)];ang=Math.random()*10;}
  else if(type==='scout')beh='charge';
  else if(type==='armored'){beh=['circle','zigzag'][Math.floor(Math.random()*2)];ang=Math.random()*10;}
  else if(type==='boss'){beh='strafe';bossActive=true;vx=0;}
  const el=mkEl(`enemy ${type}`);el.w=el.offsetWidth||{fighter:36,bomber:48,scout:28,armored:48,boss:96}[type]||36;el.h=el.offsetHeight||{fighter:36,bomber:36,scout:28,armored:48,boss:52}[type]||36;
  const e={x,y,vx,vy:-d.spd,w:el.w,h:el.h,type,'health':d.hp,'points':d.pts,'data':{speed:d.spd,shootCh:d.ch,behavior:beh,angle:ang,phase,vx,ch2:.015,fled:false,sAtY:false},el};
  entities.push(e);return e;
}
function spawnFuel(x,y){const el=mkEl('powerup fuel');el.w=20;el.h=20;const e={x,y,vx:0,vy:2.1,w:el.w,h:el.h,type:'fuel',data:{type:'fuel'},el};fuelPick.push(e);return e;}
function spawnPowerup(x,y){const types=['weapon','life','shield'],type=types[Math.floor(Math.random()*3)];const el=mkEl(`powerup ${type}`);el.w=24;el.h=24;const e={x,y,vx:0,vy:2.1,w:el.w,h:el.h,type:'powerup',data:{type},el};pwrUps.push(e);return e;}
function spawnParticle(x,y,color,life){const el=mkEl('particle');el.w=el.h=2+Math.random()*4;el.style.backgroundColor=color;const e={x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5-1,w:el.w,h:el.h,data:{life,clr:color},el};particles.push(e);return e;}

// ================== CONTROLS ==================
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '&&active){if(Date.now()-lastShoot>150)shoot();lastShoot=Date.now()}});
document.addEventListener('keyup',e=>{keys[e.key]=false});

// ================== GAME FUNCTIONS ==================
let player=null;
function startGame(){
  Audio.init();Audio.resume();
  document.getElementById('overlay').style.display='none';
  document.getElementById('gameover').style.display='none';
  document.getElementById('hud').style.display='block';
  [entities,bullets,particles,pwrUps,fuelPick].forEach(a=>a.forEach(e=>e.el.remove()));
  entities=[];bullets=[];particles=[];pwrUps=[];fuelPick=[];
  active=true;paused=false;score=0;fuel=100;lives=3;dist=0;weaponLevel=1;shieldActive=false;comboCount=0;comboTimer=0;difficulty=1;waveNum=0;lastWaveTime=Date.now();waveAnnounceTimer=0;bossActive=false;invincibleUntil=Date.now()+1500;
  // Create player
  const p={x:W()/2,y:H()-120,vx:0,vy:0,w:40,h:52,type:'player',el:mkEl('player')};
  pos(p,p.x,p.y);player=p;
}

function shoot(){
  const x=player.x,y=player.y-30;bullets.push(spawnBullet(x,y,'bullet'));Audio.shoot();
  if(weaponLevel>=2){bullets.push(spawnBullet(x-12,y-25,'bullet'));bullets.push(spawnBullet(x+12,y-25,'bullet'));}
  if(weaponLevel>=3){bullets.push(spawnBullet(x-20,y-20,'bullet'));bullets.push(spawnBullet(x+20,y-20,'bullet'));}
}

function dropBomb(){const b=spawnBullet(player.x,player.y+18,'bomb');b.vy=3;b.vx=(Math.random()-.5)*.6;Audio.bomb();}

function enemyShoot(e){
  const b={x:e.x,y:e.y+12,vx:(Math.random()-.5)*1,vy:4,w:8,h:16,type:'enemyBullet',el:mkEl('enemyBullet')};
  bullets.push(b);return b;
}

function updatePlayer(dt){
  if(!player)return;
  const sp=5*dt/16;
  if(tl||keys['ArrowLeft'])player.x=Math.max(20,player.x-sp);
  if(tr||keys['ArrowRight'])player.x=Math.min(W()-20,player.x+sp);
  if((tshoot||keys[' '])&&Date.now()-lastShoot>150)shoot();
  if(Math.random()<.5){spawnParticle(player.x-4,player.y+26,'#f80',15);spawnParticle(player.x+4,player.y+26,'#f80',15);}
}

function updateBullets(dt){for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.x+=b.vx*dt/16;b.y+=b.vy*dt/16;pos(b,b.x,b.y);if(b.y>H()+20||b.y<-20||b.x>W()+20)b.el.remove(),bullets.splice(i,1);}}

function updateEnemies(dt){
  for(let i=entities.length-1;i>=0;i--){
    const e=entities[i];if(e.type!=='enemy')continue;const d=e.data;
    if(d.behavior==='zigzag'){d.phase+=dt/500;e.y+=d.speed*dt/16;e.x+=Math.sin(d.phase)*2.5*dt/16;}
    else if(d.behavior==='retreat'){if(e.y<H()*.6){e.y+=d.speed*dt/16;}else{e.x+=(d.vx||0)*1.5*dt/16;e.y+=d.speed*.3*dt/16;}}
    else if(d.behavior==='charge'){const m=e.y<H()*.5?(1+difficulty*.3):(3+difficulty*.5);e.y+=d.speed*m*dt/16;}
    else if(d.behavior==='circle'){e.y+=d.speed*dt/16;d.angle=(d.angle||0)+dt/800;e.x+=Math.cos(d.angle)*1.2*dt/16;}
    else if(d.behavior==='strafe'){if(e.y<80+Math.random()*40)e.y+=d.speed*dt/16;else if(!d.sAtY){d.sAtY=e.y;enemyShoot(e);}else if(d.ch2&&Math.random()<d.ch2*dt/16){enemyShoot(e);}else if(!d.fled){d.vx=Math.random()>.5?d.speed:-d.speed;d.fled=true;}else{e.x+=(d.vx||0)*dt/16;e.y+=d.speed*.2*dt/16;}}
    else{e.y+=d.speed*dt/16;if(e.type==='fighter'){const r=(Date.now()/380);d.vx=d.vx*.96+Math.sin(r)*.8;e.x+=d.vx*dt/16;}}
    if(d.shootCh&&Math.random()<d.shootCh*dt/16)enemyShoot(e);
    if(e.y>H()+50||e.x<-50||e.x>W()+50){e.el.remove();entities.splice(i,1);if(e.type==='boss')bossActive=false;}
  }
}

function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt/16;p.y+=p.vy*dt/16;p.data.life-=dt;if(p.data.life<=0){p.el.remove();particles.splice(i,1);continue;}pos(p,p.x,p.y);p.el.style.opacity=Math.max(.1,p.data.life/25);}}

function updatePopups(dt){
  if(!window.popups)window.popups=[];
  for(let i=window.popups.length-1;i>=0;i--){const p=window.popups[i];p.life-=dt;p.y-=.8*dt/16;pos(p,p.x,p.y);p.el.style.opacity=p.life/1200;if(p.life<=0){p.el.remove();window.popups.splice(i,1);}}
}

function checkCollisions(){
  // Bullets vs enemies
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];if(b.type==='enemyBullet')continue;
    for(let j=entities.length-1;j>=0;j--){
      const e=entities[j];if(e.type!=='enemy')continue;
      const hx=e.data.type==='bomber'?30:e.data.type==='armored'?32:26,hy=e.data.type==='bomber'?24:e.data.type==='armored'?28:26;
      if(Math.abs(b.x-e.x)<hx&&Math.abs(b.y-e.y)<hy){
        e.health--;b.el.remove();bullets.splice(i,1);
        if(e.health<=0){score+=e.pts;Audio.explode();
          for(let k=0;k<18;k++)spawnParticle(e.x,e.y,'#ffaa00');
          window.popups.push({x:e.x,y:e.y,text:`+${e.pts}`,el:mkEl(''),life:1200});
          e.el.remove();entities.splice(j,1);comboCount++;comboTimer=2200;
          if(e.data.type==='boss')bossActive=false;
          if(Math.random()<.15)spawnPowerup(Math.random()*(W()-50)+25,Math.random()*H()*.3+50);
        }else{Audio.hit();}break;
      }
    }
  }
  // Fuel pickups vs player
  for(let i=fuelPick.length-1;i>=0;i--){const f=fuelPick[i];if(Math.abs(f.x-player.x)<30&&Math.abs(f.y-player.y)<30){fuel=Math.min(100,fuel+32);Audio.pickup();f.el.remove();fuelPick.splice(i,1);break;}}
  // Powerups vs player
  for(let i=pwrUps.length-1;i>=0;i--){const p=pwrUps[i];if(Math.abs(p.x-player.x)<30&&Math.abs(p.y-player.y)<30){if(p.data.type==='weapon'){weaponLevel=Math.min(3,weaponLevel+1);window.popups.push({x:p.x,y:p.y,text:'WEAPON UP!',el:mkEl(''),life:1200});}else if(p.data.type==='life'){lives++;window.popups.push({x:p.x,y:p.y,text:'+1 LIFE!',el:mkEl(''),life:1200});}else if(p.data.type==='shield'){shieldActive=true;shieldTimer=8e3;window.popups.push({x:p.x,y:p.y,text:'SHIELD!',el:mkEl(''),life:1200});}Audio.powerup();p.el.remove();pwrUps.splice(i,1);}}
  // Enemy bullets vs player
  const now=Date.now();if(now<invincibleUntil)return;
  for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];if(b.type!=='enemyBullet')continue;if(shieldActive&&Math.abs(b.x-player.x)<32&&Math.abs(b.y-player.y)<32){Audio.hit();for(let k=0;k<6;k++)spawnParticle(b.x,b.y,'#08f','#ffaa00');b.el.remove();bullets.splice(i,1);continue;}if(Math.abs(b.x-player.x)<22&&Math.abs(b.y-player.y)<28){Audio.hit();b.el.remove();bullets.splice(i,1);loseLife();break;}}
  // Enemies vs player
  for(let i=entities.length-1;i>=0;i--){const e=entities[i];if(e.type!=='enemy')continue;if(now<invincibleUntil)continue;if(Math.abs(e.x-player.x)<30&&Math.abs(e.y-player.y)<35){if(shieldActive){for(let k=0;k<18;k++)spawnParticle(e.x,e.y,'#ffaa00');e.el.remove();entities.splice(i,1);shieldActive=false;continue;}Audio.explode();for(let k=0;k<18;k++)spawnParticle(e.x,e.y,'#ffaa00');e.el.remove();entities.splice(i,1);loseLife();shakeTime=340;}}
}

function loseLife(){lives--;invincibleUntil=Date.now()+1500;shakeTime=520;flashTime=340;if(lives<=0)gameOver();}
function gameOver(){active=false;paused=false;Audio.noise(1,200,.5);if(score>highScore){highScore=score;localStorage.setItem('starBlasterHS',highScore.toString());}document.getElementById('final-score').textContent=score;document.getElementById('final-high').textContent=highScore;document.getElementById('gameover').style.display='flex';}

// ================== MAIN LOOP ==================
let lastT=Date.now();
function loop(){
  const now=Date.now(),dt=Math.min(now-lastT,50);lastT=now;
  if(active&&!paused){
    if(now-lastWaveTime>2e4){waveNum++;lastWaveTime=now;waveAnnounceTimer=2e3;Audio.wave();}
    if(waveAnnounceTimer>0)waveAnnounceTimer-=dt;
    difficulty=1+Math.floor(now/3e4)*.12;
    if(now-lastEnemy>1600/difficulty){spawnEnemy(Math.random()*W()*.65+W()/2,H()-40);lastEnemy=now;}
    if(now-lastBoss>45e3){spawnEnemy(Math.random()*W()*.65+W()/2,-40);lastBoss=now;}
    if(now-lastFuel>1e4){spawnFuel(Math.random()*(W()-50)+25,-20);lastFuel=now;}
    if(now-lastPw>15e3){spawnPowerup(Math.random()*(W()-50)+25,Math.random()*H()*.3+50);lastPw=now;}
    updatePlayer(dt);updateBullets(dt);updateEnemies(dt);updateParticles(dt);updatePopups(dt);checkCollisions();
    if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)comboCount=0;}
    if(now-window._lastFuel>1e3){fuel=Math.max(0,fuel-1);window._lastFuel=now;if(fuel<=0)loseLife();}
    dist+=dt/1e3;shakeTime>0?shakeTime-=dt:0;flashTime>0?flashTime-=dt:0;shieldActive?(shieldTimer-=dt,shieldTimer<=0&&!(shieldActive=false)):0;
    // Update HUD
    document.getElementById('h-score').textContent=score;document.getElementById('h-high').textContent=highScore;document.getElementById('h-lives').textContent=lives;
    document.getElementById('h-fuel').style.width=fuel+'%';document.getElementById('h-dist').textContent=Math.floor(dist).toString().padStart(4,'0');
    if(comboCount>=2){document.getElementById('h-combo').textContent='COMBO x'+comboCount;document.getElementById('h-combo').style.display='block';}else{document.getElementById('h-combo').textContent='';document.getElementById('h-combo').style.display='none';}
    if(waveAnnounceTimer>0)document.getElementById('h-wave').textContent='WAVE '+waveNum;else document.getElementById('h-wave').textContent='';
  }
  requestAnimationFrame(loop);
}

document.getElementById('start-high').textContent=highScore;
requestAnimationFrame(loop);
</script>
