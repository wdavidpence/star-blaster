<!-- v0.0.6 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Star Blaster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:Arial,sans-serif}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#050a20;z-index:10;display:flex;align-items:center;justify-content:center;cursor:pointer}
#overlay h1{font-size:clamp(32px,9vw,64px);color:#0f8;text-shadow:0 0 20px #0f8;margin-bottom:16px}
#overlay .sub{font-size:clamp(12px,3vw,18px);color:#0ff;margin-bottom:20px}
#overlay .tap{font-size:clamp(24px,7vw,48px);color:#0fa;animation:pulse 1.2s ease-in-out infinite}
#overlay .high{font-size:clamp(14px,3.5vw,20px);color:#ff0;margin-top:20px}
#overlay .ctrls{font-size:clamp(10px,2.5vw,14px);color:#aaa;margin-bottom:30px;line-height:1.6}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#gameCanvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:0;left:0;right:0;padding:8px 12px;color:#fff;font-family:monospace;font-size:13px;z-index:5;pointer-events:none;display:none}
#hud .score{color:#0f8}.fuel-bar{width:100px;height:12px;background:#333;border-radius:6px;margin-top:4px;overflow:hidden}
.fuel-fill{height:100%;background:linear-gradient(90deg,#f00,#ff0,#0f8);transition:width .2s}
#hud .combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff0;font-size:28px;font-weight:bold;text-shadow:0 0 10px #ff0;pointer-events:none}
#gameover{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9;display:none;align-items:center;justify-content:center}
#gameover .inner{text-align:center;color:#fff}
#gameover h2{font-size:48px;color:#f00;text-shadow:0 0 12px #f00;margin-bottom:16px}
#gameover .score-text{font-size:24px;color:#0f8;margin-bottom:12px}
#gameover .restart{font-size:20px;color:#0fa;animation:pulse 1.5s ease-in-out infinite;margin-top:20px}
</style>
</head>
<body>
<div id="overlay">
  <div style="text-align:center">
    <div style="font-size:10px;color:#555;margin-bottom:4px">v0.0.6</div>
    <h1>STAR BLASTER</h1>
    <div class="sub">Xevious-Style Arcade Shooter</div>
    <div class="ctrls">Swipe to move &bull; Shoot auto<br>Collect FUEL before it runs out</div>
    <div class="tap">TAP TO START</div>
    <div class="high">HIGH SCORE: <span id="hs">0</span></div>
  </div>
</div>
<div id="hud">
  <span class="score">SCORE: <span id="sc">0</span></span> &nbsp;
  <span style="color:#ff0">HIGH: <span id="hs2">0</span></span>
  <div class="fuel-bar"><div id="fuel" class="fuel-fill" style="width:100%"></div></div>
  <span id="lives" style="position:fixed;right:12px;top:8px;color:#f00;font-size:16px">♥ 3</span>
  <span id="combo" class="combo"></span>
</div>
<div id="gameover">
  <div class="inner"><h2>GAME OVER</h2><div class="score-text">SCORE: <span id="fs">0</span></div><div class="restart">TAP TO RESTART</div></div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
// ===== CANVAS SETUP =====
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ===== STATE =====
let active=false,paused=false,score=0,highScore=parseInt(localStorage.getItem('starHS')||'0');
let fuel=100,lives=3,weaponLevel=1,shieldActive=false,shieldTimer=0;
let comboCount=0,comboTimer=0,difficulty=1,waveNum=0,lastWaveTime=0,waveAnnounceTimer=0;
let invincibleUntil=0,shakeTime=0,dist=0,lastShoot=0;
const keys={},touch={x:W/2,y:H/2,down:false,speed:5};

// ===== ENTITIES =====
let player=null,bullets=[],bulletsEnemy=[],powerups=[],fuelPickups=[],particles=[],popups=[],enemies=[];

// ===== AUDIO (Web Audio API) =====
const Audio={
  ctx:null,
  init(){if(!this.ctx){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.master=this.ctx.createGain();this.master.gain.value=.5;this.master.connect(this.ctx.destination)}catch(e){}}},
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()},
  sfx(type){if(!this.ctx)return;const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.master);
    switch(type){
      case'shoot':o.type='square';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(440,t+.06);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);o.start(t);o.stop(t+.06);break;
      case'explode':{const n=this.ctx.sampleRate*.3,buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const s=this.ctx.createBufferSource();s.buffer=buf;const f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(800,t);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);s.connect(f);f.connect(g);g.connect(this.master);s.start(t);s.stop(t+.3);break}
      case'powerup':o.type='square';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(1200,t+.15);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);break;
      case'wave':for(let i=0;i<4;i++){const o2=this.ctx.createOscillator(),g2=this.ctx.createGain();o2.connect(g2);g2.connect(this.master);o2.type='triangle';const tt=t+i*.1;o2.frequency.setValueAtTime(330+i*110,tt);g2.gain.setValueAtTime(.2,tt);g2.gain.exponentialRampToValueAtTime(.001,tt+.2);o2.start(tt);o2.stop(tt+.2)}break;
    }},
  shoot(){this.sfx('shoot')},explode(){this.sfx('explode')},powerup(){this.sfx('powerup')},wave(){this.sfx('wave')}
};

// ===== DRAWING HELPERS =====
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x-w/2,y-h/2,w,h)}
function circle(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}
function starfield(){ctx.fillStyle='#fff';for(let i=0;i<120;i++){const x=(i*137.5+Date.now()*.01*(1+(i%5)*.2))%W;const y=(i*73.1+Date.now()*.005*(1+(i%3)*.3))%H;ctx.globalAlpha=.3+.7*Math.random();ctx.fillRect(x,y,1+(i%2),1+(i%3))}ctx.globalAlpha=1}

function drawPlayer(){
  if(!player)return;const{px,py}=player;
  ctx.fillStyle='#345';ctx.beginPath();ctx.moveTo(px,py-26);ctx.lineTo(px+10,py+24);ctx.lineTo(px+2,py+20);ctx.lineTo(px-2,py+20);ctx.lineTo(px-10,py+24);ctx.closePath();ctx.fill();
  ctx.fillStyle='#234';ctx.beginPath();ctx.moveTo(px-10,py+8);ctx.lineTo(px-16,py+20);ctx.lineTo(px-4,py+18);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(px+10,py+8);ctx.lineTo(px+16,py+20);ctx.lineTo(px+4,py+18);ctx.closePath();ctx.fill();
  circle(px,py-8,3,'#0f8');
  const f=6+Math.random()*4;ctx.fillStyle=`hsl(${25+Math.random()*15},100%,${50+Math.random()*30}%)`;
  ctx.beginPath();ctx.moveTo(px-4,py+20);ctx.lineTo(px,py+20+f);ctx.lineTo(px+4,py+20);ctx.fill();
  if(shieldActive){ctx.strokeStyle='rgba(0,136,255,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(px,py,28,0,Math.PI*2);ctx.stroke();}
  if(Date.now()<invincibleUntil){ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(px,py,26,0,Math.PI*2);ctx.stroke()}
}

function drawEnemy(e){
  const{x,y,type}=e,d=e.data;
  if(type==='fighter'){
    ctx.fillStyle='#f00';ctx.beginPath();ctx.moveTo(x,y+16);ctx.lineTo(x-14,y-12);ctx.lineTo(x+14,y-12);ctx.closePath();ctx.fill();
    ctx.fillStyle='#f33';ctx.fillRect(x-2,y-14,5,10);
    ctx.fillStyle='#600';ctx.fillRect(x-7,y+8,4,5);ctx.fillRect(x+3,y+8,4,5);
  }else if(type==='bomber'){
    rect(x,y,32,20,'#d80');ctx.fillStyle='#a60';rect(x,y-4,12,8);rect(x+8,y-4,12,8);
    ctx.fillStyle='#ff0';circle(x,y,3,'#ff0');
  }else if(type==='scout'){
    ctx.fillStyle='#80f';ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c0f';circle(x,y,6,'#c0f');
  }else if(type==='armored'){
    ctx.fillStyle='#666';ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#999';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#444';circle(x,y,8,'#444');ctx.fillStyle='#f00';circle(x,y,3,'#f00');
  }else if(type==='boss'){
    rect(x,y,64,32,'#800');ctx.fillStyle='#a00';rect(x,y-16,52,32);
    ctx.fillStyle='#600';rect(x-10,y-4,10,20);rect(x+60,y-4,10,20);
    ctx.fillStyle='#f80';circle(x-30,y-8,6,'#f80');circle(x+30,y-8,6,'#f80');
    ctx.fillStyle='#ff0';circle(x,y,10,'#ff0');ctx.fillStyle='#f80';circle(x,y,4,'#f80');
    const hp=d.hp/d.maxHp;ctx.fillStyle='#400';ctx.fillRect(x-32,y+22,64,4);ctx.fillStyle=hp>.5?'#0f0':hp>.25?'#ff0':'#f00';ctx.fillRect(x-32,y+22,64*hp,4);
  }
}

// ===== SPAWNING =====
function spawnBullet(x,y,dir=-1){bullets.push({x,y,vx:0,vy:8*dir,type:'player'})}
function spawnEnemyBullet(x,y){bulletsEnemy.push({x,y,vx:(Math.random()-.5)*2,vy:3,type:'enemy'})}
function spawnEnemy(x,y,type){
  const types={fighter:{hp:1,spd:3.4,pts:70,ch:.003},bomber:{hp:2,spd:1.7,pts:170,ch:.007},scout:{hp:1,spd:5.2,pts:90,ch:.002},armored:{hp:5,spd:1.2,pts:250,ch:.005},boss:{hp:14,spd:.6,pts:1400,ch:.014}};
  const d=types[type]||types.fighter;
  let beh='normal',ang=0,phase=0,vx=(Math.random()-.5)*1.8;
  if(type==='fighter'){beh=['zigzag','strafe','charge'][Math.floor(Math.random()*3)];phase=Math.random()*10}
  else if(type==='bomber'){beh=['retreat','circle'][Math.floor(Math.random()*2)];ang=Math.random()*10}
  else if(type==='scout')beh='charge';
  else if(type==='armored'){beh=['circle','zigzag'][Math.floor(Math.random()*2)];ang=Math.random()*10}
  else if(type==='boss'){beh='strafe'}
  const e={x,y,type,data:{...d,maxHp:d.hp,behavior:beh,angle:ang,phase,vx,speed:d.spd,ch2:.015,fled:false,sAtY:false}};
  enemies.push(e);return e
}
function spawnFuel(){fuelPickups.push({x:Math.random()*(W()-50)+25,y:-15,type:'fuel'})}
function spawnPowerup(){const t=['weapon','life','shield'][Math.floor(Math.random()*3)];powerups.push({x:Math.random()*(W()-50)+25,y:-15,type:'powerup',ptype:t})}
function spawnParticle(x,y,color,life){particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-1,life:life||rnd(10,20),color,r:rnd(2,5)})}
function spawnPop(x,y,text){popups.push({x,y,text,life:1000})}
function rnd(a,b){return a+Math.random()*(b-a)}

// ===== INPUT (Touch + Keyboard) =====
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];touch.x=t.clientX;touch.y=t.clientY;touch.down=true;Audio.init();Audio.resume()},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];touch.x=t.clientX;touch.y=t.clientY},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();touch.down=false},{passive:false});
canvas.addEventListener('mousedown',()=>{Audio.init();Audio.resume()});
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '&&active){shoot();lastShoot=Date.now()}});
document.addEventListener('keyup',e=>{keys[e.key]=false});

function shoot(){Audio.shoot();for(let i=0;i<weaponLevel&&i<3;i++){const dx=i*12-(weaponLevel-1)*6;spawnBullet(player.px+dx,player.py-26,-1)}}

// ===== GAME FUNCTIONS =====
function startGame(){
  Audio.init();Audio.resume();
  document.getElementById('overlay').style.display='none';
  document.getElementById('gameover').style.display='none';
  document.getElementById('hud').style.display='block';
  player=null;enemies=[];bullets=[];bulletsEnemy=[];powerups=[];fuelPickups=[];particles=[];popups=[];
  active=true;paused=false;score=0;fuel=100;lives=3;weaponLevel=1;shieldActive=false;
  comboCount=0;comboTimer=0;difficulty=1;waveNum=0;lastWaveTime=Date.now();waveAnnounceTimer=0;
  invincibleUntil=Date.now()+1500;dist=0;shakeTime=0;
  player={px:W/2,py:H-100};
}

function loseLife(){
  lives--;invincibleUntil=Date.now()+1500;shakeTime=400;
  for(let i=0;i<20;i++)spawnParticle(player.px,player.py,'#f00');
  if(lives<=0)gameOver();
}

function gameOver(){
  active=false;document.getElementById('hud').style.display='none';
  if(score>highScore){highScore=score;localStorage.setItem('starHS',highScore)}
  document.getElementById('fs').textContent=score;
  document.getElementById('gameover').style.display='flex';
}

// ===== COLLISIONS =====
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function update(){
  if(!active||paused)return;const now=Date.now(),dt=Math.min(now-(loop.lastTime||now),50);loop.lastTime=now;

  if(now-lastWaveTime>20000){waveNum++;lastWaveTime=now;waveAnnounceTimer=2500;Audio.wave()}
  if(waveAnnounceTimer>0)waveAnnounceTimer-=dt;

  difficulty=1+Math.floor(now/30000)*.12;

  if(now-loop._lastEnemy>Math.max(600,1500/difficulty)){spawnEnemy(Math.random()*W()*.6+W()/2,-40,['fighter','bomber','scout','armored'][Math.floor(Math.random()*4)]);loop._lastEnemy=now}
  if(now-loop._lastBoss>50000){spawnEnemy(W()/2+Math.random()*100-50,-40,'boss');loop._lastBoss=now}
  if(now-loop._lastFuel>9000){spawnFuel();loop._lastFuel=now}
  if(now-loop._lastPw>12000){spawnPowerup();loop._lastPw=now}

  const dx=touch.x-player.px,dy=touch.y-(player.py-60);
  const mag=Math.hypot(dx,dy)||1;
  player.px+=dx/mag*Math.min(touch.speed*dt/16,30);
  player.py-=dy/mag*Math.min(touch.speed*dt/16,20);
  player.px=Math.max(18,Math.min(W()-18,player.px));
  player.py=Math.max(H*.3,Math.min(H-40,player.py));

  if(touch.down&&now-loop._lastShot>120){shoot();loop._lastShot=now}

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx*dt/16;b.y+=b.vy*dt/16;
    if(b.y<-20||b.x<-20||b.x>W()+20){bullets.splice(i,1);continue}
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];const ew=e.type==='boss'?32:e.type==='armored'?20:18;
      if(Math.hypot(b.x-e.x,b.y-e.y)<ew+5){
        e.data.hp--;b._dead=true;spawnParticle(b.x,b.y,'#0f8',12);
        if(e.data.hp<=0){score+=e.data.pts;Audio.explode();for(let k=0;k<25;k++)spawnParticle(e.x,e.y,['#ff0','#f80','#f00'][k%3]);spawnPop(e.x,e.y,'+'+e.data.pts);comboCount++;comboTimer=2500;
          if(e.data.type==='boss')shakeTime=600;if(Math.random()<.15)spawnPowerup()}
        enemies.splice(j,1);break
      }
    }
  }
  bullets=bullets.filter(b=>!b._dead);

  for(let i=bulletsEnemy.length-1;i>=0;i--){
    const b=bulletsEnemy[i];b.x+=b.vx*dt/16;b.y+=b.vy*dt/16;
    if(b.y>H()+20){bulletsEnemy.splice(i,1);continue}
    if(now<invincibleUntil)continue;
    if(Math.hypot(b.x-player.px,b.y-player.py)<18){Audio.sfx('hit');bulletsEnemy.splice(i,1);loseLife();continue}
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];const d=e.data;let vy=d.spd*dt/16,vx=0;
    if(d.behavior==='zigzag'){d.phase=(d.phase||0)+dt/500;vx=Math.sin(d.phase)*2.5*dt/16}
    else if(d.behavior==='retreat'){vy=(e.y<H()*.5)?d.spd:0;vx=d.spd*1.5*dt/16}
    else if(d.behavior==='charge'){const m=e.y<H()*.4?(1+difficulty*.3):(3+difficulty*.5);vy=d.spd*m*dt/16}
    else if(d.behavior==='circle'){d.angle=(d.angle||0)+dt/800;vx=Math.cos(d.angle)*1.2*dt/16}
    else if(d.behavior==='strafe'){if(e.y<80+Math.random()*40)vy=d.spd*dt/16;else if(!d.sAtY){d.sAtY=e.y;spawnEnemyBullet(e.x,e.y+16)}else if(d.ch2&&Math.random()<d.ch2*dt/16){spawnEnemyBullet(e.x,e.y+16)}else if(!d.fled){vx=(Math.random()>.5?1:-1)*d.spd*dt/16;d.fled=true}else{vy=d.spd*.2*dt/16}}
    else{vx=(Math.random()-.5)*.8}
    e.x+=vx*dt/16;e.y+=vy*dt/16;
    if(d.ch){spawnEnemyBullet(e.x,e.y+16)}
    if(d.shootCh&&Math.random()<d.shootCh*dt/16)spawnEnemyBullet(e.x,e.y+16);
    if(e.y>H()+50||e.x<-50||e.x>W()+50){enemies.splice(i,1);continue}
    if(now<invincibleUntil)continue;
    const pw=16,ph=26;
    if(Math.abs(e.x-player.px)<ew+pw&&Math.abs(e.y-player.py)<18+ph){
      if(shieldActive){for(let k=0;k<20;k++)spawnParticle(e.x,e.y,'#f80');enemies.splice(i,1);shieldActive=false}
      else{Audio.explode();for(let k=0;k<25;k++)spawnParticle(e.x,e.y,'#f80');enemies.splice(i,1);loseLife();}
    }
  }

  for(let i=fuelPickups.length-1;i>=0;i--){
    const f=fuelPickups[i];f.y+=2*dt/16;
    if(Math.hypot(f.x-player.px,f.y-player.py)<20){fuel=Math.min(100,fuel+35);Audio.powerup();spawnPop(f.x,f.y,'FUEL');fuelPickups.splice(i,1);continue}
    if(f.y>H()+20)fuelPickups.splice(i,1)
  }

  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];p.y+=2*dt/16;
    if(Math.hypot(p.x-player.px,p.y-player.py)<20){
      if(p.ptype==='weapon')weaponLevel=Math.min(3,weaponLevel+1);
      else if(p.ptype==='life')lives++;
      else{shieldActive=true;shieldTimer=8000}
      Audio.powerup();spawnPop(p.x,p.y,''+p.ptype.toUpperCase());powerups.splice(i,1);continue;
    }
    if(p.y>H()+20)powerups.splice(i,1)
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt/16;p.y+=p.vy*dt/16;p.vy+=.12;p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue}
  }

  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];p.y-=1*dt/16;p.life-=dt;
    if(p.life<=0){popups.splice(i,1);continue}
  }

  comboTimer>0?comboTimer-=dt:(comboCount=0);
  if(now-(loop._lastFuel||now)>1000){fuel=Math.max(0,fuel-1);loop._lastFuel=now;if(fuel<=0)loseLife()}
  dist+=dt/1e3;shakeTime>0?shakeTime-=dt:0;shieldActive?(shieldTimer-=dt,shieldTimer<=0&&!(shieldActive=false)):0;

  document.getElementById('sc').textContent=score;document.getElementById('hs2').textContent=highScore;
  document.getElementById('fuel').style.width=fuel+'%';
  document.getElementById('lives').textContent='♥ '+lives;
  document.getElementById('combo').textContent=comboCount>=2?'COMBO x'+comboCount:'';
}

// ===== RENDERING =====
function render(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(shakeTime>0){ctx.save();ctx.translate((Math.random()-.5)*6,((Math.random()-.5)*6));}
  starfield();

  const moonY=H*0.15;ctx.fillStyle='#1a2';ctx.beginPath();
  for(let i=0;i<=W;i+=4){const h=Math.sin((i+Date.now()*.01)*.01)*30+Math.sin((i+Date.now()*.02)*.03)*15;ctx.lineTo(i,moonY-h+H*0.6)}
  ctx.lineTo(W,moonY+H);ctx.lineTo(0,moonY+H);ctx.fill();

  ctx.fillStyle='#1a3';ctx.beginPath();
  for(let i=0;i<=W;i+=4){const h=Math.sin((i+Date.now()*.02)*.015)*40+Math.sin((i+Date.now()*.03)*.025)*20;ctx.lineTo(i,H*.75-h+10)}
  ctx.lineTo(W,moonY+H);ctx.lineTo(0,moonY+H);ctx.fill();

  ctx.fillStyle='#333';ctx.fillRect(W/2-28,0,56,H);
  ctx.strokeStyle='#aa0';ctx.setLineDash([16,12]);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);

  enemies.forEach(e=>drawEnemy(e));
  bullets.forEach(b=>{ctx.fillStyle='#0f8';ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill()});
  bulletsEnemy.forEach(b=>{ctx.fillStyle='#f33';ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill()});

  fuelPickups.forEach(f=>{ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(f.x,f.y,8,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke()});

  powerups.forEach(p=>{
    const c=p.ptype==='weapon'?'#0f0':p.ptype==='life'?'#f0f':'#08f';
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(p.x-3,p.y-3,4,0,Math.PI*2);ctx.fill()
  });

  particles.forEach(p=>{ctx.globalAlpha=Math.min(1,p.life/20);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.life/20),0,Math.PI*2);ctx.fill()});
  ctx.globalAlpha=1;

  popups.forEach(p=>{ctx.globalAlpha=Math.min(1,p.life/500);ctx.fillStyle='#ff0';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1});

  drawPlayer();

  if(shakeTime>0)ctx.restore();
}

loop={lastTime:Date.now(),_lastEnemy:Date.now(),_lastBoss:Date.now(),_lastFuel:Date.now(),_lastPw:Date.now(),_lastShot:0};

function loop(){
  requestAnimationFrame(loop);
  update();
  render();
}

requestAnimationFrame(function boot(){
  if(!active){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);starfield()}
  setTimeout(boot,16)
})();

document.getElementById('hs').textContent=highScore;

// Click handler for the overlay
document.getElementById('overlay').addEventListener('click',function(){startGame()});
document.getElementById('gameover').addEventListener('click',function(){startGame()});
</script>
