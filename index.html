<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Star Blaster</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; touch-action: none; }
    #game-container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script>
    // ================== AUDIO SYSTEM ==================
    const AudioSystem = {
      ctx: null, masterGain: null, musicGain: null, musicOsc: null, musicNote: 0,
      musicInterval: null,
      init() {
        if (this.ctx) return;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.masterGain = this.ctx.createGain();
          this.masterGain.gain.value = 0.7;
          this.masterGain.connect(this.ctx.destination);
          this.musicGain = this.ctx.createGain();
          this.musicGain.gain.value = 0.12;
          this.musicGain.connect(this.masterGain);
        } catch (e) { console.error('Audio init failed:', e); }
      },
      resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
      // Simple arpeggio loop - low hum
      startMusic() {
        if (this.musicInterval) return;
        const notes = [110, 146.8, 164.8, 146.8, 130.8, 110, 98, 110];
        let idx = 0;
        this.musicInterval = setInterval(() => {
          if (!this.ctx || this.ctx.state !== 'running') return;
          const osc = this.ctx.createOscillator();
          const g = this.ctx.createGain();
          osc.connect(g); g.connect(this.musicGain);
          osc.type = 'sine';
          osc.frequency.value = notes[idx];
          g.gain.setValueAtTime(0.3, this.ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
          osc.start(); osc.stop(this.ctx.currentTime + 0.5);
          idx = (idx + 1) % notes.length;
        }, 500);
      },
      stopMusic() { if (this.musicInterval) { clearInterval(this.musicInterval); this.musicInterval = null; } },
      playShoot() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.masterGain);
        osc.type = 'square'; osc.frequency.setValueAtTime(880, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.start(); osc.stop(this.ctx.currentTime + 0.1);
      },
      playBomb() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.masterGain);
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        osc.start(); osc.stop(this.ctx.currentTime + 0.2);
      },
      playExplosion() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.masterGain);
        osc.type = 'square'; osc.frequency.setValueAtTime(120, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.start(); osc.stop(this.ctx.currentTime + 0.3);
      },
      playHit() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.masterGain);
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110, this.ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
        osc.start(); osc.stop(this.ctx.currentTime + 0.15);
      },
      playBossAlert() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.masterGain);
        osc.type = 'square'; osc.frequency.setValueAtTime(55, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(65, this.ctx.currentTime + 1);
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1);
        osc.start(); osc.stop(this.ctx.currentTime + 1);
      },
      playFuelPickup() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.masterGain);
        osc.type = 'sine'; osc.frequency.setValueAtTime(440, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(880, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);
        osc.start(); osc.stop(this.ctx.currentTime + 0.2);
      },
      playWaveAnnounce() {
        if (!this.ctx) return;
        for (let i = 0; i < 3; i++) {
          const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
          osc.connect(g); g.connect(this.masterGain);
          osc.type = 'triangle';
          const t = this.ctx.currentTime + i * 0.15;
          osc.frequency.setValueAtTime(440 + i * 100, t);
          g.gain.setValueAtTime(0.3, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
          osc.start(t); osc.stop(t + 0.2);
        }
      }
    };

    // ================== GAME STATE ==================
    let game, player, bullets = [], enemies = [], enemyBullets = [], fuelPickups = [], powerups = [], terrain = [], particles = [];
    let score = 0, fuel = 100, lives = 3, gameActive = false, bossActive = false;
    let comboCount = 0, comboTimer = 0, difficulty = 1, distance = 0, highScore = parseInt(localStorage.getItem('starBlasterHigh') || '0');
    let lastShootTime = 0, lastBombTime = 0, lastBossSpawn = 0, lastFuelSpawn = 0, lastEnemySpawn = 0, shakeTime = 0, flashTime = 0;
    let touchLeft = false, touchRight = false, touchShoot = false, touchBomb = false;
    let keys = {};
    let scavActive = false, solvalou = null, groundEnemies = [], missileWarnings = [];
    let scavGraphics = null;
    let invincibleUntil = 0;
    let isPaused = false;
    let waveNum = 0, lastWaveTime = 0, waveAnnounceTimer = 0;
    let scorePopups = [];
    let titleStarAnim = [];
    let weaponLevel = 1, shieldActive = false, shieldTimer = 0;

    const config = {
      type: Phaser.AUTO, parent: 'game-container',
      width: window.innerWidth, height: window.innerHeight, backgroundColor: '#000',
      scene: { preload: preload, create: create, update: update }
    };

    function preload() {}

    function create() {
      this.input.on('pointerdown', () => { AudioSystem.init(); AudioSystem.resume(); });
      showTitleScreen(this);
      addTouchControls(this);
      addHUD(this);
      gameActive = false;
      this.input.keyboard.on('keydown', (e) => { keys[e.key] = true; handleKeyboard(this, e); });
      this.input.keyboard.on('keyup', (e) => { keys[e.key] = false; });
    }

    function update(time, delta) {
      if (!gameActive || isPaused) return;

      // Wave announcements
      if (time - lastWaveTime > 20000) {
        waveNum++;
        lastWaveTime = time;
        waveAnnounceTimer = 2000;
        AudioSystem.playWaveAnnounce();
      }
      if (waveAnnounceTimer > 0) waveAnnounceTimer -= delta;

      difficulty = 1 + Math.floor(time / 30000) * 0.12;
      if (time - lastEnemySpawn > 1600 / difficulty) { spawnEnemy(this); lastEnemySpawn = time; }
      if (time - lastBossSpawn > 45000) { spawnBoss(this); lastBossSpawn = time; }
      if (time - lastFuelSpawn > 10000) { spawnFuel(this); lastFuelSpawn = time; }
      if (time - lastFuelSpawn > 15000) { spawnPowerup(this); lastFuelSpawn = time; } // Iter 24: Power-ups
      updatePlayer(this, time, delta);
      updateBullets(this, delta);
      updateEnemies(this, delta);
      updateEnemyBullets(this, delta);
      updateFuelPickups(this, delta);
      updatePowerups(this, delta); // Iter 24
      updateTerrain(this, delta);
      updateGroundEnemies(this, delta);
      updateParticles(this, delta);
      updateSolvalou(this, delta);
      updateScorePopups(this, delta);
      checkCollisions(this);
      if (comboTimer > 0) { comboTimer -= delta; if (comboTimer <= 0) comboCount = 0; }
      if (time - (window.lastFuelCheck || 0) > 1000) {
        fuel = Math.max(0, fuel - 1); window.lastFuelCheck = time;
        if (fuel <= 0) loseLife(this);
      }
      distance += delta / 1000;
      if (shakeTime > 0) shakeTime -= delta;
      if (flashTime > 0) flashTime -= delta;
      // Iter 25: Shield timer
      if (shieldActive) {
        shieldTimer -= delta;
        if (shieldTimer <= 0) shieldActive = false;
      }
      updateHUD(this);
      updateMissileWarnings(this);
    }

    // ================== TITLE SCREEN (Iter 22) ==================
    function showTitleScreen(scene) {
      const w = scene.scale.width, h = scene.scale.height;
      const bg = scene.add.graphics(); bg.fillStyle(0x000033, 1); bg.fillRect(0, 0, w, h);
      // Animated stars
      titleStarAnim = [];
      for (let i = 0; i < 120; i++) {
        const s = scene.add.graphics();
        const sz = 1 + Math.random() * 2.5;
        s.fillStyle(0xffffff, 0.5 + Math.random() * 0.5);
        s.fillRect(Math.random() * w, Math.random() * h, sz, sz);
        s.setData('speed', 0.3 + Math.random() * 0.8);
        titleStarAnim.push(s);
      }
      scene.tweens.add({
        targets: titleStarAnim, y: '+=5', duration: 2000, yoyo: true, repeat: -1,
        ease: 'Sine.easeInOut'
      });
      const title = scene.add.text(w/2, h/2 - 100, 'STAR BLASTER', {
        fontSize: '64px', fontFamily: 'Arial', fontStyle: 'bold', color: '#00ff00',
        stroke: '#000000', strokeThickness: 6, align: 'center'
      });
      title.setOrigin(0.5); title.setDepth(100);
      scene.tweens.add({ targets: title, scaleX: 1.05, scaleY: 1.05, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
      const sub = scene.add.text(w/2, h/2 - 30, 'Xevious-Style Arcade Shooter', {
        fontSize: '20px', fontFamily: 'Arial', color: '#00ffff', align: 'center'
      });
      sub.setOrigin(0.5); sub.setDepth(100);
      const instr = scene.add.text(w/2, h/2 + 60,
        'ARROWS: Move | SPACE: Shoot | B: Bomb | DOWN: Scav | S: Solvalou\nCollect FUEL!', {
        fontSize: '16px', fontFamily: 'Arial', color: '#ffffff', align: 'center'
      });
      instr.setOrigin(0.5); instr.setDepth(100);
      const highText = scene.add.text(w/2, h/2 + 140, `HIGH SCORE: ${highScore}`, {
        fontSize: '18px', fontFamily: 'Arial', color: '#ffff00'
      });
      highText.setOrigin(0.5); highText.setDepth(100);
      const startBtn = scene.add.text(w/2, h/2 + 200, 'TAP TO START', {
        fontSize: '24px', fontFamily: 'Arial', color: '#00ff00', stroke: '#000000', strokeThickness: 4
      });
      startBtn.setOrigin(0.5); startBtn.setDepth(100);
      startBtn.setInteractive({ useHandCursor: true });
      startBtn.on('pointerdown', () => startGame(scene));
      scene.tweens.add({
        targets: startBtn, scaleX: 1.1, scaleY: 1.1, duration: 800, yoyo: true, repeat: -1,
        ease: 'Sine.easeInOut'
      });
    }

    // ================== TOUCH + KEYBOARD ==================
    function addTouchControls(scene) {
      const w = scene.scale.width, h = scene.scale.height;
      const leftZone = scene.add.rectangle(0, h/2, w/2, h, 0x000000, 0); leftZone.setDepth(50); leftZone.setInteractive();
      leftZone.on('pointerdown', () => touchLeft = true); leftZone.on('pointerup', () => touchLeft = false);
      const rightZone = scene.add.rectangle(w/2, h/2, w/2, h, 0x000000, 0); rightZone.setDepth(50); rightZone.setInteractive();
      rightZone.on('pointerdown', () => touchRight = true); rightZone.on('pointerup', () => touchRight = false);
      const fireZone = scene.add.rectangle(w/2, h/3, w/2, h/3, 0x000000, 0); fireZone.setDepth(50); fireZone.setInteractive();
      fireZone.on('pointerdown', () => touchShoot = true); fireZone.on('pointerup', () => touchShoot = false);
      const bombZone = scene.add.rectangle(w/2, h*0.75, w/2, h/3, 0x000000, 0); bombZone.setDepth(50); bombZone.setInteractive();
      bombZone.on('pointerdown', () => touchBomb = true); bombZone.on('pointerup', () => touchBomb = false);
    }

    function handleKeyboard(scene, e) {
      if (!gameActive) return;
      if (e.key === ' ') { if (Date.now() - lastShootTime > 150) { shootBullet(scene); lastShootTime = Date.now(); } return; }
      if (e.key.toLowerCase() === 'b') { if (Date.now() - lastBombTime > 500) { dropBomb(scene); lastBombTime = Date.now(); } return; }
      if (e.key === 'ArrowDown') { scavActive = !scavActive; return; }
      if (e.key.toLowerCase() === 's') { toggleSolvalou(scene); return; }
      if (e.key.toLowerCase() === 'p' || e.key === 'Escape') {
        isPaused = !isPaused;
        if (isPaused) togglePauseOverlay(scene, true);
        else togglePauseOverlay(scene, false);
        return;
      }
    }

    // ================== PAUSE OVERLAY (Iter 21) ==================
    function togglePauseOverlay(scene, visible) {
      let overlay = scene.getObjectAt ? scene.getObjectAt(0, Phaser.GameObjects.Graphics) : null;
      let pauseText = null;
      // Find existing pause overlay by checking for a graphics at specific depth
      if (scene._pauseOverlay) {
        pauseText = scene._pauseOverlay;
      } else {
        pauseText = scene.add.graphics();
        pauseText.setDepth(200);
        pauseText.alpha = 0;
        scene._pauseOverlay = pauseText;
      }
      if (visible) {
        pauseText.clear();
        pauseText.fillStyle(0x000000, 0.7);
        pauseText.fillRect(0, 0, scene.scale.width, scene.scale.height);
        const txt = scene.add.text(scene.scale.width/2, scene.scale.height/2, 'PAUSED', {
          fontSize: '56px', fontFamily: 'Arial', color: '#ffffff', stroke: '#000000', strokeThickness: 6
        });
        txt.setOrigin(0.5); txt.setDepth(210);
        const sub = scene.add.text(scene.scale.width/2, scene.scale.height/2 + 50, 'Press P or ESC to resume', {
          fontSize: '18px', fontFamily: 'Arial', color: '#88ff88', stroke: '#000000', strokeThickness: 3
        });
        sub.setOrigin(0.5); sub.setDepth(210);
        pauseText.alpha = 1;
      } else {
        pauseText.alpha = 0;
      }
    }

    // ================== HUD ==================
    function addHUD(scene) {
      const w = scene.scale.width, h = scene.scale.height;
      scene.scoreText = scene.add.text(10, 10, `SCORE: 0\nHIGH: ${highScore}`, {
        fontSize: '14px', fontFamily: 'Arial', color: '#00ff00', stroke: '#000000', strokeThickness: 3
      }); scene.scoreText.setDepth(60);
      scene.fuelBar = scene.add.graphics(); scene.fuelBar.setDepth(60);
      scene.fuelText = scene.add.text(w - 130, 10, 'FUEL', {
        fontSize: '12px', fontFamily: 'Arial', color: '#00ffff', stroke: '#000000', strokeThickness: 2
      }); scene.fuelText.setDepth(60);
      scene.fuelBg = scene.add.graphics();
      scene.fuelBg.lineStyle(1, 0x000000, 1); scene.fuelBg.strokeRect(w - 120, 25, 100, 15);
      scene.fuelBg.setDepth(60);
      scene.distanceText = scene.add.text(w/2, h - 20, `DIST: 0000`, {
        fontSize: '12px', fontFamily: 'Arial', color: '#ffffff', stroke: '#000000', strokeThickness: 2, align: 'center'
      }); scene.distanceText.setOrigin(0.5); scene.distanceText.setDepth(60);
      scene.livesText = scene.add.text(10, h - 20, `LIVES: ${lives}`, {
        fontSize: '14px', fontFamily: 'Arial', color: '#ff0000', stroke: '#000000', strokeThickness: 3
      }); scene.livesText.setDepth(60);
      scene.comboText = scene.add.text(w/2, h/3, '', {
        fontSize: '24px', fontFamily: 'Arial', color: '#ffff00', stroke: '#000000', strokeThickness: 4, align: 'center'
      }); scene.comboText.setOrigin(0.5); scene.comboText.setDepth(60); scene.comboText.setAlpha(0);
      scene.warningText = scene.add.text(w/2, 80, '', {
        fontSize: '20px', fontFamily: 'Arial', color: '#ff0000', stroke: '#000000', strokeThickness: 3, align: 'center'
      }); scene.warningText.setOrigin(0.5); scene.warningText.setDepth(70); scene.warningText.setAlpha(0);
      scene.waveText = scene.add.text(w/2, h/2 - 120, '', {
        fontSize: '32px', fontFamily: 'Arial', color: '#ffffff', stroke: '#000000', strokeThickness: 4
      }); scene.waveText.setOrigin(0.5); scene.waveText.setDepth(65); scene.waveText.setAlpha(0);
    }

    function updateHUD(scene) {
      scene.scoreText.setText(`SCORE: ${score}\nHIGH: ${highScore}`);
      scene.fuelBar.clear();
      const fuelPercent = fuel / 100;
      const fuelColor = fuel > 50 ? 0x00ff00 : fuel > 20 ? 0xffff00 : 0xff0000;
      scene.fuelBar.fillStyle(fuelColor, 1);
      scene.fuelBar.fillRect(scene.scale.width - 119, 26, 98 * fuelPercent, 13);
      scene.distanceText.setText(`DIST: ${Math.floor(distance).toString().padStart(4, '0')}`);
      scene.livesText.setText(`LIVES: ${lives}`);
      if (comboCount >= 2) {
        scene.comboText.setText(`COMBO x${comboCount}`);
        scene.comboText.setAlpha(1);
        scene.comboText.setScale(comboCount / 10 + 1);
      } else { scene.comboText.setAlpha(0); scene.comboText.setScale(1); }
      // Wave announcement
      if (waveAnnounceTimer > 0) {
        scene.waveText.setText(`WAVE ${waveNum}`);
        scene.waveText.setAlpha(Math.min(1, waveAnnounceTimer / 500));
      } else {
        scene.waveText.setAlpha(0);
      }
    }

    // ================== START GAME ==================
    function startGame(scene) {
      scene.children.removeAll(); scene.input.removeAllListeners();
      AudioSystem.stopMusic();
      addTouchControls(scene);
      player = createPlayer(scene);
      createTerrain(scene);
      gameActive = true; isPaused = false;
      score = 0; fuel = 100; lives = 3; comboCount = 0; distance = 0;
      lastBossSpawn = lastFuelSpawn = lastEnemySpawn = lastWaveTime = 0;
      waveNum = 0; waveAnnounceTimer = 0;
      scavActive = false; solvalou = null; groundEnemies = []; missileWarnings = [];
      bullets = []; enemies = []; enemyBullets = []; fuelPickups = []; particles = [];
      scorePopups = []; invincibleUntil = 0;
      scavGraphics = scene.add.graphics(); scavGraphics.setDepth(55); scavGraphics.setVisible(false);
      AudioSystem.startMusic();
    }

    // ================== PLAYER ==================
    function createPlayer(scene) {
      const w = scene.scale.width, h = scene.scale.height, px = w / 2, py = h - 120;
      const ship = scene.add.graphics();
      ship.fillStyle(0xcccccc, 1); ship.lineStyle(2, 0x888888, 1);
      ship.fillRect(px - 8, py - 25, 16, 45); ship.strokeRect(px - 8, py - 25, 16, 45);
      ship.fillStyle(0xaaaaaa, 1);
      ship.fillTriangle(px - 8, py - 5, px - 28, py + 15, px - 8, py + 15);
      ship.fillTriangle(px + 8, py - 5, px + 28, py + 15, px + 8, py + 15);
      ship.lineStyle(2, 0x666666, 1);
      ship.strokeTriangle(px - 8, py - 5, px - 28, py + 15, px - 8, py + 15);
      ship.strokeTriangle(px + 8, py - 5, px + 28, py + 15, px + 8, py + 15);
      ship.fillStyle(0x00ff88, 0.7); ship.fillCircle(px, py - 15, 5);
      const engine = scene.add.graphics();
      engine.fillStyle(0x00ff00, 0.9); engine.fillRect(px - 5, py + 22, 10, 8);
      engine.fillStyle(0x88ff88, 0.6); engine.fillRect(px - 3, py + 28, 6, 6);
      ship.data = { type: 'player', health: 1, engine: engine }; engine.setData('parent', ship);
      scene.tweens.add({ targets: engine, alpha: 0.4, duration: 120, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
      return ship;
    }

    function updatePlayer(scene, time, delta) {
      const w = scene.scale.width;
      // Iter 14: Solvalou takes input when active
      if (solvalou) {
        if (touchLeft) player.x = Math.max(30, player.x - 5 * delta / 16);
        if (touchRight) player.x = Math.min(w - 30, player.x + 5 * delta / 16);
      } else {
        if (touchLeft || keys['ArrowLeft']) player.x = Math.max(30, player.x - 5 * delta / 16);
        if (touchRight || keys['ArrowRight']) player.x = Math.min(w - 30, player.x + 5 * delta / 16);
      }
      if ((touchShoot || keys[' ']) && time - lastShootTime > 150) { shootBullet(scene); lastShootTime = time; }
      if ((touchBomb || keys['b'] || keys['B']) && time - lastBombTime > 500) { dropBomb(scene); lastBombTime = time; }
      // Scav scanner - persistent object (Iter 13)
      if (scavGraphics) {
        if (scavActive) {
          scavGraphics.clear();
          scavGraphics.lineStyle(2, 0x00ffff, 0.8);
          scavGraphics.strokeRect(player.x - 40, scene.scale.height - 95, 80, 10);
          scavGraphics.setVisible(true);
          // Iter 15: Mark ground enemies under scav
          markGroundEnemies(scene);
        } else {
          scavGraphics.setVisible(false);
        }
      }
      // Iter 25: Shield visual
      if (shieldActive) {
        if (!player.shield) {
          player.shield = scene.add.graphics();
          player.shield.lineStyle(3, 0x0088ff, 0.6);
          player.shield.strokeCircle(player.x, player.y, 28);
          player.shield.setDepth(59);
        }
        player.shield.x = player.x;
        player.shield.y = player.y;
        player.shield.setAlpha(0.4 + Math.sin(time / 150) * 0.2);
      } else if (player.shield) {
        scene.children.remove(player.shield);
        player.shield = null;
      }
      // Invincibility flash (Iter 17)
      if (time < invincibleUntil) {
        player.setAlpha(Math.sin(time / 60) > 0 ? 0.3 : 1);
      } else {
        player.setAlpha(1);
      }
    }

    // ================== STARFIELD ==================
    let stars = [];
    function createStarfield(scene) {
      stars = [];
      for (let i = 0; i < 80; i++) {
        const s = scene.add.graphics();
        s.fillStyle(0xffffff, 0.8 + Math.random() * 0.2);
        s.fillRect(Math.random() * scene.scale.width, Math.random() * scene.scale.height, 1, 1);
        stars.push({ g: s, speed: 0.8 + Math.random() * 1.5 });
      }
    }
    function updateStarfield(scene, delta) {
      if (!stars.length) return;
      stars.forEach(s => {
        s.g.y += s.speed * delta / 16;
        if (s.g.y > scene.scale.height) s.g.y = -2;
      });
    }

    // ================== TERRAIN (Iter 3 + Iter 20 details) ==================
    function createTerrain(scene) {
      const w = scene.scale.width, h = scene.scale.height;
      // Iter 20: Varied ground with buildings/water
      const ground = scene.add.graphics();
      ground.fillStyle(0x2d5016, 1); ground.fillRect(0, h - 100, w, 100);
      terrain.push({ obj: ground, speed: 2.2, parallax: 1 });
      // Water patches
      for (let i = 0; i < 3; i++) {
        const water = scene.add.graphics();
        water.fillStyle(0x0066aa, 0.6);
        const wy = h - 60 - Math.random() * 30;
        water.fillRect(Math.random() * w, wy, 80 + Math.random() * 120, 15);
        terrain.push({ obj: water, speed: 2.0 + Math.random() * 0.5, parallax: 0.9 });
      }
      // Buildings
      for (let i = 0; i < 6; i++) {
        const bldg = scene.add.graphics();
        const bx = Math.random() * w, by = h - 90 - Math.random() * 60;
        const bw = 10 + Math.random() * 20, bh = 20 + Math.random() * 40;
        bldg.fillStyle(0x334455, 1); bldg.fillRect(bx - bw/2, by - bh, bw, bh);
        bldg.lineStyle(1, 0x556677, 0.5); bldg.strokeRect(bx - bw/2, by - bh, bw, bh);
        // Windows
        for (let wy = by - bh + 5; wy < by - 5; wy += 8) {
          for (let wx = bx - bw/2 + 3; wx < bx + bw/2 - 3; wx += 6) {
            bldg.fillStyle(Math.random() > 0.3 ? 0xffee44 : 0x334455, 0.6);
            bldg.fillRect(wx, wy, 3, 4);
          }
        }
        terrain.push({ obj: bldg, speed: 1.8 + Math.random() * 0.4, parallax: 0.8 });
      }
      // Bridges
      for (let i = 0; i < 2; i++) {
        const bridge = scene.add.graphics();
        bridge.fillStyle(0x665544, 1);
        const bry = h - 50 - Math.random() * 20;
        bridge.fillRect(Math.random() * w, bry, 60, 6);
        terrain.push({ obj: bridge, speed: 2.1, parallax: 0.95 });
      }
      // Mountains (parallax far)
      for (let i = 0; i < 4; i++) {
        const x = Math.random() * w, y = h - 130 - Math.random() * 40, size = 35 + Math.random() * 45;
        const mtn = scene.add.graphics(); mtn.fillStyle(0x1a3309, 1);
        mtn.beginPath(); mtn.moveTo(x - size, y + size); mtn.lineTo(x, y); mtn.lineTo(x + size, y + size);
        mtn.closePath(); mtn.fillPath();
        terrain.push({ obj: mtn, speed: 0.9 + Math.random() * 0.4, parallax: 0.4 });
      }
      // Trees
      for (let i = 0; i < 12; i++) {
        const x = Math.random() * w, y = h - 105 - Math.random() * 70;
        const tree = scene.add.graphics(); tree.fillStyle(0x0d4d00, 1); tree.fillCircle(x, y, 7 + Math.random() * 5);
        terrain.push({ obj: tree, speed: 2.0 + Math.random(), parallax: 0.9 });
      }
      // Road
      const road = scene.add.graphics(); road.fillStyle(0x444444, 1); road.fillRect(w/2 - 28, 0, 56, h);
      road.lineStyle(2, 0xffff00, 0.5); road.setLineDash([18, 18]); road.lineBetween(w/2, 0, w/2, h);
      terrain.push({ obj: road, speed: 2.4, parallax: 1.1 });
      createStarfield(scene);
    }

    function updateTerrain(scene, delta) {
      const w = scene.scale.width, h = scene.scale.height;
      terrain.forEach(item => {
        item.obj.y += item.speed * delta / 16;
        if (item.obj.y > h + 60) { item.obj.y = -60; item.obj.x = Math.random() * w; }
      });
      updateStarfield(scene, delta);
    }

    // ================== SOLVALOU (Iter 5, fixed Iter 14) ==================
    function toggleSolvalou(scene) {
      if (solvalou) {
        scene.children.remove(solvalou); solvalou = null;
      } else {
        const w = scene.scale.width, h = scene.scale.height;
        solvalou = scene.add.graphics();
        solvalou.fillStyle(0x00aaff, 1);
        solvalou.fillTriangle(player.x - 10, player.y - 60, player.x, player.y - 85, player.x + 10, player.y - 60);
        solvalou.data = { type: 'solvalou', x: player.x, y: player.y - 70, vx: 0 };
        scene.add.tween({ targets: solvalou, alpha: { from: 0.6, to: 1 }, duration: 80, yoyo: true, repeat: 2 });
      }
    }
    function updateSolvalou(scene, delta) {
      if (!solvalou) return;
      const data = solvalou.data;
      // Iter 14: Solvalou only uses a/d or left/right when solvalou is active
      data.x += (keys['a'] ? -3.5 : keys['d'] ? 3.5 : (solvalou && keys['ArrowLeft'] ? -3.5 : keys['ArrowRight'] ? 3.5 : 0)) * delta / 16;
      data.x = Math.max(40, Math.min(scene.scale.width - 40, data.x));
      solvalou.x = data.x; solvalou.y = data.y;
      if (Math.random() < 0.04) {
        const b = scene.add.graphics(); b.fillStyle(0x00ffff, 1); b.fillCircle(data.x, data.y - 8, 2);
        b.data = { type: 'solvalouBullet', speed: 9 }; bullets.push(b);
      }
      if (data.y < 40) { scene.children.remove(solvalou); solvalou = null; }
    }

    // ================== ENEMIES (Iter 7+8) ==================
    function spawnEnemy(scene) {
      const w = scene.scale.width, h = scene.scale.height;
      const typeRoll = Math.random();
      let type;
      if (typeRoll < 0.2) type = 'fighter';
      else if (typeRoll < 0.45) type = 'bomber';
      else if (typeRoll < 0.6) type = 'scout';
      else if (typeRoll < 0.75) type = 'armored';
      else type = 'boss';
      const px = w / 2 + (Math.random() - 0.5) * (w * 0.65), py = -35;
      const enemy = scene.add.graphics();
      let data = { type: 'enemy', health: 1, speed: 2.1, shootChance: 0.0012, points: 100, vx: 0 };
      if (type === 'fighter') {
        enemy.fillStyle(0xcc0000, 1); enemy.lineStyle(2, 0xff3333, 1);
        enemy.fillTriangle(px - 14, py + 12, px, py - 14, px + 14, py + 12);
        enemy.strokeTriangle(px - 14, py + 12, px, py - 14, px + 14, py + 12);
        data.health = 1; data.speed = 3.4; data.shootChance = 0.003; data.points = 70; data.vx = (Math.random() - 0.5) * 1.8;
      } else if (type === 'bomber') {
        enemy.fillStyle(0xdd8800, 1); enemy.lineStyle(2, 0xffaa33, 1);
        enemy.fillRect(px - 16, py - 10, 32, 22); enemy.strokeRect(px - 16, py - 10, 32, 22);
        enemy.fillStyle(0x662200, 1); enemy.fillRect(px - 8, py - 4, 6, 8); enemy.fillRect(px + 2, py - 4, 6, 8);
        data.health = 2; data.speed = 1.7; data.shootChance = 0.007; data.points = 170;
      } else if (type === 'scout') {
        enemy.fillStyle(0x8800ff, 1); enemy.lineStyle(2, 0xaa33ff, 1);
        enemy.fillCircle(px, py, 8); enemy.strokeCircle(px, py, 8);
        data.health = 1; data.speed = 5.2; data.shootChance = 0.002; data.points = 90; data.vx = (Math.random() - 0.5) * 3;
      } else if (type === 'armored') {
        enemy.fillStyle(0x444444, 1); enemy.lineStyle(3, 0x888888, 1);
        enemy.fillCircle(px, py, 16); enemy.strokeCircle(px, py, 16);
        data.health = 5; data.speed = 1.2; data.shootChance = 0.005; data.points = 250;
      } else if (type === 'boss') {
        enemy.fillStyle(0x440000, 1); enemy.lineStyle(4, 0xff2222, 1);
        enemy.fillRect(px - 28, py - 18, 56, 38); enemy.strokeRect(px - 28, py - 18, 56, 38);
        enemy.fillStyle(0xffff00, 0.9); enemy.fillCircle(px, py, 10); enemy.strokeCircle(px, py, 10);
        // Weak points on sides
        enemy.fillStyle(0xff6600, 0.8); enemy.fillCircle(px - 22, py - 10, 5); enemy.strokeCircle(px - 22, py - 10, 5);
        enemy.fillStyle(0xff6600, 0.8); enemy.fillCircle(px + 22, py - 10, 5); enemy.strokeCircle(px + 22, py - 10, 5);
        data.health = 14; data.speed = 0.6; data.shootChance = 0.014; data.points = 1400;
        data.sideWeakPoints = [{x: px - 22, y: py - 10}, {x: px + 22, y: py - 10}];
        bossActive = true;
      }
      enemy.setData('type', type); enemy.setData('health', data.health); enemy.data = data; enemies.push(enemy);
    }

    function spawnGroundEnemy(scene) {
      const w = scene.scale.width, h = scene.scale.height;
      const type = Math.random() < 0.5 ? 'infantry' : Math.random() < 0.7 ? 'tank' : 'launcher';
      const ge = scene.add.graphics();
      let data = { type: 'ground', gtype: type, health: 1, speed: 1.8, points: 80, marked: false, markTimer: 0 };
      if (type === 'infantry') {
        ge.fillStyle(0x663300, 1); ge.fillRect(0, 0, 8, 12); ge.fillCircle(4, 3, 3);
        data.health = 1; data.speed = 2.4; data.points = 50;
      } else if (type === 'tank') {
        ge.fillStyle(0x555555, 1); ge.fillRect(0, 0, 22, 14); ge.fillStyle(0x333333, 1); ge.fillRect(4, 3, 14, 8);
        data.health = 3; data.speed = 1.3; data.points = 140;
      } else {
        ge.fillStyle(0x444444, 1); ge.fillRect(0, 0, 16, 10); ge.fillStyle(0xffaa00, 1); ge.fillRect(6, -4, 4, 5);
        data.health = 2; data.speed = 1.1; data.points = 110;
      }
      ge.x = Math.random() * (w - 60) + 30; ge.y = h - 92;
      ge.data = data; groundEnemies.push(ge);
    }

    function markGroundEnemies(scene) {
      // Iter 15: Mark ground enemies under scav scanner
      const sx = player.x, sy = scene.scale.height - 90;
      groundEnemies.forEach(ge => {
        if (Math.abs(ge.x - sx) < 50 && Math.abs(ge.y - sy) < 30) {
          ge.data.marked = true;
          ge.data.markTimer = 3000; // 3 seconds to bomb marked
        }
      });
    }

    function updateGroundEnemies(scene, delta) {
      for (let i = groundEnemies.length - 1; i >= 0; i--) {
        const ge = groundEnemies[i];
        ge.x += (Math.random() - 0.5) * 0.6 * delta / 16;
        // Mark timer
        if (ge.data.marked) {
          ge.data.markTimer -= delta;
          // Draw mark indicator
          const markG = scene.add.graphics();
          markG.lineStyle(1, 0xff00ff, 0.8);
          markG.strokeCircle(ge.x + 8, ge.y - 5, 12);
          setTimeout(() => scene.children.remove(markG), 100);
          if (ge.data.markTimer <= 0) ge.data.marked = false;
        }
        if (Math.random() < 0.006 && ge.data.gtype === 'launcher') {
          const mb = scene.add.graphics(); mb.fillStyle(0xff4400, 1); mb.fillCircle(ge.x + 8, ge.y - 6, 3);
          mb.data = { type: 'missile', speed: 2.8, targetX: player.x }; enemyBullets.push(mb);
          missileWarnings.push({ time: 1200, x: ge.x });
        }
        if (ge.x < 20 || ge.x > scene.scale.width - 20) ge.data.speed *= -1;
        if (Math.random() < 0.0008) { scene.children.remove(ge); groundEnemies.splice(i, 1); }
      }
      // Periodically spawn ground enemies (Iter 7)
      if (Math.random() < 0.002 * difficulty) spawnGroundEnemy(scene);
    }

    function updateEnemies(scene, delta) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i], data = enemy.data;
        enemy.y += data.speed * delta / 16;
        if (data.type === 'fighter') {
          data.vx = (data.vx || 0) * 0.96 + Math.sin(scene.time.now / 380 + i) * 0.8;
          enemy.x += data.vx * delta / 16;
        }
        if (data.type === 'bomber' && Math.random() < data.shootChance * delta / 16 * 1.3) {
          const leadX = player.x + (player.x - enemy.x) * 0.3;
          const b = scene.add.graphics(); b.fillStyle(0xff0000, 1); b.fillCircle(enemy.x, enemy.y + 12, 3);
          b.data = { type: 'enemyBullet', speed: 3.8, vx: (leadX - enemy.x) * 0.025 }; enemyBullets.push(b);
        } else if (Math.random() < data.shootChance * delta / 16) {
          enemyShoot(scene, enemy);
        }
        if (enemy.y > scene.scale.height + 50) {
          scene.children.remove(enemy); enemies.splice(i, 1); if (data.type === 'boss') bossActive = false;
        }
      }
    }

    function enemyShoot(scene, enemy) {
      const bullet = scene.add.graphics();
      bullet.fillStyle(0xff0000, 1); bullet.fillCircle(enemy.x, enemy.y, 3);
      bullet.data = { type: 'enemyBullet', speed: 4, vx: 0 }; enemyBullets.push(bullet);
    }

    function updateEnemyBullets(scene, delta) {
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.y += b.data.speed * delta / 16;
        if (b.data.vx) b.x += b.data.vx * delta / 16;
        if (b.y > scene.scale.height + 20) { scene.children.remove(b); enemyBullets.splice(i, 1); }
      }
    }

    // ================== BULLETS (Iter 6 + Iter 18 trails) ==================
    function shootBullet(scene) {
      const bullet = scene.add.graphics();
      bullet.fillStyle(0x00ff00, 1); bullet.fillCircle(player.x, player.y - 30, 3);
      bullet.data = { type: 'bullet', speed: 8, trail: true, trailColor: 0x00ff00 };
      bullets.push(bullet); AudioSystem.playShoot();
      
      // Iter 23: Weapon upgrade system
      if (weaponLevel >= 2) {
        const b2 = scene.add.graphics(); b2.fillStyle(0x00ff00, 1); b2.fillCircle(player.x - 12, player.y - 25, 2.5);
        b2.data = { type: 'bullet', speed: 8, trail: true, trailColor: 0x00ff00 };
        bullets.push(b2);
        const b3 = scene.add.graphics(); b3.fillStyle(0x00ff00, 1); b3.fillCircle(player.x + 12, player.y - 25, 2.5);
        b3.data = { type: 'bullet', speed: 8, trail: true, trailColor: 0x00ff00 };
        bullets.push(b3);
      }
      if (weaponLevel >= 3) {
        const b4 = scene.add.graphics(); b4.fillStyle(0x00ff00, 1); b4.fillCircle(player.x - 20, player.y - 20, 2);
        b4.data = { type: 'bullet', speed: 7.5, trail: true, trailColor: 0x00ff00, vx: -0.5 };
        bullets.push(b4);
        const b5 = scene.add.graphics(); b5.fillStyle(0x00ff00, 1); b5.fillCircle(player.x + 20, player.y - 20, 2);
        b5.data = { type: 'bullet', speed: 7.5, trail: true, trailColor: 0x00ff00, vx: 0.5 };
        bullets.push(b5);
      }
    }

    function dropBomb(scene) {
      const bomb = scene.add.graphics();
      bomb.fillStyle(0xffff00, 1); bomb.fillCircle(player.x, player.y + 18, 5);
      bomb.data = { type: 'bomb', speed: 3.2, vx: (Math.random() - 0.5) * 0.6, trail: true, trailColor: 0xffff00 };
      bullets.push(bomb); AudioSystem.playBomb();
    }

    function updateBullets(scene, delta) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        bullet.y -= bullet.data.speed * delta / 16;
        if (bullet.data.vx) bullet.x += bullet.data.vx * delta / 16;
        // Iter 18: Trail effect
        if (bullet.data.trail && Math.random() < 0.5) {
          const trail = scene.add.graphics();
          trail.fillStyle(bullet.data.trailColor || 0x88ff88, 0.4);
          trail.fillCircle(bullet.x + (Math.random() - 0.5) * 4, bullet.y + bullet.data.speed * delta / 16 * 0.5 + (Math.random() - 0.5) * 2, 2);
          particles.push({ x: trail.x, y: trail.y, vx: 0, vy: 0, life: 8, color: bullet.data.trailColor, size: 2, setData: function(){} });
        }
        if (bullet.y < -20) { scene.children.remove(bullet); bullets.splice(i, 1); }
      }
    }

    // ================== PARTICLES (Iter 9) ==================
    function createExplosion(scene, x, y, color = 0xffaa00) {
      for (let i = 0; i < 14; i++) {
        const p = scene.add.graphics();
        p.fillStyle(color, 0.9); p.fillCircle(x, y, 2 + Math.random() * 3);
        p.data = { vx: (Math.random() - 0.5) * 4.5, vy: (Math.random() - 0.5) * 4.5 - 1, life: 18 + Math.random() * 14 };
        particles.push(p);
      }
      shakeTime = 220; flashTime = 90;
    }

    function updateParticles(scene, delta) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (p.setData) {
          // Real Phaser graphics particle
          p.x += p.data.vx * delta / 16; p.y += p.data.vy * delta / 16;
          p.data.life -= delta / 16; p.setAlpha(Math.max(0.1, p.data.life / 22));
          if (p.data.life <= 0) { scene.children.remove(p); particles.splice(i, 1); }
        } else {
          // Trail particle (simple)
          p.x += p.vx * delta / 16; p.y += p.vy * delta / 16;
          p.life -= delta / 16;
          if (p.life <= 0) { scene.children.remove(p); particles.splice(i, 1); }
        }
      }
    }

    // ================== SCORE POPUPS (Iter 19) ==================
    function addScorePopup(scene, x, y, points) {
      const popup = scene.add.text(x, y, `+${points}`, {
        fontSize: '16px', fontFamily: 'Arial', color: '#ffff00', stroke: '#000000', strokeThickness: 2
      });
      popup.setOrigin(0.5); popup.setDepth(65);
      popup.setData('vy', -1.5);
      popup.setData('life', 1200);
      scorePopups.push(popup);
    }

    function updateScorePopups(scene, delta) {
      for (let i = scorePopups.length - 1; i >= 0; i--) {
        const p = scorePopups[i];
        p.y += p.data.vy * delta / 16;
        p.setData('life', p.data.life - delta);
        const alpha = Math.max(0, p.data.life / 1200);
        p.setAlpha(alpha);
        if (p.data.life <= 0) {
          scene.children.remove(p);
          scorePopups.splice(i, 1);
        }
      }
    }

    // ================== FUEL + SPAWN ==================
    function spawnFuel(scene) {
      const f = scene.add.graphics(); f.fillStyle(0x00ffff, 0.6); f.fillCircle(Math.random() * (scene.scale.width - 50) + 25, -18, 9);
      f.data = { type: 'fuel' }; fuelPickups.push(f);
    }
    
    // Iter 24: Power-up spawning
    function spawnPowerup(scene) {
      const types = ['weapon', 'life', 'shield'];
      const type = types[Math.floor(Math.random() * types.length)];
      const p = scene.add.graphics();
      if (type === 'weapon') {
        p.fillStyle(0x00ff00, 0.8); p.fillCircle(Math.random() * (scene.scale.width - 50) + 25, -18, 10);
        p.lineStyle(2, 0x00ff00, 0.6); p.strokeCircle(Math.random() * (scene.scale.width - 50) + 25, -18, 10);
      } else if (type === 'life') {
        p.fillStyle(0xff00ff, 0.8); p.fillCircle(Math.random() * (scene.scale.width - 50) + 25, -18, 10);
        p.lineStyle(2, 0xff00ff, 0.6); p.strokeCircle(Math.random() * (scene.scale.width - 50) + 25, -18, 10);
      } else {
        p.fillStyle(0x0088ff, 0.8); p.fillCircle(Math.random() * (scene.scale.width - 50) + 25, -18, 10);
        p.lineStyle(2, 0x0088ff, 0.6); p.strokeCircle(Math.random() * (scene.scale.width - 50) + 25, -18, 10);
      }
      p.data = { type: 'powerup', powerupType: type };
      powerups.push(p);
    }
    
    function updatePowerups(scene, delta) {
      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += 2.1 * delta / 16;
        if (p.y > scene.scale.height + 20) { scene.children.remove(p); powerups.splice(i, 1); continue; }
        // Collect power-up
        if (Math.abs(p.x - player.x) < 24 && Math.abs(p.y - player.y) < 24) {
          if (p.data.powerupType === 'weapon') {
            weaponLevel = Math.min(3, weaponLevel + 1);
            AudioSystem.playFuelPickup();
            addScorePopup(scene, p.x, p.y, 'WEAPON UP!');
          } else if (p.data.powerupType === 'life') {
            lives++;
            AudioSystem.playFuelPickup();
            addScorePopup(scene, p.x, p.y, '+1 LIFE!');
          } else if (p.data.powerupType === 'shield') {
            shieldActive = true;
            shieldTimer = 8000; // 8 seconds
            AudioSystem.playFuelPickup();
            addScorePopup(scene, p.x, p.y, 'SHIELD!');
          }
          scene.children.remove(p);
          powerups.splice(i, 1);
        }
      }
    }

    // ================== COLLISIONS + WARNINGS ==================
    function checkCollisions(scene) {
      // Bullets vs enemies
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        for (let j = enemies.length - 1; j >= 0; j--) {
          const enemy = enemies[j];
          if (Math.abs(bullet.x - enemy.x) < 26 && Math.abs(bullet.y - enemy.y) < 26) {
            enemy.data.health--; scene.children.remove(bullet); bullets.splice(i, 1);
            if (enemy.data.health <= 0) {
              score += enemy.data.points; AudioSystem.playExplosion();
              createExplosion(scene, enemy.x, enemy.y);
              addScorePopup(scene, enemy.x, enemy.y, enemy.data.points);
              scene.children.remove(enemy); enemies.splice(j, 1);
              comboCount++; comboTimer = 2200;
              if (enemy.data.type === 'boss') bossActive = false;
              // Iter 24: Drop power-up chance
              if (Math.random() < 0.15) spawnPowerup(scene);
            }
            break;
          }
          // Iter 28: Shield blocks enemy bullets
          if (enemy.data.type === 'boss' && Math.abs(bullet.x - enemy.x) < 30 && Math.abs(bullet.y - enemy.y) < 30) {
            if (shieldActive) {
              scene.children.remove(bullet); bullets.splice(i, 1);
              createExplosion(scene, bullet.x, bullet.y, 0x0088ff);
              AudioSystem.playHit();
              break;
            }
          }
        }
      }
      // Iter 15: Scav marks + double damage on bombs
      for (let i = groundEnemies.length - 1; i >= 0; i--) {
        const ge = groundEnemies[i];
        for (let k = bullets.length - 1; k >= 0; k--) {
          const b = bullets[k];
          if (b.data.type === 'bomb' && Math.abs(b.x - ge.x) < 18 && Math.abs(b.y - ge.y) < 18) {
            ge.data.health--;
            if (ge.data.marked) { ge.data.health--; } // double damage when marked
            scene.children.remove(b); bullets.splice(k, 1);
            if (ge.data.health <= 0) {
              score += ge.data.points; AudioSystem.playExplosion();
              createExplosion(scene, ge.x, ge.y, 0x886633);
              addScorePopup(scene, ge.x, ge.y, ge.data.points);
              scene.children.remove(ge); groundEnemies.splice(i, 1);
              comboCount++; comboTimer = 2000;
            }
            break;
          }
        }
      }
      // Iter 28: Shield blocks enemy bullets
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const bullet = enemyBullets[i];
        if (shieldActive && Math.abs(bullet.x - player.x) < 30 && Math.abs(bullet.y - player.y) < 30) {
          AudioSystem.playHit();
          createExplosion(scene, bullet.x, bullet.y, 0x0088ff);
          scene.children.remove(bullet); enemyBullets.splice(i, 1);
          continue;
        }
        const time = game.time.now;
        if (time < invincibleUntil) continue; // Iter 17: invincibility
        if (Math.abs(bullet.x - player.x) < 20 && Math.abs(bullet.y - player.y) < 26) {
          AudioSystem.playHit(); scene.children.remove(bullet); enemyBullets.splice(i, 1); loseLife(scene); break;
        }
      }
      // Player collisions
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        const time = game.time.now;
        if (time < invincibleUntil) continue;
        if (Math.abs(enemy.x - player.x) < 26 && Math.abs(enemy.y - player.y) < 32) {
          if (shieldActive) {
            createExplosion(scene, enemy.x, enemy.y);
            scene.children.remove(enemy); enemies.splice(i, 1);
            shieldActive = false;
            continue;
          }
          AudioSystem.playExplosion(); createExplosion(scene, enemy.x, enemy.y);
          scene.children.remove(enemy); enemies.splice(i, 1); loseLife(scene); shakeTime = 340;
        }
      }
      // Fuel vs player
      for (let i = fuelPickups.length - 1; i >= 0; i--) {
        const f = fuelPickups[i];
        if (Math.abs(f.x - player.x) < 24 && Math.abs(f.y - player.y) < 24) {
          fuel = Math.min(100, fuel + 32); AudioSystem.playFuelPickup();
          scene.children.remove(f); fuelPickups.splice(i, 1); break;
        }
      }
    }

    function loseLife(scene) {
      lives--;
      invincibleUntil = game.time.now + 1500; // Iter 17: 1.5s invincibility
      shakeTime = 520; flashTime = 340;
      if (lives <= 0) gameOver(scene);
    }

    function updateMissileWarnings(scene) {
      if (!scene.warningText) return;
      if (missileWarnings.length > 0) {
        missileWarnings = missileWarnings.filter(m => { m.time -= 16; return m.time > 0; });
        scene.warningText.setText('!!! MISSILE INCOMING !!!');
        scene.warningText.setAlpha(Math.sin(Date.now() / 80) * 0.5 + 0.6);
      } else {
        scene.warningText.setAlpha(0);
      }
    }

    // ================== GAME OVER ==================
    function gameOver(scene) {
      gameActive = false; isPaused = false;
      AudioSystem.stopMusic();
      if (score > highScore) { highScore = score; localStorage.setItem('starBlasterHigh', highScore.toString()); }
      const w = scene.scale.width, h = scene.scale.height;
      const overlay = scene.add.graphics(); overlay.fillStyle(0x000000, 0.82); overlay.fillRect(0, 0, w, h);
      const goText = scene.add.text(w/2, h/2 - 90, 'GAME OVER', {
        fontSize: '52px', fontFamily: 'Arial', color: '#ff0000', stroke: '#000000', strokeThickness: 7
      }); goText.setOrigin(0.5); goText.setDepth(100);
      const scoreText = scene.add.text(w/2, h/2 - 10, `SCORE: ${score}`, {
        fontSize: '26px', fontFamily: 'Arial', color: '#00ff00'
      }); scoreText.setOrigin(0.5); scoreText.setDepth(100);
      const highText = scene.add.text(w/2, h/2 + 35, `HIGH SCORE: ${highScore}`, {
        fontSize: '20px', fontFamily: 'Arial', color: '#ffff00'
      }); highText.setOrigin(0.5); highText.setDepth(100);
      const restartText = scene.add.text(w/2, h/2 + 95, 'TAP TO RESTART', {
        fontSize: '20px', fontFamily: 'Arial', color: '#00ffff', stroke: '#000000', strokeThickness: 3
      }); restartText.setOrigin(0.5); restartText.setDepth(100);
      restartText.setInteractive({ useHandCursor: true });
      restartText.on('pointerdown', () => {
        scene.children.removeAll(); scene.input.removeAllListeners();
        addTouchControls(scene); showTitleScreen(scene);
      });
    }

    // Boot game
    game = new Phaser.Game(config);
  </script>
</body>
