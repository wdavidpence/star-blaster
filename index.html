<body>
<button id="start-btn" type="button" aria-label="Tap to start Star Blaster" onclick="launchFromStart(event);return false">
  <div style="text-align:center">
    <div style="font-size:10px;color:#555;margin-bottom:4px">v0.0.31</div>
    <h1>STAR BLASTER</h1>
    <div class="sub">Xevious-Style Arcade Shooter</div>
    <div class="ctrls">Swipe to move &bull; Shoot auto<br>Collect FUEL before it runs out</div>

</button>
<div id="hud">

</div>

<div id="gameover">
  <div class="inner"><h2>GAME OVER</h2><div class="score-text">SCORE: <span id="fs">0</span></div><div class="stats"><div class="row"><span class="label">HIGH SCORE</span><span class="value" id="hfs">0</span></div><div class="row"><span class="label">WAVE REACHED</span><span class="value" id="gw">1</span></div></div><div class="actions"><button id="restart-btn" class="restart-btn" type="button" onclick="startGame();return false">RESTART</button><button id="share-btn" class="share-btn" type="button" onclick="shareScore();return false">SHARE SCORE</button></div><div class="hint" id="share-status">Tap anywhere to restart</div></div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
// ===== CANVAS SETUP =====
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
let W,H;function resize(){const vv=window.visualViewport;W=canvas.width=Math.round((vv&&vv.width)||window.innerWidth);H=canvas.height=Math.round((vv&&vv.height)||window.innerHeight)}
resize();window.addEventListener('resize',resize);window.visualViewport&&window.visualViewport.addEventListener('resize',resize);window.visualViewport&&window.visualViewport.addEventListener('scroll',resize);

// ===== STATE =====
function readHighScore(){const n=Number(localStorage.getItem('starHS'));return Number.isFinite(n)&&n>0?Math.floor(n):0}
let active=false,paused=false,score=0,highScore=readHighScore();
let fuel=100,lives=3,weaponLevel=1,shieldActive=false,shieldTimer=0,spreadTimer=0,homingTimer=0;
let comboCount=0,comboTimer=0,difficulty=1,waveNum=0,lastWaveTime=0,waveAnnounceTimer=0;
let waveTitle='SCOUT PATROL',waveDesc='Light fighters on approach';
let invincibleUntil=0,shakeTime=0,shakePower=0,damageFlash=0,travelled=0,lastShoot=0;
let gameLoopStarted=false;
let startTapLock=false;
let particleCap=240,popupCap=18,enemyCap=26,bulletCap=120;
const keys={},touch={x:W/2,y:H/2,down:false,speed:5,id:null,glow:0};
function syncHighScoreDom(){const a=document.getElementById('hs');const b=document.getElementById('hfs');if(a)a.textContent=highScore;if(b)b.textContent=highScore}
if(document.readyState!=='loading')syncHighScoreDom();else document.addEventListener('DOMContentLoaded',syncHighScoreDom);

// ===== ENTITIES =====
let player=null,bullets=[],bulletsEnemy=[],powerups=[],fuelPickups=[],particles=[],popups=[],enemies=[],groundEnemies=[];

// ===== AUDIO (Web Audio API) =====
window.GameAudio={
  ctx:null,
  init(){if(!this.ctx){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.master=this.ctx.createGain();this.master.gain.value=.5;this.master.connect(this.ctx.destination)}catch(e){}}},
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()},
  sfx(type){if(!this.ctx)return;const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.master);
    switch(type){
      case'shoot':o.type='square';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(440,t+.06);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);o.start(t);o.stop(t+.06);break;
      case'explode':{const n=this.ctx.sampleRate*.28,buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const s=this.ctx.createBufferSource();s.buffer=buf;const f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(1100,t);g.gain.setValueAtTime(.24,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);s.connect(f);f.connect(g);g.connect(this.master);s.start(t);s.stop(t+.28);break}
      case'fuel':o.type='sine';o.frequency.setValueAtTime(540,t);o.frequency.exponentialRampToValueAtTime(1320,t+.09);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.09);o.start(t);o.stop(t+.09);break;
      case'powerup':o.type='square';o.frequency.setValueAtTime(520,t);o.frequency.exponentialRampToValueAtTime(1080,t+.07);g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);o.start(t);o.stop(t+.07);break;
      case'shield':{const o2=this.ctx.createOscillator(),g2=this.ctx.createGain(),f2=this.ctx.createBiquadFilter();o.type='triangle';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(620,t+.16);o2.type='sine';o2.frequency.setValueAtTime(740,t);o2.frequency.exponentialRampToValueAtTime(360,t+.18);f2.type='bandpass';f2.frequency.setValueAtTime(700,t);f2.Q.value=2.2;o.connect(f2);o2.connect(f2);f2.connect(g);g.connect(this.master);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.start(t);o.stop(t+.18);o2.start(t);o2.stop(t+.18);break}
      case'hit':o.type='triangle';o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(90,t+.07);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);o.start(t);o.stop(t+.07);break;
      case'death':{const n=this.ctx.sampleRate*.45,buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);const s=this.ctx.createBufferSource();s.buffer=buf;const f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(520,t);g.gain.setValueAtTime(.32,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);s.connect(f);f.connect(g);g.connect(this.master);s.start(t);s.stop(t+.45);const o3=this.ctx.createOscillator(),g3=this.ctx.createGain();o3.type='sawtooth';o3.frequency.setValueAtTime(180,t);o3.frequency.exponentialRampToValueAtTime(40,t+.28);o3.connect(g3);g3.connect(this.master);g3.gain.setValueAtTime(.12,t);g3.gain.exponentialRampToValueAtTime(.001,t+.28);o3.start(t);o3.stop(t+.28);break}
      case'wave':for(let i=0;i<4;i++){const o2=this.ctx.createOscillator(),g2=this.ctx.createGain();o2.connect(g2);g2.connect(this.master);o2.type='triangle';const tt=t+i*.1;o2.frequency.setValueAtTime(330+i*110,tt);g2.gain.setValueAtTime(.2,tt);g2.gain.exponentialRampToValueAtTime(.001,tt+.2);o2.start(tt);o2.stop(tt+.2)}break;
    }},
  shoot(){this.sfx('shoot')},explode(){this.sfx('explode')},fuel(){this.sfx('fuel')},powerup(){this.sfx('powerup')},shield(){this.sfx('shield')},hit(){this.sfx('hit')},death(){this.sfx('death')},wave(){this.sfx('wave')}
};

// ===== DRAWING HELPERS =====
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x-w/2,y-h/2,w,h)}
function circle(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}
function triggerShake(power,duration){
  shakePower=Math.max(shakePower,power);
  shakeTime=Math.max(shakeTime,duration);
}
function applyPerfBudget(){
  const low=/iPhone|iPad|Android/i.test(navigator.userAgent)||Math.min(W,H)<760;
  particleCap=low?160:240;
  popupCap=low?10:18;
  enemyCap=low?20:26;
  bulletCap=low?90:120;
}
applyPerfBudget();
window.__perf=()=>({particleCap,popupCap,enemyCap,bulletCap,enemies:enemies.length,bullets:bullets.length,bulletsEnemy:bulletsEnemy.length,popups:popups.length,particles:particles.length});
function getWaveMeta(n){
  const boss=n>0&&n%5===0;
  if(boss)return {title:'BOSS WAVE',desc:'Flagship inbound',boss:true,cap:3,spawnDelay:9999,pool:['fighter','bomber','scout']};
  if(n<2)return {title:'SCOUT PATROL',desc:'Light fighters on approach',boss:false,cap:6,spawnDelay:1700,pool:['fighter','fighter','bomber','scout']};
  if(n<4)return {title:'DIVE SWARM',desc:'Fast attackers from above',boss:false,cap:7,spawnDelay:1450,pool:['fighter','fighter','bomber','scout','dive','weave']};
  if(n<6)return {title:'ARMOR PUSH',desc:'Heavier ships entering the lane',boss:false,cap:8,spawnDelay:1220,pool:['fighter','bomber','scout','armored','dive','weave']};
  if(n<8)return {title:'SWEEPER RAID',desc:'Cross-screen threats in force',boss:false,cap:9,spawnDelay:1080,pool:['fighter','bomber','scout','armored','dive','weave','sweeper']};
  return {title:'ELITE PRESSURE',desc:'Dense waves with little breathing room',boss:false,cap:10,spawnDelay:920,pool:['fighter','fighter','bomber','scout','armored','dive','weave','sweeper']};
}
function starfield(){
  const t=Date.now();
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const nebula=[
    {x:W*0.22,y:H*0.22,r:Math.min(W,H)*0.34,c1:'rgba(105,70,255,.10)',c2:'rgba(255,90,180,.03)'},
    {x:W*0.78,y:H*0.30,r:Math.min(W,H)*0.28,c1:'rgba(20,220,255,.08)',c2:'rgba(70,255,150,.03)'},
    {x:W*0.58,y:H*0.12,r:Math.min(W,H)*0.22,c1:'rgba(255,170,70,.06)',c2:'rgba(255,255,255,.02)'}
  ];
  nebula.forEach(n=>{
    const drift=Math.sin(t/1800+n.x*.01)*10;
    const g=ctx.createRadialGradient(n.x+drift,n.y,10,n.x+drift,n.y,n.r);
    g.addColorStop(0,n.c1);g.addColorStop(.55,n.c2);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x+drift,n.y,n.r,0,Math.PI*2);ctx.fill();
  });
  const layers=[
    {count:42,speed:.012,size:[1,1],alpha:.32,color:'#eaf6ff'},
    {count:30,speed:.022,size:[1,2],alpha:.22,color:'#7cf6ff'},
    {count:18,speed:.038,size:[2,3],alpha:.12,color:'#ffb3ff'}
  ];
  layers.forEach((layer,li)=>{
    ctx.fillStyle=layer.color;
    for(let i=0;i<layer.count;i++){
      const seed=i+1+li*97;
      const x=(seed*137.5+t*layer.speed*(1+(seed%5)*.12)+li*43)%W;
      const y=(seed*73.1+t*layer.speed*.55*(1+(seed%3)*.14)+li*29)%H;
      ctx.globalAlpha=layer.alpha*(.75+.25*Math.sin(t/280+seed));
      const s=layer.size[seed%2];
      ctx.fillRect(x,y,s,s+(seed%3===0?1:0));
    }
  });
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawTerrain(){
  const scroll=travelled*2.4; // downward scroll speed
  ctx.save();
  // Layer 1: far mountains (slow) - vertical scroll only
  ctx.fillStyle="#0a1a12";
  for(let i=-3;i<6;i++){
    const yOff = ((scroll*0.28) % 95);
    const baseY = H*0.47 + yOff + (i * 95);
    ctx.beginPath();
    ctx.moveTo(W*0.12, baseY);
    ctx.lineTo(W*0.32, baseY-44);
    ctx.lineTo(W*0.52, baseY);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(W*0.48, baseY);
    ctx.lineTo(W*0.68, baseY-40);
    ctx.lineTo(W*0.88, baseY);
    ctx.fill();
  }
  // Layer 2: mid terrain ridges - vertical scroll only
  ctx.fillStyle="#112a1f";
  for(let i=-3;i<6;i++){
    const yOff = ((scroll*0.52) % 82);
    const baseY = H*0.55 + yOff + (i * 82);
    ctx.beginPath();
    ctx.moveTo(W*0.08, baseY);
    ctx.lineTo(W*0.24, baseY-58);
    ctx.lineTo(W*0.40, baseY);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(W*0.52, baseY);
    ctx.lineTo(W*0.68, baseY-50);
    ctx.lineTo(W*0.84, baseY);
    ctx.fill();
  }
  // Layer 3: near ground + road (moving down)
  ctx.fillStyle="#1a3a2a";
  ctx.fillRect(0,H*0.62,W,H*0.38);
  // Road scrolling vertically
  ctx.fillStyle="#223322";
  ctx.fillRect(W/2-26,H*0.62,52,H*0.38);
  ctx.strokeStyle="#335533";
  ctx.lineWidth=2;
  ctx.setLineDash([18,14]);
  ctx.beginPath();
  const roadOffset=(scroll*0.95)%36;
  ctx.moveTo(W/2,H*0.62-roadOffset);
  ctx.lineTo(W/2,H-roadOffset);
  ctx.stroke();
  ctx.setLineDash([]);
  // Road edge lines
  ctx.strokeStyle="#445544";
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.rect(W/2-26,H*0.62,52,H*0.38);
  ctx.stroke();
  ctx.restore();
}
  // Layer 2: mid terrain ridges
  ctx.fillStyle='#112a1f';
  for(let i=-3;i<7;i++){
    const y=H*0.55 + ((scroll*0.45)%(H*0.32));
    const x=(i*140)%(W+140)-70;
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+70,y-52);
    ctx.lineTo(x+140,y);
    ctx.fill();
  }
  // Layer 3: near ground + road (moving down)
  ctx.fillStyle='#1a3a2a';
  ctx.fillRect(0,H*0.62,W,H*0.38);
  // Road scrolling vertically
  ctx.fillStyle='#223322';
  ctx.fillRect(W/2-26,H*0.62,52,H*0.38);
  ctx.strokeStyle='#335533';
  ctx.lineWidth=2;
  ctx.setLineDash([18,14]);
  ctx.beginPath();
  const roadOffset=(scroll*0.9)%36;
  ctx.moveTo(W/2,H*0.62-roadOffset);
  ctx.lineTo(W/2,H-roadOffset);
  ctx.stroke();
  ctx.setLineDash([]);
  // Road edge lines
  ctx.strokeStyle='#445544';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.rect(W/2-26,H*0.62,52,H*0.38);
  ctx.stroke();
  ctx.restore();
}

function drawPlayer(){
  if(!player)return;const{px,py}=player;
  ctx.fillStyle='#345';ctx.beginPath();ctx.moveTo(px,py-26);ctx.lineTo(px+10,py+24);ctx.lineTo(px+2,py+20);ctx.lineTo(px-2,py+20);ctx.lineTo(px-10,py+24);ctx.closePath();ctx.fill();
  ctx.fillStyle='#234';ctx.beginPath();ctx.moveTo(px-10,py+8);ctx.lineTo(px-16,py+20);ctx.lineTo(px-4,py+18);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(px+10,py+8);ctx.lineTo(px+16,py+20);ctx.lineTo(px+4,py+18);ctx.closePath();ctx.fill();
  circle(px,py-8,3,'#0f8');
  const f=6+Math.random()*4;ctx.fillStyle=`hsl(${25+Math.random()*15},100%,${50+Math.random()*30}%)`;
  ctx.beginPath();ctx.moveTo(px-4,py+20);ctx.lineTo(px,py+20+f);ctx.lineTo(px+4,py+20);ctx.fill();
  if(shieldActive){
    const pulse=1+Math.sin(Date.now()/90)*.08;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(77,238,255,.95)';
    ctx.fillStyle='rgba(77,238,255,.12)';
    ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(px,py,30*pulse,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px,py,36*pulse,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=.45;
    ctx.beginPath();ctx.arc(px,py,22*pulse,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  if(Date.now()<invincibleUntil){ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(px,py,26,0,Math.PI*2);ctx.stroke()}
}

function drawEnemy(e){
  const{x,y,type}=e,d=e.data;
  const pal=type==='fighter'?{base:'#ff4a4a',dark:'#8b1317',light:'#ffd8d8',glow:'#ff8c8c',core:'#fff2f2'}
    :type==='bomber'?{base:'#ff9f1a',dark:'#8a4900',light:'#ffe6a6',glow:'#ffd07a',core:'#fff6df'}
    :type==='scout'?{base:'#b669ff',dark:'#5f2a9a',light:'#f3ddff',glow:'#d4a6ff',core:'#fff8ff'}
    :type==='armored'?{base:'#d0d0d0',dark:'#585858',light:'#ffffff',glow:'#ececec',core:'#ffffff'}
    :type==='dive'?{base:'#ff7a2b',dark:'#973100',light:'#ffe0bd',glow:'#ffc275',core:'#fff4e7'}
    :type==='sweeper'?{base:'#49e7ff',dark:'#005766',light:'#eaffff',glow:'#9ff4ff',core:'#ffffff'}
    :type==='weave'?{base:'#7dff5f',dark:'#1f5d18',light:'#e6ffe0',glow:'#b9ffab',core:'#ffffff'}
    :type==='bonus'?{base:'#ffd84d',dark:'#8e6400',light:'#fff4c2',glow:'#ffe68d',core:'#ffffff'}
    :{base:'#ffa000',dark:'#8a4a00',light:'#ffe0a8',glow:'#ffcb6a',core:'#fff4db'};
  ctx.save();
  ctx.translate(x,y);
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=.13;
  const halo=ctx.createRadialGradient(0,0,4,0,0,type==='boss'?58:36);
  halo.addColorStop(0,pal.glow);
  halo.addColorStop(.5,pal.base);
  halo.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=halo;
  ctx.beginPath();ctx.arc(0,0,type==='boss'?58:36,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;

  if(type==='fighter'){
    ctx.fillStyle=pal.dark;ctx.beginPath();ctx.moveTo(0,22);ctx.lineTo(-18,-8);ctx.lineTo(-8,-18);ctx.lineTo(8,-18);ctx.lineTo(18,-8);ctx.closePath();ctx.fill();
    ctx.fillStyle=pal.base;ctx.beginPath();ctx.moveTo(0,24);ctx.lineTo(-14,-10);ctx.lineTo(0,-18);ctx.lineTo(14,-10);ctx.closePath();ctx.fill();
    ctx.strokeStyle=pal.light;ctx.lineWidth=2;ctx.stroke();
    rect(0,2,10,18,pal.light);rect(-11,-4,6,12,pal.dark);rect(11,-4,6,12,pal.dark);
    circle(0,10,4,pal.core);rect(-6,14,4,6,pal.glow);rect(6,14,4,6,pal.glow);
  }else if(type==='bomber'){
    ctx.fillStyle=pal.dark;ctx.beginPath();ctx.moveTo(0,22);ctx.lineTo(-22,2);ctx.lineTo(-18,-12);ctx.lineTo(18,-12);ctx.lineTo(22,2);ctx.closePath();ctx.fill();
    ctx.fillStyle=pal.base;ctx.beginPath();ctx.moveTo(0,20);ctx.lineTo(-18,0);ctx.lineTo(-12,-10);ctx.lineTo(12,-10);ctx.lineTo(18,0);ctx.closePath();ctx.fill();
    ctx.strokeStyle=pal.light;ctx.lineWidth=2;ctx.stroke();
    rect(0,-1,18,22,pal.base);rect(0,-10,10,8,pal.dark);rect(0,10,12,10,pal.light);
    rect(-16,-1,8,24,pal.dark);rect(16,-1,8,24,pal.dark);rect(-16,8,6,8,pal.glow);rect(16,8,6,8,pal.glow);
    circle(0,6,4,pal.core);circle(-12,11,3,pal.glow);circle(12,11,3,pal.glow);
  }else if(type==='scout'){
    circle(0,0,14,pal.dark);circle(0,0,12,pal.base);circle(0,4,6,pal.light);
    ctx.strokeStyle=pal.light;ctx.lineWidth=2;ctx.stroke();
    rect(-11,-2,4,16,pal.dark);rect(11,-2,4,16,pal.dark);
    rect(0,12,8,8,pal.glow);circle(0,7,2,pal.core);circle(-7,-7,2,pal.light);circle(7,-7,2,pal.light);
  }else if(type==='armored'){
    circle(0,0,19,pal.dark);circle(0,0,16,pal.base);circle(0,0,11,pal.dark);
    ctx.strokeStyle=pal.light;ctx.lineWidth=2;ctx.stroke();
    rect(0,-2,24,12,pal.dark);rect(0,8,16,10,pal.light);rect(-16,0,6,18,pal.dark);rect(16,0,6,18,pal.dark);
    circle(0,9,4,pal.glow);rect(0,12,10,6,pal.core);circle(-9,-5,2,pal.light);circle(9,-5,2,pal.light);
  }else if(type==='dive'){
    ctx.fillStyle=pal.dark;ctx.beginPath();ctx.moveTo(0,22);ctx.lineTo(-18,-4);ctx.lineTo(-8,-18);ctx.lineTo(8,-18);ctx.lineTo(18,-4);ctx.closePath();ctx.fill();
    ctx.fillStyle=pal.base;ctx.beginPath();ctx.moveTo(0,20);ctx.lineTo(-14,-2);ctx.lineTo(-6,-16);ctx.lineTo(6,-16);ctx.lineTo(14,-2);ctx.closePath();ctx.fill();
    ctx.strokeStyle=pal.light;ctx.lineWidth=2;ctx.stroke();
    rect(0,-1,12,20,pal.base);rect(0,10,8,10,pal.light);circle(0,8,3,pal.core);rect(-13,2,4,14,pal.dark);rect(13,2,4,14,pal.dark);
  }else if(type==='sweeper'){
    ctx.fillStyle=pal.dark;ctx.beginPath();ctx.moveTo(0,20);ctx.lineTo(-24,2);ctx.lineTo(-14,-12);ctx.lineTo(14,-12);ctx.lineTo(24,2);ctx.closePath();ctx.fill();
    ctx.fillStyle=pal.base;ctx.beginPath();ctx.moveTo(0,18);ctx.lineTo(-20,0);ctx.lineTo(-10,-10);ctx.lineTo(10,-10);ctx.lineTo(20,0);ctx.closePath();ctx.fill();
    ctx.strokeStyle=pal.light;ctx.lineWidth=2;ctx.stroke();
    rect(0,-2,14,20,pal.dark);rect(0,8,8,12,pal.core);rect(-18,2,6,10,pal.glow);rect(18,2,6,10,pal.glow);
    circle(-8,-6,3,pal.light);circle(8,-6,3,pal.light);
  }else if(type==='weave'){
    ctx.fillStyle=pal.dark;ctx.beginPath();ctx.moveTo(0,20);ctx.lineTo(16,0);ctx.lineTo(0,-18);ctx.lineTo(-16,0);ctx.closePath();ctx.fill();
    ctx.fillStyle=pal.base;ctx.beginPath();ctx.moveTo(0,18);ctx.lineTo(12,0);ctx.lineTo(0,-16);ctx.lineTo(-12,0);ctx.closePath();ctx.fill();
    ctx.strokeStyle=pal.light;ctx.lineWidth=2;ctx.stroke();
    rect(0,-1,10,18,pal.dark);rect(-10,6,4,10,pal.light);rect(10,6,4,10,pal.light);circle(0,8,3,pal.core);circle(-7,-7,2,pal.glow);circle(7,-7,2,pal.glow);
  }else if(type==='boss'){
    rect(0,0,72,34,pal.dark);rect(0,-10,54,24,pal.base);rect(0,12,60,22,pal.base);
    rect(-30,-1,10,22,pal.dark);rect(30,-1,10,22,pal.dark);rect(-18,14,14,12,pal.dark);rect(18,14,14,12,pal.dark);
    rect(0,18,20,12,pal.light);circle(0,10,10,pal.core);circle(-34,-6,7,pal.glow);circle(34,-6,7,pal.glow);circle(-14,-4,4,pal.light);circle(14,-4,4,pal.light);
    ctx.strokeStyle=pal.light;ctx.lineWidth=2;ctx.stroke();
    const hp=d.hp/d.maxHp;ctx.fillStyle='#400';ctx.fillRect(-32,24,64,4);ctx.fillStyle=hp>.5?'#0f0':hp>.25?'#ff0':'#f00';ctx.fillRect(-32,24,64*hp,4);
  }
  ctx.restore();
}

// ===== SPAWNING =====
function spawnBullet(x,y,dir=-1,opts={}){bullets.push({x,y,vx:opts.vx??0,vy:opts.vy??(8*dir),type:'player',color:opts.color||'#0f8',mode:opts.mode||'normal',speed:opts.speed||Math.abs(opts.vy??(8*dir)),trail:0});if(bullets.length>bulletCap)bullets.splice(0,bullets.length-bulletCap)}
function spawnBomb(x,y){bullets.push({x,y,vx:0,vy:4.5,type:"bomb",color:"#ff0",mode:"bomb"});}
function spawnEnemyBullet(x,y){bulletsEnemy.push({x,y,vx:(Math.random()-.5)*2,vy:3,type:'enemy'});if(bulletsEnemy.length>bulletCap)bulletsEnemy.splice(0,bulletsEnemy.length-bulletCap)}
function spawnGroundEnemy(x,y,type){const d={hp:3,pts:120,type};groundEnemies.push({x,y,type,v:1.6,hp:d.hp,pts:d.pts});if(groundEnemies.length>12)groundEnemies.shift();}
function spawnEnemy(x,y,type){
  const types={fighter:{hp:1,spd:3.4,pts:70,ch:.006},bomber:{hp:2,spd:1.7,pts:170,ch:.01},scout:{hp:1,spd:5.2,pts:90,ch:.008},armored:{hp:5,spd:1.2,pts:250,ch:.006},dive:{hp:2,spd:3.0,pts:140,ch:.012},sweeper:{hp:3,spd:2.2,pts:220,shootCh:.018},weave:{hp:2,spd:2.7,pts:160,ch:.01},bonus:{hp:1,spd:2.0,pts:650,ch:.016,bonus:true},boss:{hp:14,spd:.6,pts:1400,ch:.014}};
  const d=types[type]||types.fighter;
  let beh='normal',ang=0,phase=0,vx=(Math.random()-.5)*1.8;
  if(type==='fighter'){beh=['zigzag','strafe','charge'][Math.floor(Math.random()*3)];phase=Math.random()*10}
  else if(type==='bomber'){beh=['retreat','circle'][Math.floor(Math.random()*2)];ang=Math.random()*10}
  else if(type==='scout')beh='charge';
  else if(type==='armored'){beh=['circle','zigzag'][Math.floor(Math.random()*2)];ang=Math.random()*10}
  else if(type==='dive'){beh='dive';vx=(Math.random()-.5)*1.4}
  else if(type==='sweeper'){beh='sweep';vx=(Math.random()>.5?1:-1)*d.spd*1.8}
  else if(type==='weave'){beh='weave';phase=Math.random()*10}
  else if(type==='bonus'){beh=['weave','sweep','strafe'][Math.floor(Math.random()*3)];vx=(Math.random()>.5?1:-1)*1.4}
  else if(type==='boss'){beh='strafe'}
  const e={x,y,type,data:{...d,maxHp:d.hp,behavior:beh,angle:ang,phase,vx,speed:d.spd,ch2:.015,fled:false,sAtY:false,dived:false,weaveDir:Math.random()>.5?1:-1,flash:0}};
  enemies.push(e);if(enemies.length>enemyCap)enemies.splice(0,enemies.length-enemyCap);return e
}
function spawnFuel(){fuelPickups.push({x:Math.random()*(W-50)+25,y:-15,type:'fuel',value:40,pulse:Math.random()*Math.PI*2,nextSparkle:Date.now()+rnd(0,180)})}
function spawnPowerup(){if(powerups.length>=2)return;const pool=['weapon','weapon','weapon','life','life','shield','shield','spread','homing'];const t=pool[Math.floor(Math.random()*pool.length)];powerups.push({x:Math.random()*(W-56)+28,y:-18,type:'powerup',ptype:t,pulse:Math.random()*Math.PI*2,spin:Math.random()*Math.PI*2,nextSparkle:Date.now()+rnd(0,180)})}
function spawnParticle(x,y,color,life,kind='debris'){let vx=(Math.random()-.5)*6,vy=(Math.random()-.5)*6-1,r=rnd(2,5);if(kind==='smoke'){vx=(Math.random()-.5)*1.2;vy=-rnd(.3,1.8);r=rnd(4,8)}else if(kind==='trail'){vx=(Math.random()-.5)*1.4;vy=rnd(1.8,4.2);r=rnd(2,4)}else if(kind==='sparkle'){vx=(Math.random()-.5)*2.2;vy=(Math.random()-.5)*2.2-1;r=rnd(1.2,2.4)}else if(kind==='flash'){vx=(Math.random()-.5)*3;vy=(Math.random()-.5)*3;r=rnd(3,6)}particles.push({x,y,vx,vy,life:life||rnd(10,20),color,r,kind});if(particles.length>particleCap)particles.splice(0,particles.length-particleCap)}
function burstShield(x,y,scale=1){for(let i=0;i<26;i++){const a=Math.random()*Math.PI*2,sp=rnd(2.2,6.8)*scale;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-rnd(.4,1.6),life:rnd(14,30),color:i%3===0?'#ffffff':'#55f3ff',r:rnd(2,4)})}}
function spawnExplosion(x,y,scale=1){const core=Math.max(3,Math.round(5*scale)),smoke=Math.max(6,Math.round(9*scale)),debris=Math.max(8,Math.round(12*scale));for(let i=0;i<core;i++)spawnParticle(x+rnd(-3,3)*scale,y+rnd(-3,3)*scale,i%2?'#fff':'#fffbcc',rnd(10,16),'flash');for(let i=0;i<smoke;i++)spawnParticle(x+rnd(-5,5)*scale,y+rnd(-5,5)*scale,['#a2adb8','#7f8894','#5b636f'][i%3],rnd(26,42),'smoke');for(let i=0;i<debris;i++)spawnParticle(x,y,['#ffea72','#ff9f1a','#ff4d4d'][i%3],rnd(14,30),'debris')}
function spawnEngineTrail(x,y,intensity=1){for(let i=0;i<2;i++)spawnParticle(x+rnd(-4,4),y+rnd(16,24),i===0?'#ffef8a':'#ff8a1f',rnd(12,24),'trail')}
function spawnPickupSparkle(x,y,color){for(let i=0;i<2;i++)spawnParticle(x+rnd(-7,7),y+rnd(-7,7),color||'#fff75a',rnd(10,18),'sparkle')}
function comboMultiplier(count=comboCount){return Math.min(5,1+Math.floor(count/2))}
function spawnPop(x,y,text,opts={}){popups.push({x,y,text,life:opts.life||1000,vx:opts.vx||0,vy:opts.vy??-1.2,size:opts.size||16,color:opts.color||'#ff0',kind:opts.kind||'text'});if(popups.length>popupCap)popups.splice(0,popups.length-popupCap)}
function updateHighScore(v=score){if(v>highScore){highScore=v;localStorage.setItem('starHS',String(highScore));return true}return false}
function buildShareText(){return `Star Blaster score ${score} • wave ${waveNum+1} • combo x${Math.max(1,comboCount)} • high ${highScore}\nhttps://github.com/wdavidpence/star-blaster`}
async function shareScore(){const s=document.getElementById('share-status');const text=buildShareText();try{if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(text);if(s)s.textContent='Copied score text';return true}}catch(e){}if(s)s.textContent=text;return false}
function rnd(a,b){return a+Math.random()*(b-a)}
function nearestEnemy(x,y,maxDist=520){let best=null,bestD=maxDist;for(const e of enemies){const d=Math.hypot(e.x-x,e.y-y);if(d<bestD){best=e;bestD=d}}return best}

// ===== INPUT (Touch + Keyboard) =====
function primaryTouch(list,id){for(let i=0;i<list.length;i++){const t=list[i];if(t.identifier===id)return t}return null}
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(touch.id!==null)return;const t=e.changedTouches[0];if(!t)return;touch.id=t.identifier;touch.x=t.clientX;touch.y=t.clientY;touch.down=true;touch.glow=1;window.GameAudio.init();window.GameAudio.resume()},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(touch.id===null)return;const t=primaryTouch(e.touches,touch.id);if(!t)return;touch.x=t.clientX;touch.y=t.clientY;touch.glow=1},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(touch.id===null)return;if(primaryTouch(e.changedTouches,touch.id)){touch.down=false;touch.id=null}},{passive:false});
canvas.addEventListener('touchcancel',e=>{e.preventDefault();if(touch.id!==null){touch.down=false;touch.id=null}},{passive:false});
canvas.addEventListener('mousedown',e=>{touch.id='mouse';touch.down=true;touch.x=e.clientX;touch.y=e.clientY;touch.glow=1;window.GameAudio.init();window.GameAudio.resume()});
canvas.addEventListener('mousemove',e=>{if(touch.down&&touch.id==='mouse'){touch.x=e.clientX;touch.y=e.clientY;touch.glow=1}});
canvas.addEventListener('mouseup',()=>{if(touch.id==='mouse'){touch.down=false;touch.id=null}});
canvas.addEventListener('mouseleave',()=>{if(touch.id==='mouse'){touch.down=false;touch.id=null}});
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){e.preventDefault()}});
document.addEventListener('keyup',e=>{keys[e.key]=false});

function shoot(){
  window.GameAudio.shoot();
  const noseY=player.py-27;
  const tier=Math.min(3,Math.max(1,weaponLevel));
  const special=homingTimer>0?'homing':spreadTimer>0?'spread':'base';
  if(special==='spread'){
    const offs=tier===1?[-1,0,1]:tier===2?[-1.5,-0.5,0.5,1.5]:[-2,-1,0,1,2];
    offs.forEach(off=>{
      const bx=player.px+off*12;
      spawnBullet(bx,noseY,-1,{vx:off*1.65,vy:-7.7,color:'#ff9f1a',mode:'spread',speed:7.7,life:1800});
      spawnParticle(bx,noseY,'#ffd15c',5)
    });
  }else if(special==='homing'){
    const offs=tier===1?[0]:tier===2?[-8,8]:[-12,0,12];
    offs.forEach(off=>{
      const bx=player.px+off;
      spawnBullet(bx,noseY,-1,{vx:0,vy:-6.5,color:'#ff4df2',mode:'homing',speed:6.8,life:2400});
      spawnParticle(bx,noseY,'#ff8cff',5)
    });
  }else if(tier===1){
    spawnBullet(player.px,noseY,-1,{color:'#0f8',vy:-8.6,life:1600});
    spawnParticle(player.px,noseY,'#ff0',6);
    spawnParticle(player.px,noseY+2,'#fff',3)
  }else if(tier===2){
    spawnBullet(player.px-7,noseY,-1,{vx:-.65,vy:-8.2,color:'#58f',life:1700});
    spawnBullet(player.px+7,noseY,-1,{vx:.65,vy:-8.2,color:'#8ff',life:1700});
    spawnParticle(player.px-7,noseY,'#8ff',5);
    spawnParticle(player.px+7,noseY,'#58f',5)
  }else{
    spawnBullet(player.px-11,noseY,-1,{vx:-.9,vy:-8.0,color:'#ff9f1a',life:1700});
    spawnBullet(player.px,noseY,-1,{vx:0,vy:-8.7,color:'#fff',life:1600});
    spawnBullet(player.px+11,noseY,-1,{vx:.9,vy:-8.0,color:'#ff0',life:1700});
    spawnParticle(player.px-11,noseY,'#ff9f1a',5);
    spawnParticle(player.px,noseY,'#fff',6);
    spawnParticle(player.px+11,noseY,'#ff0',5)
  }
}

// ===== GAME FUNCTIONS =====
function startGame(){
  window.GameAudio.init();window.GameAudio.resume();
  document.getElementById('start-btn').style.display='none';
  document.getElementById('gameover').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('hud').classList.remove('low-fuel');
  player=null;enemies=[],groundEnemies=[];bullets=[];bulletsEnemy=[];powerups=[];fuelPickups=[];particles=[];popups=[];
  active=true;paused=false;score=0;fuel=100;lives=3;weaponLevel=1;shieldActive=false;
  comboCount=0;comboTimer=0;difficulty=1;waveNum=0;lastWaveTime=Date.now();waveAnnounceTimer=7000;
  const wave0=getWaveMeta(0);waveTitle=wave0.title;waveDesc=wave0.desc;
  invincibleUntil=Date.now()+1500;travelled=0;shakeTime=0;shakePower=0;damageFlash=0;spreadTimer=0;homingTimer=0;
  timers.lastTime=Date.now();timers._lastEnemy=Date.now();timers._lastFuel=Date.now();timers._lastPw=Date.now();timers._lastShot=0;timers._lastTrail=0;
  timers._bossWaveSpawnedFor=-1;
  touch.down=false;touch.id=null;touch.glow=0;
  for(const k in keys)delete keys[k];
  player={px:W/2,py:H-100};
  if(!gameLoopStarted){gameLoopStarted=true;requestAnimationFrame(gameLoop)}
}

function loseLife(){
  lives--;invincibleUntil=Date.now()+1500;triggerShake(8,480);
  spawnExplosion(player.px,player.py,1.25);
  if(lives<=0){window.GameAudio.death();gameOver();}
}

function gameOver(){
  active=false;paused=false;document.getElementById('hud').style.display='none';
  updateHighScore(score);
  document.getElementById('fs').textContent=score;
  document.getElementById('hfs').textContent=highScore;
  document.getElementById('gw').textContent=waveNum+1;
  touch.down=false;touch.id=null;touch.glow=0;
  for(const k in keys)delete keys[k];
  const shareStatus=document.getElementById('share-status');
  if(shareStatus)shareStatus.textContent='Tap anywhere to restart';
  document.getElementById('gameover').style.display='flex';
}

// ===== COLLISIONS =====
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function update(){
  if(!active||paused)return;const now=Date.now(),dt=Math.min(now-(timers.lastTime||now),50);timers.lastTime=now;

  if(now-lastWaveTime>20000){waveNum++;lastWaveTime=now;const meta=getWaveMeta(waveNum);waveTitle=meta.title;waveDesc=meta.desc;waveAnnounceTimer=10000;window.GameAudio.wave()}
  if(waveAnnounceTimer>0)waveAnnounceTimer-=dt;

  const waveMeta=getWaveMeta(waveNum);
  const bossWave=waveMeta.boss;
  difficulty=1+waveNum*.12+(bossWave?0.12:0);

  if(bossWave){
    if(!enemies.some(e=>e.type==='boss')&&timers._bossWaveSpawnedFor!==waveNum){spawnEnemy(W/2+Math.random()*120-60,-54,'boss');timers._bossWaveSpawnedFor=waveNum}
  }else if(enemies.length<waveMeta.cap&&now-timers._lastEnemy>Math.max(420,waveMeta.spawnDelay/difficulty)){
    let kind=waveMeta.pool[Math.floor(Math.random()*waveMeta.pool.length)];
    if(Math.random()<.03)kind='bonus';
    let ex=rnd(40,W-40),ey=-40;
    if(kind==='sweeper'){ex=Math.random()>.5?-60:W+60;ey=rnd(H*.22,H*.56)}
    else if(kind==='dive'){ex=rnd(W*.2,W*.8);ey=-60}
    else if(kind==='weave'){ex=rnd(40,W-40);ey=-50}
    spawnEnemy(ex,ey,kind);timers._lastEnemy=now
  }
  if(now-timers._lastFuel>8000){spawnFuel();timers._lastFuel=now}
  if(now-timers._lastPw>13500){spawnPowerup();timers._lastPw=now}

  if(touch.down){if(touch.y>H*0.55){if(now-timers._lastBomb>280){spawnBomb(touch.x,touch.y-30);timers._lastBomb=now}}else{
  if(now-timers._lastGround>1400&&groundEnemies.length<6){spawnGroundEnemy(W/2+(Math.random()-0.5)*80,H*0.72+Math.random()*40,"turret");timers._lastGround=now}
    const dx=touch.x-player.px,dy=touch.y-(player.py-60);
    const mag=Math.hypot(dx,dy)||1;
    if(mag>10){
      player.px+=dx/mag*Math.min(touch.speed*dt/16,30);
      player.py-=dy/mag*Math.min(touch.speed*dt/16,20);
    }
  }
  player.px=Math.max(18,Math.min(W-18,player.px));
  player.py=Math.max(H*.3,Math.min(H-40,player.py));
  const moving=Math.abs(touch.x-player.px)+Math.abs(touch.y-(player.py-60));
  if(now-(timers._lastTrail||0)>55&&(touch.down||moving>24||keys[' '])){spawnEngineTrail(player.px,player.py,1);timers._lastTrail=now}

  const fireHeld=touch.down||keys[' '];
  if(fireHeld&&now-timers._lastShot>Math.max(70,100-weaponLevel*10)){shoot();timers._lastShot=now}

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.life-=dt;
    if(b.life<=0){bullets.splice(i,1);continue}
    if(b.mode==='homing'){
      const t=nearestEnemy(b.x,b.y,520);
      if(t){
        const dx=t.x-b.x,dy=t.y-b.y,mag=Math.hypot(dx,dy)||1,targetSpeed=b.speed||6.4;
        b.vx+=(dx/mag)*.7*dt/16;
        b.vy+=(dy/mag)*.7*dt/16;
        const m2=Math.hypot(b.vx,b.vy)||1;
        b.vx=b.vx/m2*targetSpeed;
        b.vy=b.vy/m2*targetSpeed;
      }
    }
    b.x+=b.vx*dt/16;b.y+=b.vy*dt/16;
    if(b.y<-28||b.x<-28||b.x>W+28){bullets.splice(i,1);continue}
    for(let j=enemies.length-1;j>=0;j--){if(b.mode==="bomb")continue;
      const e=enemies[j];const ew=e.type==='boss'?34:e.type==='armored'?22:19;const hitRadius=ew+8;
      if(Math.hypot(b.x-e.x,b.y-e.y)<hitRadius){
        e.data.hp--;b._dead=true;spawnParticle(b.x,b.y,'#0f8',12);spawnParticle(b.x,b.y,'#fff',6);window.GameAudio.sfx('hit');triggerShake(3,110);e.data.flash=160;
        if(e.data.hp<=0){const mult=comboMultiplier(comboCount+1),earned=e.data.pts*mult;score+=earned;updateHighScore(score);window.GameAudio.explode();for(let k=0;k<28;k++)spawnParticle(e.x,e.y,['#ff0','#f80','#f00'][k%3]);spawnPop(e.x,e.y,'+'+earned+' x'+mult,{kind:'score',vy:-1.8-.2*mult,vx:(Math.random()-.5)*.8,size:16+mult*2,color:mult>1?'#ffea85':'#fff25a',life:1200});comboCount++;comboTimer=3200;
          if(e.data.bonus){for(let b=0;b<2;b++)spawnPowerup();spawnPop(e.x,e.y,'RARE BONUS',{kind:'score',vy:-2.2,vx:0,size:20,color:'#ffd84d',life:1400});triggerShake(8,420)}
          if(e.data.type==='boss')triggerShake(11,650);if(Math.random()<.15)spawnPowerup();enemies.splice(j,1)}
        break
      }
    }
  }
  bullets=bullets.filter(b=>!b._dead);

  for(let i=bulletsEnemy.length-1;i>=0;i--){
    const b=bulletsEnemy[i];b.x+=b.vx*dt/16;b.y+=b.vy*dt/16;
    if(b.y>H+20){bulletsEnemy.splice(i,1);continue}
    if(now<invincibleUntil)continue;
    if(Math.hypot(b.x-player.px,b.y-player.py)<18){window.GameAudio.sfx('hit');bulletsEnemy.splice(i,1);loseLife();continue}
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];const d=e.data;let vy=d.spd*dt/16,vx=0;
    if(d.behavior==='zigzag'){d.phase=(d.phase||0)+dt/500;vx=Math.sin(d.phase)*2.5*dt/16}
    else if(d.behavior==='retreat'){vy=(e.y<H*.5)?d.spd:0;vx=d.spd*1.5*dt/16}
    else if(d.behavior==='charge'){const m=e.y<H*.4?(1+difficulty*.3):(3+difficulty*.5);vy=d.spd*m*dt/16}
    else if(d.behavior==='circle'){d.angle=(d.angle||0)+dt/800;vx=Math.cos(d.angle)*1.2*dt/16}
    else if(d.behavior==='dive'){
      d.vx=(d.vx||0)+(player.px-e.x)*.0025*dt;
      d.vx*=.99;
      vx=d.vx*dt/16;
      vy=d.spd*(e.y<player.py-100?2.1:e.y<player.py+20?1.35:.7)*dt/16;
      if(!d.dived&&e.y>H*.34){d.dived=true;spawnEnemyBullet(e.x,e.y+16)}
    }
    else if(d.behavior==='sweep'){
      d.phase=(d.phase||0)+dt/360;
      vx=d.vx*dt/16;
      vy=Math.sin(d.phase*2.5)*1.1*dt/16;
      if(Math.random()<d.shootCh*dt/16)spawnEnemyBullet(e.x,e.y+16);
    }
    else if(d.behavior==='weave'){
      d.phase=(d.phase||0)+dt/220;
      if(e.x<40)d.weaveDir=1;else if(e.x>W-40)d.weaveDir=-1;
      vx=Math.sin(d.phase)*3.1*dt/16*d.weaveDir;
      vy=d.spd*dt/16;
      if(Math.random()<d.ch*dt/16)spawnEnemyBullet(e.x,e.y+16);
    }
    else if(d.behavior==='strafe'){if(e.y<80+Math.random()*40)vy=d.spd*dt/16;else if(!d.sAtY){d.sAtY=e.y;spawnEnemyBullet(e.x,e.y+16)}else if(d.ch2&&Math.random()<d.ch2*dt/16){spawnEnemyBullet(e.x,e.y+16)}else if(!d.fled){vx=(Math.random()>.5?1:-1)*d.spd*dt/16;d.fled=true}else{vy=d.spd*.2*dt/16}}
    else{vx=(Math.random()-.5)*.8}
    e.x+=vx*dt/16;e.y+=vy*dt/16;
    if(d.flash>0)d.flash=Math.max(0,d.flash-dt);
    if(d.ch&&Math.random()<d.ch*dt/16)spawnEnemyBullet(e.x,e.y+16);
    if(d.shootCh&&Math.random()<d.shootCh*dt/16)spawnEnemyBullet(e.x,e.y+16);
    if(d.behavior==='sweep'&&(e.x<-100||e.x>W+100)){enemies.splice(i,1);continue}
    if(d.behavior==='dive'&&e.y>H+90){enemies.splice(i,1);continue}
    if(e.y>H+50||e.x<-60||e.x>W+60){enemies.splice(i,1);continue}
    if(now<invincibleUntil)continue;
    const pw=16,ph=26;
    const ew=e.type==='boss'?34:e.type==='armored'?22:19;
    if(Math.abs(e.x-player.px)<ew+pw&&Math.abs(e.y-player.py)<18+ph){
      if(shieldActive){window.GameAudio.sfx('hit');for(let k=0;k<20;k++)spawnParticle(e.x,e.y,'#f80');enemies.splice(i,1);shieldActive=false;shieldTimer=0;if(player)burstShield(player.px,player.py,1.1);triggerShake(6,180);damageFlash=220}
      else{window.GameAudio.sfx('hit');window.GameAudio.explode();spawnExplosion(e.x,e.y,e.type==='boss'?1.8:e.type==='armored'?1.25:1);enemies.splice(i,1);triggerShake(e.type==='boss'?10:7,e.type==='boss'?680:260);damageFlash=260;loseLife();}
    }
  }

  for(let i=fuelPickups.length-1;i>=0;i--){
    const f=fuelPickups[i];f.y+=2*dt/16;
    if(now>(f.nextSparkle||0)){spawnPickupSparkle(f.x,f.y,'#fff75a');f.nextSparkle=now+120+rnd(0,80)}
    if(Math.hypot(f.x-player.px,f.y-player.py)<20){fuel=Math.min(100,fuel+(f.value||40));window.GameAudio.fuel();spawnPop(f.x,f.y,'FUEL +' + (f.value||40));fuelPickups.splice(i,1);continue}
    if(f.y>H+20)fuelPickups.splice(i,1)
  }

  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];p.y+=1.7*dt/16;
    if(now>(p.nextSparkle||0)){spawnPickupSparkle(p.x,p.y,p.ptype==='shield'?'#4deeff':p.ptype==='homing'?'#ff4df2':p.ptype==='spread'?'#ff9f1a':p.ptype==='life'?'#ff57d9':'#4dff8f');p.nextSparkle=now+100+rnd(0,70)}
    if(Math.hypot(p.x-player.px,p.y-player.py)<24){
      if(p.ptype==='weapon')weaponLevel=Math.min(3,weaponLevel+1);
      else if(p.ptype==='life')lives++;
      else if(p.ptype==='shield'){shieldActive=true;shieldTimer=9000;window.GameAudio.shield()}
      else if(p.ptype==='spread'){spreadTimer=12000;homingTimer=Math.max(0,homingTimer-1500)}
      else if(p.ptype==='homing'){homingTimer=12000;spreadTimer=Math.max(0,spreadTimer-1500)}
      if(p.ptype!=='shield')window.GameAudio.powerup();spawnPop(p.x,p.y,''+p.ptype.toUpperCase());powerups.splice(i,1);continue;
    }
    if(p.y>H+20)powerups.splice(i,1)
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.kind==='smoke'){p.vx*=.985;p.vy*=.99;p.vy-=.01}
    else if(p.kind==='trail'){p.vx*=.97;p.vy*=.95;p.vy+=.02}
    else if(p.kind==='sparkle'){p.vx*=.985;p.vy*=.985}
    else if(p.kind==='flash'){p.vx*=.98;p.vy*=.98}
    else{p.vy+=.12}
    p.x+=p.vx*dt/16;p.y+=p.vy*dt/16;p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue}
  }

  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];p.x+=p.vx*dt/16;p.y+=p.vy*dt/16;p.vy-=.03*dt;p.life-=dt;
    if(p.life<=0){popups.splice(i,1);continue}
  }

  comboTimer>0?comboTimer-=dt:(comboCount=0);
  if(now-(timers._lastFuel||now)>1000){fuel=Math.max(0,fuel-1);timers._lastFuel=now;if(fuel<=0)loseLife()}
  travelled+=dt/1e3;shakeTime>0?shakeTime-=dt:0;
  if(shieldActive){
    shieldTimer-=dt;
    if(shieldTimer<=0){
      shieldActive=false;
      shieldTimer=0;
      if(player)burstShield(player.px,player.py,1.15);
      triggerShake(5,180);
      damageFlash=Math.max(damageFlash,180);
      window.GameAudio.sfx('hit');
    }
  }
  damageFlash>0?damageFlash-=dt:0;spreadTimer>0?spreadTimer-=dt:0;homingTimer>0?homingTimer-=dt:0;
  touch.glow=touch.down?Math.min(1,touch.glow+dt/120):Math.max(0,touch.glow-dt/180);

  document.getElementById('sc').textContent=score;document.getElementById('hs2').textContent=highScore;
  document.getElementById('wave').textContent='WAVE '+(waveNum+1)+(bossWave?' • BOSS':'');
  const waveBanner=document.getElementById('waveBanner');
  if(waveBanner){
    waveBanner.style.display=waveAnnounceTimer>0?'block':'none';
    waveBanner.querySelector('.t').textContent='WAVE '+(waveNum+1)+(bossWave?' • BOSS WAVE':'');
    waveBanner.querySelector('.d').textContent=waveTitle+' — '+waveDesc;
  }
  document.getElementById('wp').textContent='WPN '+weaponLevel;
  document.getElementById('sh').textContent=shieldActive?'SHIELD '+Math.max(0,shieldTimer/1000).toFixed(1)+'s':'SHIELD OFF';
  document.getElementById('sh').classList.toggle('on',shieldActive);
  document.getElementById('sp').textContent=spreadTimer>0?'SPREAD '+Math.ceil(spreadTimer/1000)+'s':'SPREAD';
  document.getElementById('sp').style.display=spreadTimer>0?'inline-flex':'none';
  document.getElementById('hm').textContent=homingTimer>0?'HOMING '+Math.ceil(homingTimer/1000)+'s':'HOMING';
  document.getElementById('hm').style.display=homingTimer>0?'inline-flex':'none';
  document.getElementById('fuel').style.width=fuel+'%';
  document.getElementById('hud').classList.toggle('low-fuel',fuel<25);
  document.getElementById('fw').style.display=fuel<25?'inline-flex':'none';
  document.getElementById('lives').textContent='♥ '+lives;
  updateHighScore(score);
  document.getElementById('hs2').textContent=highScore;
  const comboEl=document.getElementById('combo');
  if(comboEl){
    comboEl.textContent=comboCount>0?`COMBO x${comboCount} • ${comboMultiplier(comboCount)}x`:'';
    comboEl.style.display=comboCount>0?'block':'none';
    comboEl.style.color=comboMultiplier(comboCount)>=4?'#ff7':'#ff0';
  }
}

// ===== RENDERING =====
function render(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(damageFlash>0){ctx.save();ctx.globalAlpha=Math.min(.28,damageFlash/900);ctx.fillStyle='#ff2200';ctx.fillRect(0,0,W,H);ctx.restore();}
  if(shakeTime>0){
    ctx.save();
    const shakeFrac=Math.max(0,shakeTime/650),mag=shakePower*shakeFrac,zoom=1+Math.min(.045,mag*.003);
    ctx.translate(W/2,H/2);
    ctx.scale(zoom,zoom);
    ctx.translate(-W/2+(Math.random()-.5)*mag,-H/2+(Math.random()-.5)*mag*.75);
  }
  starfield();
  drawTerrain();

    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=.14+waveAlpha*.28;
    ctx.fillStyle='rgba(0,0,0,.72)';
    ctx.fillRect(W*.12,H*.16,W*.76,72);
    ctx.strokeStyle=bossWave?'rgba(255,170,60,.7)':'rgba(124,246,255,.55)';
    ctx.lineWidth=2;
    ctx.strokeRect(W*.12,H*.16,W*.76,72);
    ctx.textAlign='center';
    ctx.fillStyle='#fff';
    ctx.font='bold 26px monospace';
    ctx.fillText('WAVE '+(waveNum+1),W/2,H*.16+30);
    ctx.font='bold 14px monospace';
    ctx.fillStyle=bossWave?'#ffb14d':'#7cf6ff';
    ctx.fillText(waveTitle+' — '+waveDesc,W/2,H*.16+54);
    ctx.restore();
  }

  const bossEnemy=enemies.find(e=>e.type==='boss');
  if(bossEnemy){
    const hp=bossEnemy.data.hp/bossEnemy.data.maxHp;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(0,0,0,.55)';
    ctx.fillRect(W*.18,12,W*.64,16);
    ctx.strokeStyle='rgba(255,255,255,.35)';
    ctx.strokeRect(W*.18,12,W*.64,16);
    ctx.fillStyle=hp>.5?'#0f8':hp>.25?'#ff0':'#f44';
    ctx.fillRect(W*.18,12,W*.64*hp,16);
    ctx.fillStyle='#fff';
    ctx.font='bold 11px monospace';
    ctx.textAlign='center';
    ctx.fillText('BOSS '+Math.ceil(hp*100)+'%',W/2,24);
    ctx.restore();
  }

  enemies.forEach(e=>drawEnemy(e));
  enemies.forEach(e=>{
  groundEnemies.forEach(g=>{ctx.fillStyle="#555";ctx.fillRect(g.x-10,g.y-6,20,12);ctx.fillStyle="#0a0";ctx.fillRect(g.x-4,g.y-3,8,6);});
    if(e.data.flash>0){
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha=Math.min(.75,e.data.flash/160);
      ctx.strokeStyle='#fff';
      ctx.fillStyle='#fffbcc';
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.arc(e.x,e.y,(e.type==='boss'?38:e.type==='armored'?26:22)+e.data.flash/50,0,Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(e.x,e.y,6,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  });
  bullets.forEach(b=>{if(b.mode==="bomb"){ctx.fillStyle=b.color;ctx.fillRect(b.x-3,b.y-5,6,10);ctx.fillStyle="#ff0";ctx.fillRect(b.x-1,b.y-2,2,4);return}ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle=b.color||'#0f8';ctx.beginPath();ctx.arc(b.x,b.y,b.mode==='homing'?5.5:b.mode==='spread'?4.5:4,0,Math.PI*2);ctx.fill();if(b.mode==='homing'){ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(b.x,b.y,7,0,Math.PI*2);ctx.stroke()}ctx.restore()});
  bulletsEnemy.forEach(b=>{ctx.fillStyle='#f33';ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill()});

  fuelPickups.forEach(f=>{const pulse=1+Math.sin(Date.now()/140+f.pulse)*.15;ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle='rgba(255,245,80,.18)';ctx.beginPath();ctx.arc(f.x,f.y,18*pulse,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff75a';ctx.beginPath();ctx.arc(f.x,f.y,11*pulse,0,Math.PI*2);ctx.fill();ctx.fillStyle='#b6ff3a';ctx.beginPath();ctx.arc(f.x+3,f.y-3,5*pulse,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();ctx.arc(f.x,f.y,12*pulse,0,Math.PI*2);ctx.stroke();ctx.restore()});

  powerups.forEach(p=>{
    const pulse=1+Math.sin(Date.now()/150+p.pulse)*.12;
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate((p.spin||0)+Date.now()/1400);
    ctx.globalCompositeOperation='lighter';
    if(p.ptype==='weapon'){
      ctx.fillStyle='#4dff8f';ctx.beginPath();ctx.arc(0,0,11*pulse,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#caffdd';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,-9);ctx.lineTo(0,9);ctx.moveTo(-9,0);ctx.lineTo(9,0);ctx.stroke();
    }else if(p.ptype==='life'){
      ctx.fillStyle='#ff57d9';ctx.beginPath();ctx.arc(0,0,10*pulse,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-3,-2,3.2,0,Math.PI*2);ctx.arc(3,-2,3.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffd4f2';ctx.fillRect(-2,0,4,7);
    }else if(p.ptype==='shield'){
      ctx.strokeStyle='#4deeff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,11*pulse,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(77,238,255,.28)';ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
    }else if(p.ptype==='spread'){
      ctx.fillStyle='#ff9f1a';ctx.beginPath();ctx.moveTo(0,-12*pulse);ctx.lineTo(11*pulse,8*pulse);ctx.lineTo(-11*pulse,8*pulse);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#fff5d4';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#fff';ctx.fillRect(-2,-2,4,4);
    }else if(p.ptype==='homing'){
      ctx.fillStyle='#ff4df2';ctx.beginPath();ctx.moveTo(0,-11*pulse);ctx.lineTo(11*pulse,0);ctx.lineTo(0,11*pulse);ctx.lineTo(-11*pulse,0);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,3.2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#ffd6fb';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
  });

  if(fuel<25){
    ctx.save();
    ctx.globalAlpha=.05+.04*Math.sin(Date.now()/180);
    ctx.fillStyle='#f00';
    ctx.fillRect(0,0,W,10);
    ctx.fillRect(0,H-10,W,10);
    ctx.restore();
    ctx.save();
    ctx.globalAlpha=.85;
    ctx.fillStyle='rgba(255,40,0,.72)';
    ctx.fillRect(W/2-78,20,156,28);
    ctx.strokeStyle='#fffb';
    ctx.lineWidth=2;
    ctx.strokeRect(W/2-78,20,156,28);
    ctx.fillStyle='#fff';
    ctx.font='bold 16px monospace';
    ctx.textAlign='center';
    ctx.fillText('LOW FUEL',W/2,40);
    ctx.restore();
  }

  if(player&&touch.glow>0){
    ctx.save();
    ctx.globalAlpha=.06+touch.glow*.18;
    ctx.strokeStyle='#0ff';
    ctx.fillStyle='#0ff';
    ctx.lineWidth=2;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(player.px,player.py-10);
    ctx.lineTo(touch.x,touch.y);
    ctx.stroke();
    ctx.globalAlpha=.04+touch.glow*.12;
    ctx.beginPath();
    ctx.arc(touch.x,touch.y,16+touch.glow*8,0,Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha=.03+touch.glow*.08;
    ctx.beginPath();
    ctx.arc(touch.x,touch.y,6+touch.glow*4,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  const muzzleGlow=Math.max(0,1-(Date.now()-timers._lastShot)/180);
  if(player&&muzzleGlow>0){
    ctx.save();
    ctx.globalAlpha=.35+muzzleGlow*.55;
    ctx.strokeStyle='#ff0';
    ctx.fillStyle='#fff4a3';
    ctx.lineWidth=3;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(player.px,player.py-27);
    ctx.lineTo(player.px,player.py-44-muzzleGlow*10);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(player.px,player.py-27,4+muzzleGlow*5,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=.15+muzzleGlow*.25;
    ctx.strokeStyle='#ff8';
    ctx.beginPath();
    ctx.arc(player.px,player.py-27,8+muzzleGlow*7,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  ctx.globalCompositeOperation='lighter';
  particles.forEach(p=>{
    const lifeAlpha=Math.max(0,Math.min(1,p.life/30));
    ctx.globalAlpha=p.kind==='smoke'?lifeAlpha*.4:p.kind==='trail'?lifeAlpha*.9:p.kind==='sparkle'?lifeAlpha:.9;
    ctx.fillStyle=p.color;
    ctx.strokeStyle=p.color;
    if(p.kind==='smoke'){
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1.1+lifeAlpha),0,Math.PI*2);ctx.fill();
      ctx.globalAlpha*=.55;
      ctx.beginPath();ctx.arc(p.x+1,p.y+1,p.r*.6*(1+lifeAlpha),0,Math.PI*2);ctx.fill();
    }else if(p.kind==='trail'){
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*2.2,p.y-p.vy*2.2);ctx.stroke();
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(.8+lifeAlpha*.5),0,Math.PI*2);ctx.fill();
    }else if(p.kind==='sparkle'){
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(p.x-3,p.y);ctx.lineTo(p.x+3,p.y);ctx.moveTo(p.x,p.y-3);ctx.lineTo(p.x,p.y+3);ctx.stroke();
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*.7,0,Math.PI*2);ctx.fill();
    }else if(p.kind==='flash'){
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(.9+lifeAlpha),0,Math.PI*2);ctx.fill();
    }else{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(lifeAlpha+.2),0,Math.PI*2);ctx.fill();
    }
  });
  ctx.restore();
  ctx.globalAlpha=1;

  popups.forEach(p=>{const a=Math.min(1,p.life/650);ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.color||'#ff0';ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=3;ctx.textAlign='center';ctx.font=`bold ${p.size||16}px Arial`;ctx.strokeText(p.text,p.x,p.y);ctx.fillText(p.text,p.x,p.y);ctx.restore()});

  drawPlayer();
  if(player&&muzzleGlow>0){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=.9;
    ctx.fillStyle='#fff200';
    ctx.fillRect(player.px-5,player.py-48-muzzleGlow*10,10,18+muzzleGlow*10);
    ctx.fillStyle='#ffffff';
    ctx.fillRect(player.px-2,player.py-42-muzzleGlow*8,4,10+muzzleGlow*6);
    ctx.strokeStyle='#fff';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(player.px,player.py-27);
    ctx.lineTo(player.px,player.py-58-muzzleGlow*8);
    ctx.stroke();
    ctx.restore();
  }


  if(waveAnnounceTimer>0){
    const waveAlpha=Math.min(1,waveAnnounceTimer/700);
    const bossWave=getWaveMeta(waveNum).boss;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=.16+waveAlpha*.34;
    ctx.fillStyle='rgba(0,0,0,.78)';
    ctx.fillRect(W*.16,H*.19,W*.68,66);
    ctx.strokeStyle=bossWave?'rgba(255,170,60,.8)':'rgba(124,246,255,.65)';
    ctx.lineWidth=2;
    ctx.strokeRect(W*.16,H*.19,W*.68,66);
    ctx.textAlign='center';
    ctx.fillStyle='#fff';
    ctx.font='bold 24px monospace';
    ctx.fillText('WAVE '+(waveNum+1),W/2,H*.19+27);
    ctx.font='bold 13px monospace';
    ctx.fillStyle=bossWave?'#ffb14d':'#7cf6ff';
    ctx.fillText(waveTitle+' — '+waveDesc,W/2,H*.19+49);
    ctx.restore();
  }

  if(shakeTime>0)ctx.restore();
}

const timers={_lastBomb:0,_lastGround:0,lastTime:Date.now(),_lastEnemy:Date.now(),_lastBoss:Date.now(),_lastFuel:Date.now(),_lastPw:Date.now(),_lastShot:0,_lastTrail:0,_bossWaveSpawnedFor:-1};

function gameLoop(){
  requestAnimationFrame(gameLoop);
  update();
  render();
}

function boot(){
  if(!active){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);starfield();
  drawTerrain();document.getElementById('hs').textContent=highScore}
  setTimeout(boot,16)
}
setTimeout(boot,16);

document.getElementById('hs').textContent=highScore;
document.getElementById('hfs').textContent=highScore;
document.getElementById('share-status').textContent='Tap anywhere to restart';

// Start / restart handlers
const startBtn=document.getElementById('start-btn');
function launchFromStart(e){
  if(e){e.preventDefault();if(e.stopPropagation)e.stopPropagation()}
  if(startTapLock)return;
  startTapLock=true;
  startGame();
  requestAnimationFrame(()=>{startTapLock=false});
}
['pointerup','touchend','click'].forEach(ev=>startBtn.addEventListener(ev,launchFromStart,{passive:false}));
document.getElementById('share-btn').addEventListener('click',function(e){e.stopPropagation();shareScore()});
document.getElementById('restart-btn').addEventListener('click',function(e){e.stopPropagation();startGame()});
document.getElementById('gameover').addEventListener('click',function(){startGame()});
</script>
</body>
