<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Star Blaster</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background: #000; 
      overflow: hidden; 
      touch-action: none;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <script>
    // ================== AUDIO SYSTEM ==================
    const AudioSystem = {
      ctx: null,
      masterGain: null,
      isPlaying: false,

      init() {
        if (this.ctx) return;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.masterGain = this.ctx.createGain();
          this.masterGain.gain.value = 0.7;
          this.masterGain.connect(this.ctx.destination);
        } catch (e) {
          console.error('Audio init failed:', e);
        }
      },

      resume() {
        if (this.ctx && this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      },

      playShoot() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.masterGain);

        osc.type = 'square';
        osc.frequency.setValueAtTime(880, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
      },

      playBomb() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.masterGain);

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.2);
      },

      playExplosion() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.masterGain);

        osc.type = 'square';
        osc.frequency.setValueAtTime(120, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.3);
      },

      playHit() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.masterGain);

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110, this.ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.15);
      },

      playBossAlert() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.masterGain);

        osc.type = 'square';
        osc.frequency.setValueAtTime(55, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(65, this.ctx.currentTime + 1);
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1);

        osc.start();
        osc.stop(this.ctx.currentTime + 1);
      },

      playFuelPickup() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.masterGain);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(880, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.2);
      }
    };

    // ================== GAME CONFIG ==================
    const config = {
      type: Phaser.AUTO,
      parent: 'game-container',
      width: window.innerWidth,
      height: window.innerHeight,
      backgroundColor: '#000',
      scene: {
        preload: preload,
        create: create,
        update: update
      }
    };

    // ================== GAME STATE ==================
    let game;
    let player;
    let bullets = [];
    let enemies = [];
    let enemyBullets = [];
    let fuelPickups = [];
    let terrain = [];
    let score = 0;
    let fuel = 100;
    let lives = 3;
    let gameActive = false;
    let bossActive = false;
    let bossHealth = 0;
    let comboCount = 0;
    let comboTimer = 0;
    let difficulty = 1;
    let lastShootTime = 0;
    let lastBombTime = 0;
    let lastBossSpawn = 0;
    let lastFuelSpawn = 0;
    let lastEnemySpawn = 0;
    let shakeTime = 0;
    let flashTime = 0;
    let distance = 0;
    let highScore = parseInt(localStorage.getItem('starBlasterHigh') || '0');
    let touchLeft = false;
    let touchRight = false;
    let touchShoot = false;
    let touchBomb = false;

    // ================== PHASER SCENE ==================
    function preload() {
      // Load no external assets - we'll generate everything procedurally
    }

    function create() {
      // Initialize audio on first interaction
      this.input.on('pointerdown', () => {
        AudioSystem.init();
        AudioSystem.resume();
      });

      // Show title screen
      showTitleScreen(this);

      // Add touch controls
      addTouchControls(this);

      // Add HUD elements
      addHUD(this);

      // Set game state to not active
      gameActive = false;
    }

    function update(time, delta) {
      if (!gameActive) return;

      // Update difficulty
      difficulty = 1 + Math.floor(time / 30000) * 0.1;

      // Spawn enemies
      if (time - lastEnemySpawn > 2000 / difficulty) {
        spawnEnemy(this);
        lastEnemySpawn = time;
      }

      // Spawn boss
      if (time - lastBossSpawn > 45000) {
        spawnBoss(this);
        lastBossSpawn = time;
      }

      // Spawn fuel
      if (time - lastFuelSpawn > 10000) {
        spawnFuel(this);
        lastFuelSpawn = time;
      }

      // Update player
      updatePlayer(this, time, delta);

      // Update bullets
      updateBullets(this, delta);

      // Update enemies
      updateEnemies(this, delta);

      // Update enemy bullets
      updateEnemyBullets(this, delta);

      // Update fuel pickups
      updateFuelPickups(this, delta);

      // Update terrain
      updateTerrain(this, delta);

      // Check collisions
      checkCollisions(this);

      // Update combo
      if (comboTimer > 0) {
        comboTimer -= delta;
        if (comboTimer <= 0) comboCount = 0;
      }

      // Update fuel
      if (time - (window.lastFuelCheck || 0) > 1000) {
        fuel = Math.max(0, fuel - 1);
        window.lastFuelCheck = time;
        if (fuel <= 0) {
          loseLife(this);
        }
      }

      // Update distance
      distance += delta / 1000;

      // Update screen effects
      if (shakeTime > 0) shakeTime -= delta;
      if (flashTime > 0) flashTime -= delta;

      // Update HUD
      updateHUD(this);
    }

    // ================== TITLE SCREEN ==================
    function showTitleScreen(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Background
      const bg = scene.add.graphics();
      bg.fillStyle(0x000033, 1);
      bg.fillRect(0, 0, w, h);

      // Add stars
      for (let i = 0; i < 100; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h;
        const size = Math.random() * 2 + 1;
        const star = scene.add.circle(x, y, size, 0xffffff);
        star.setAlpha(0.5 + Math.random() * 0.5);
      }

      // Title
      const title = scene.add.text(w/2, h/2 - 100, 'STAR BLASTER', {
        fontSize: '64px',
        fontFamily: 'Arial',
        fontStyle: 'bold',
        color: '#00ff00',
        stroke: '#000000',
        strokeThickness: 6,
        align: 'center'
      });
      title.setOrigin(0.5);
      title.setDepth(100);

      // Subtitle
      const sub = scene.add.text(w/2, h/2 - 30, 'Xevious-Style Arcade Shooter', {
        fontSize: '20px',
        fontFamily: 'Arial',
        color: '#00ffff',
        align: 'center'
      });
      sub.setOrigin(0.5);
      sub.setDepth(100);

      // Instructions
      const instr = scene.add.text(w/2, h/2 + 60, 
        'LEFT/RIGHT: Move\n' + 
        'FIRE: Shoot (hold)\n' + 
        'BOMB: Drop bomb (tap)\n\n' + 
        'Collect FUEL to survive!', {
        fontSize: '16px',
        fontFamily: 'Arial',
        color: '#ffffff',
        align: 'center'
      });
      instr.setOrigin(0.5);
      instr.setDepth(100);

      // High score
      const highText = scene.add.text(w/2, h/2 + 140, `HIGH SCORE: ${highScore}`, {
        fontSize: '18px',
        fontFamily: 'Arial',
        color: '#ffff00'
      });
      highText.setOrigin(0.5);
      highText.setDepth(100);

      // Start button
      const startBtn = scene.add.text(w/2, h/2 + 200, 'TAP TO START', {
        fontSize: '24px',
        fontFamily: 'Arial',
        color: '#00ff00',
        stroke: '#000000',
        strokeThickness: 4
      });
      startBtn.setOrigin(0.5);
      startBtn.setDepth(100);

      startBtn.setInteractive({ useHandCursor: true });
      startBtn.on('pointerdown', () => {
        startGame(scene);
      });

      // Animate title
      scene.tweens.add({
        targets: title,
        y: title.y + 5,
        duration: 1000,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
      });
    }

    // ================== TOUCH CONTROLS ==================
    function addTouchControls(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Left zone
      const leftZone = scene.add.rectangle(0, h/2, w/2, h, 0x000000, 0);
      leftZone.setDepth(50);
      leftZone.setInteractive({ useHandCursor: true });
      leftZone.on('pointerdown', () => { touchLeft = true; });
      leftZone.on('pointerup', () => { touchLeft = false; });

      // Right zone
      const rightZone = scene.add.rectangle(w/2, h/2, w/2, h, 0x000000, 0);
      rightZone.setDepth(50);
      rightZone.setInteractive({ useHandCursor: true });
      rightZone.on('pointerdown', () => { touchRight = true; });
      rightZone.on('pointerup', () => { touchRight = false; });

      // Fire zone (top center)
      const fireZone = scene.add.rectangle(w/2, h/3, w/2, h/3, 0x000000, 0);
      fireZone.setDepth(50);
      fireZone.setInteractive({ useHandCursor: true });
      fireZone.on('pointerdown', () => { touchShoot = true; });
      fireZone.on('pointerup', () => { touchShoot = false; });

      // Bomb zone (bottom center)
      const bombZone = scene.add.rectangle(w/2, h*0.75, w/2, h/3, 0x000000, 0);
      bombZone.setDepth(50);
      bombZone.setInteractive({ useHandCursor: true });
      bombZone.on('pointerdown', () => { touchBomb = true; });
      bombZone.on('pointerup', () => { touchBomb = false; });
    }

    // ================== HUD ==================
    function addHUD(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Score
      scene.scoreText = scene.add.text(10, 10, `SCORE: 0\nHIGH: ${highScore}`, {
        fontSize: '14px',
        fontFamily: 'Arial',
        color: '#00ff00',
        stroke: '#000000',
        strokeThickness: 3,
        align: 'left'
      });
      scene.scoreText.setDepth(60);

      // Fuel bar
      scene.fuelBar = scene.add.graphics();
      scene.fuelBar.setDepth(60);

      // Fuel label
      scene.fuelText = scene.add.text(w - 130, 10, 'FUEL', {
        fontSize: '12px',
        fontFamily: 'Arial',
        color: '#00ffff',
        stroke: '#000000',
        strokeThickness: 2
      });
      scene.fuelText.setDepth(60);

      // Fuel bar background
      scene.fuelBg = scene.add.graphics();
      scene.fuelBg.lineStyle(1, 0x000000, 1);
      scene.fuelBg.strokeRect(w - 120, 25, 100, 15);
      scene.fuelBg.setDepth(60);

      // Distance
      scene.distanceText = scene.add.text(w/2, h - 20, `DIST: 0000`, {
        fontSize: '12px',
        fontFamily: 'Arial',
        color: '#ffffff',
        stroke: '#000000',
        strokeThickness: 2,
        align: 'center'
      });
      scene.distanceText.setOrigin(0.5);
      scene.distanceText.setDepth(60);

      // Lives
      scene.livesText = scene.add.text(10, h - 20, `LIVES: ${lives}`, {
        fontSize: '14px',
        fontFamily: 'Arial',
        color: '#ff0000',
        stroke: '#000000',
        strokeThickness: 3,
        align: 'left'
      });
      scene.livesText.setDepth(60);

      // Combo display
      scene.comboText = scene.add.text(w/2, h/3, '', {
        fontSize: '24px',
        fontFamily: 'Arial',
        color: '#ffff00',
        stroke: '#000000',
        strokeThickness: 4,
        align: 'center'
      });
      scene.comboText.setOrigin(0.5);
      scene.comboText.setDepth(60);
      scene.comboText.setAlpha(0);
    }

    function updateHUD(scene) {
      // Score
      scene.scoreText.setText(`SCORE: ${score}\nHIGH: ${highScore}`);

      // Fuel bar
      scene.fuelBar.clear();
      const fuelPercent = fuel / 100;
      const fuelColor = fuel > 50 ? 0x00ff00 : fuel > 20 ? 0xffff00 : 0xff0000;
      scene.fuelBar.fillStyle(fuelColor, 1);
      scene.fuelBar.fillRect(scene.scale.width - 119, 26, 98 * fuelPercent, 13);

      // Distance
      scene.distanceText.setText(`DIST: ${Math.floor(distance).toString().padStart(4, '0')}`);

      // Lives
      scene.livesText.setText(`LIVES: ${lives}`);

      // Combo
      if (comboCount >= 2) {
        scene.comboText.setText(`COMBO x${comboCount}`);
        scene.comboText.setAlpha(1);
        scene.comboText.setScale(comboCount / 10 + 1);
      } else {
        scene.comboText.setAlpha(0);
      }
    }

    // ================== START GAME ==================
    function startGame(scene) {
      // Clear title screen
      scene.children.removeAll();

      // Remove touch controls from title screen
      scene.input.removeAllListeners();

      // Add touch controls for gameplay
      addTouchControls(scene);

      // Create player
      player = createPlayer(scene);

      // Create initial terrain
      createTerrain(scene);

      // Set game state
      gameActive = true;
      score = 0;
      fuel = 100;
      lives = 3;
      comboCount = 0;
      distance = 0;
      lastBossSpawn = 0;
      lastFuelSpawn = 0;
      lastEnemySpawn = 0;

      // Start audio
      AudioSystem.init();
    }

    // ================== PLAYER ==================
    function createPlayer(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;
      const px = w / 2;
      const py = h - 120;

      // Main silver/grey body (Solvalou-inspired)
      const ship = scene.add.graphics();
      ship.fillStyle(0xcccccc, 1);
      ship.lineStyle(2, 0x888888, 1);
      // Fuselage
      ship.fillRect(px - 8, py - 25, 16, 45);
      ship.strokeRect(px - 8, py - 25, 16, 45);
      // Wings
      ship.fillStyle(0xaaaaaa, 1);
      ship.fillTriangle(px - 8, py - 5, px - 28, py + 15, px - 8, py + 15);
      ship.fillTriangle(px + 8, py - 5, px + 28, py + 15, px + 8, py + 15);
      ship.lineStyle(2, 0x666666, 1);
      ship.strokeTriangle(px - 8, py - 5, px - 28, py + 15, px - 8, py + 15);
      ship.strokeTriangle(px + 8, py - 5, px + 28, py + 15, px + 8, py + 15);
      // Cockpit
      ship.fillStyle(0x00ff88, 0.7);
      ship.fillCircle(px, py - 15, 5);

      // Green engine glow
      const engine = scene.add.graphics();
      engine.fillStyle(0x00ff00, 0.9);
      engine.fillRect(px - 5, py + 22, 10, 8);
      engine.fillStyle(0x88ff88, 0.6);
      engine.fillRect(px - 3, py + 28, 6, 6);

      ship.data = { type: 'player', health: 1, engine: engine };
      engine.setData('parent', ship);

      // Engine pulse
      scene.tweens.add({
        targets: engine,
        alpha: 0.4,
        duration: 120,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
      });

      return ship;
    }

    // ================== TERRAIN ==================
    function createTerrain(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Ground
      const ground = scene.add.graphics();
      ground.fillStyle(0x2d5016, 1);
      ground.fillRect(0, h - 100, w, 100);

      // Mountain silhouettes
      for (let i = 0; i < 5; i++) {
        const x = Math.random() * w;
        const y = h - 120 - Math.random() * 50;
        const size = 30 + Math.random() * 40;
        const mtn = scene.add.graphics();
        mtn.fillStyle(0x1a3309, 1);
        mtn.beginPath();
        mtn.moveTo(x - size, y + size);
        mtn.lineTo(x, y);
        mtn.lineTo(x + size, y + size);
        mtn.closePath();
        mtn.fillPath();
        terrain.push({ obj: mtn, speed: 0.5 + Math.random() * 0.5 });
      }

      // Trees
      for (let i = 0; i < 15; i++) {
        const x = Math.random() * w;
        const y = h - 110 - Math.random() * 80;
        const tree = scene.add.graphics();
        tree.fillStyle(0x0d4d00, 1);
        tree.fillCircle(x, y, 8 + Math.random() * 6);
        terrain.push({ obj: tree, speed: 1 + Math.random() });
      }

      // Road
      const road = scene.add.graphics();
      road.fillStyle(0x444444, 1);
      road.fillRect(w/2 - 30, 0, 60, h);
      road.lineStyle(2, 0xffff00, 0.5);
      road.setLineDash([20, 20]);
      road.lineBetween(w/2, 0, w/2, h);
      terrain.push({ obj: road, speed: 2 });
    }

    function updateTerrain(scene, delta) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Move terrain elements
      terrain.forEach(item => {
        item.obj.y += item.speed * delta / 16;
        if (item.obj.y > h + 50) {
          item.obj.y = -50;
          item.obj.x = Math.random() * w;
        }
      });
    }

    // ================== ENEMIES ==================
    function spawnEnemy(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;
      const typeRoll = Math.random();
      const type = typeRoll < 0.25 ? 'fighter' : typeRoll < 0.85 ? 'bomber' : 'boss';
      const px = w / 2 + (Math.random() - 0.5) * (w * 0.7);
      const py = -30;

      const enemy = scene.add.graphics();
      let data = { type: 'enemy', health: 1, speed: 2, shootChance: 0.001, points: 100 };

      if (type === 'fighter') {
        // Red wedge fighter
        enemy.fillStyle(0xcc0000, 1);
        enemy.lineStyle(2, 0xff3333, 1);
        enemy.fillTriangle(px - 14, py + 12, px, py - 14, px + 14, py + 12);
        enemy.strokeTriangle(px - 14, py + 12, px, py - 14, px + 14, py + 12);
        data.health = 1;
        data.speed = 3.2;
        data.shootChance = 0.0035;
        data.points = 60;
      } else if (type === 'bomber') {
        // Orange bomber with turrets
        enemy.fillStyle(0xdd8800, 1);
        enemy.lineStyle(2, 0xffaa33, 1);
        enemy.fillRect(px - 16, py - 10, 32, 22);
        enemy.strokeRect(px - 16, py - 10, 32, 22);
        // Turrets
        enemy.fillStyle(0x662200, 1);
        enemy.fillRect(px - 8, py - 4, 6, 8);
        enemy.fillRect(px + 2, py - 4, 6, 8);
        data.health = 2;
        data.speed = 1.6;
        data.shootChance = 0.006;
        data.points = 160;
      } else if (type === 'boss') {
        // Large menacing boss with glowing weak points
        enemy.fillStyle(0x440000, 1);
        enemy.lineStyle(4, 0xff2222, 1);
        enemy.fillRect(px - 28, py - 18, 56, 38);
        enemy.strokeRect(px - 28, py - 18, 56, 38);
        // Weak point core
        enemy.fillStyle(0xffff00, 0.9);
        enemy.fillCircle(px, py, 10);
        enemy.lineStyle(2, 0xffffff, 1);
        enemy.strokeCircle(px, py, 10);
        data.health = 12;
        data.speed = 0.55;
        data.shootChance = 0.012;
        data.points = 1200;
        bossActive = true;
      }

      enemy.setData('type', type);
      enemy.setData('health', data.health);
      enemy.setData('speed', data.speed);
      enemy.setData('shootChance', data.shootChance);
      enemy.setData('points', data.points);
      enemy.data = data;

      enemies.push(enemy);
    }

    function spawnBoss(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Boss alert sound
      AudioSystem.playBossAlert();

      // Create boss
      const boss = scene.add.graphics();
      boss.lineStyle(4, 0xff0000, 1);
      boss.fillStyle(0x440000, 1);
      boss.beginPath();
      boss.moveTo(w/2 - 60, -60);
      boss.lineTo(w/2 - 30, 0);
      boss.lineTo(w/2 + 30, 0);
      boss.lineTo(w/2 + 60, -60);
      boss.closePath();
      boss.strokePath();
      boss.fillPath();

      // Boss core
      boss.lineStyle(2, 0xffff00, 1);
      boss.fillStyle(0xffff00, 0.5);
      boss.fillCircle(w/2, -30, 15);

      boss.setData('type', 'boss');
      boss.setData('health', 20);
      boss.setData('speed', 0.3);
      boss.setData('shootChance', 0.02);
      boss.setData('points', 5000);
      boss.data = { type: 'boss', health: 20, speed: 0.3, shootChance: 0.02, points: 5000 };

      enemies.push(boss);
      bossActive = true;
    }

    function updateEnemies(scene, delta) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        const data = enemy.data;

        // Move down
        enemy.y += data.speed * delta / 16;

        // Side to side for fighters
        if (data.type === 'fighter') {
          enemy.x += Math.sin(scene.time.now / 500 + i) * 2;
        }

        // Shoot
        if (Math.random() < data.shootChance * delta / 16) {
          enemyShoot(scene, enemy);
        }

        // Remove off-screen
        if (enemy.y > scene.scale.height + 50) {
          scene.children.remove(enemy);
          enemies.splice(i, 1);
        }
      }
    }

    function enemyShoot(scene, enemy) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Enemy bullet
      const bullet = scene.add.graphics();
      bullet.lineStyle(2, 0xff0000, 1);
      bullet.fillStyle(0xff0000, 1);
      bullet.fillCircle(enemy.x, enemy.y, 3);
      bullet.data = { type: 'enemyBullet', speed: 4 };

      enemyBullets.push(bullet);
    }

    function updateEnemyBullets(scene, delta) {
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const bullet = enemyBullets[i];
        bullet.y += bullet.data.speed * delta / 16;

        // Remove off-screen
        if (bullet.y > scene.scale.height + 20) {
          scene.children.remove(bullet);
          enemyBullets.splice(i, 1);
        }
      }
    }

    // ================== BULLETS ==================
    function updatePlayer(scene, time, delta) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Movement
      if (touchLeft) {
        player.x = Math.max(30, player.x - 5 * delta / 16);
      }
      if (touchRight) {
        player.x = Math.min(w - 30, player.x + 5 * delta / 16);
      }

      // Shooting
      if (touchShoot && time - lastShootTime > 150) {
        shootBullet(scene);
        lastShootTime = time;
      }

      // Bomb
      if (touchBomb && time - lastBombTime > 500) {
        dropBomb(scene);
        lastBombTime = time;
      }
    }

    function shootBullet(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Zapper bullet
      const bullet = scene.add.graphics();
      bullet.lineStyle(2, 0x00ff00, 1);
      bullet.fillStyle(0x00ff00, 1);
      bullet.fillCircle(player.x, player.y - 30, 3);
      bullet.data = { type: 'bullet', speed: 8 };

      bullets.push(bullet);
      AudioSystem.playShoot();
    }

    function dropBomb(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Blaster bomb
      const bomb = scene.add.graphics();
      bomb.lineStyle(2, 0xffff00, 1);
      bomb.fillStyle(0xffff00, 1);
      bomb.fillCircle(player.x, player.y + 20, 5);
      bomb.data = { type: 'bomb', speed: 3 };

      bullets.push(bomb);
      AudioSystem.playBomb();
    }

    function updateBullets(scene, delta) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        bullet.y -= bullet.data.speed * delta / 16;

        // Remove off-screen
        if (bullet.y < -20) {
          scene.children.remove(bullet);
          bullets.splice(i, 1);
        }
      }
    }

    // ================== FUEL ==================
    function spawnFuel(scene) {
      const w = scene.scale.width;
      const h = scene.scale.height;

      const fuel = scene.add.graphics();
      fuel.lineStyle(2, 0x00ffff, 1);
      fuel.fillStyle(0x00ffff, 0.5);
      fuel.fillCircle(Math.random() * (w - 40) + 20, -20, 10);
      fuel.data = { type: 'fuel' };

      fuelPickups.push(fuel);
    }

    function updateFuelPickups(scene, delta) {
      for (let i = fuelPickups.length - 1; i >= 0; i--) {
        const fuel = fuelPickups[i];
        fuel.y += 2 * delta / 16;

        // Remove off-screen
        if (fuel.y > scene.scale.height + 20) {
          scene.children.remove(fuel);
          fuelPickups.splice(i, 1);
        }
      }
    }

    // ================== COLLISIONS ==================
    function checkCollisions(scene) {
      // Bullets vs enemies
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        for (let j = enemies.length - 1; j >= 0; j--) {
          const enemy = enemies[j];
          if (Math.abs(bullet.x - enemy.x) < 25 && Math.abs(bullet.y - enemy.y) < 25) {
            // Hit enemy
            enemy.data.health--;
            scene.children.remove(bullet);
            bullets.splice(i, 1);

            if (enemy.data.health <= 0) {
              // Enemy destroyed
              score += enemy.data.points;
              AudioSystem.playExplosion();
              scene.children.remove(enemy);
              enemies.splice(j, 1);
              shakeTime = 200;
              flashTime = 100;

              // Combo
              comboCount++;
              comboTimer = 2000;
            }
            break;
          }
        }
      }

      // Enemy bullets vs player
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const bullet = enemyBullets[i];
        if (Math.abs(bullet.x - player.x) < 20 && Math.abs(bullet.y - player.y) < 25) {
          // Hit player
          AudioSystem.playHit();
          scene.children.remove(bullet);
          enemyBullets.splice(i, 1);
          loseLife(scene);
          break;
        }
      }

      // Enemies vs player
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        if (Math.abs(enemy.x - player.x) < 25 && Math.abs(enemy.y - player.y) < 30) {
          // Crash
          AudioSystem.playExplosion();
          scene.children.remove(enemy);
          enemies.splice(i, 1);
          loseLife(scene);
          shakeTime = 300;
          flashTime = 150;
          break;
        }
      }

      // Fuel vs player
      for (let i = fuelPickups.length - 1; i >= 0; i--) {
        const fuel = fuelPickups[i];
        if (Math.abs(fuel.x - player.x) < 25 && Math.abs(fuel.y - player.y) < 25) {
          // Collect fuel
          fuel = Math.min(100, fuel + 30);
          AudioSystem.playFuelPickup();
          scene.children.remove(fuel);
          fuelPickups.splice(i, 1);
          break;
        }
      }
    }

    function loseLife(scene) {
      lives--;
      shakeTime = 500;
      flashTime = 300;

      if (lives <= 0) {
        gameOver(scene);
      }
    }

    function gameOver(scene) {
      gameActive = false;

      // Update high score
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('starBlasterHigh', highScore.toString());
      }

      // Show game over screen
      const w = scene.scale.width;
      const h = scene.scale.height;

      // Overlay
      const overlay = scene.add.graphics();
      overlay.fillStyle(0x000000, 0.8);
      overlay.fillRect(0, 0, w, h);

      // Game over text
      const goText = scene.add.text(w/2, h/2 - 80, 'GAME OVER', {
        fontSize: '48px',
        fontFamily: 'Arial',
        color: '#ff0000',
        stroke: '#000000',
        strokeThickness: 6,
        align: 'center'
      });
      goText.setOrigin(0.5);
      goText.setDepth(100);

      // Score
      const scoreText = scene.add.text(w/2, h/2, `SCORE: ${score}`, {
        fontSize: '24px',
        fontFamily: 'Arial',
        color: '#00ff00',
        align: 'center'
      });
      scoreText.setOrigin(0.5);
      scoreText.setDepth(100);

      // High score
      const highText = scene.add.text(w/2, h/2 + 40, `HIGH SCORE: ${highScore}`, {
        fontSize: '18px',
        fontFamily: 'Arial',
        color: '#ffff00',
        align: 'center'
      });
      highText.setOrigin(0.5);
      highText.setDepth(100);

      // Restart
      const restartText = scene.add.text(w/2, h/2 + 100, 'TAP TO RESTART', {
        fontSize: '18px',
        fontFamily: 'Arial',
        color: '#00ffff',
        stroke: '#000000',
        strokeThickness: 3,
        align: 'center'
      });
      restartText.setOrigin(0.5);
      restartText.setDepth(100);

      restartText.setInteractive({ useHandCursor: true });
      restartText.on('pointerdown', () => {
        // Clear everything
        scene.children.removeAll();
        scene.input.removeAllListeners();

        // Add touch controls
        addTouchControls(scene);

        // Show title again
        showTitleScreen(scene);
      });
    }
  </script>
</body>
</html>
